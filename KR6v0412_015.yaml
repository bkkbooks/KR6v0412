仙何處覔天風颯颯灑衣巾望少林李夢陽江西提學副使三十六峰雲氣通何峰寺西何者東林巖霜橫遠亦靜煙嵐日破重還空千山盡歷暮轉碧一樹不落秋能紅漸聞鐘聲出杳靄得路誰憐馬僕功少林寺李夢陽林深谷暝客子入鐘鳴葉落秋山空煙雲細裊石澗底巒岫亂積松中唐碑漢碣蘚字剝猿啼虎嘯蘿燈紅獨坐悠悠息塵想少室影下月出東宿少林李夢陽萬山微暝一鐘鳴古寺深秋倦客情僧本折蘆翻面壁人非騎鶴故吹笙寒催亂木風交響白動虛巖月自生慚愧勞勞不成寐丁丁臥聽早樵聲春日遊盧巖寺李居仁登封知縣東風隨馬試郊坰吹上蒼茫第幾峰春意緑催前澗草夕陽紅送半山鐘雲深石潄千年水寺古龍蟠萬樹松日暮渾忘歸路遠太平詩酒喜相從盧巖寺于範看罷懸崖瀑布泉小欄修竹裊晴煙叢松不礙巖頭路高岫能侵雲外天隱士有名從異代殘碑無字記當年連鑣有客同清賞把酒賡歌伐木篇遊嵩山用薛考功君采韻喬宇吏部尚書五嶽生來有夙期嵩山登處一何奇西連太華三峰影東接扶桑萬里枝騁步力窮閶闔際放歌聲振泬寥時茲遊最勝誰當記恨少琳琅金薤辭奉陪巖翁相公遊嵩山薛蕙壯遊佳節似相期嵩嶽登高天下奇策杖俯看鴻鴈影接滿插菊花枝山川俶儻中原地雲霧蒼茫落日時勝槩此生能幾遇尊前醉倒不須辭登五乳峰許完少室山前五乳峰振衣千仞許誰從黃河渺渺舒晴練洛邑微微見蟻封足縮羊腸𢌞俗駕眼空鰲極蕩塵胸乾坤勝地鍾靈異雲雨時時起蟄龍盧巖觀瀑李元監察御史絶壑何年掛玉龍洗心我一問盧鴻半秋雨落天上十丈白蓮開雲中潁水風高吹不斷嵩門月近照全空縣官更有泉亭約應許山靈識醉翁過盧巖觀瀑布楊儒魯河南府知府名山天下半探奇鳳石龍湫忽在茲皎日一天飛雨雪清風雙壑瀉珠璣浮浮仙洞蘿煙裊翳翳書臺樹影移不見當年盧諫議高山流水動遐思秋日遊少林楊儒魯古林削壁藏金剎秋色隂崖隱紺城千樹紅黃千樹碧一山雲雨一山晴洞靈猶識胡僧面天籟如聞子晉笙踏破紅塵來憩此欲依定影學無生周公測景臺王洙河南按察僉事周公祠宇尚中天一瓣香燒豈素緣景正嵩陽分曉暮山宗黃蓋列曾玄千年臺照寒空月萬井春餘碧樹煙制作至今猶想見當時誰賦黍離篇晚至盧巖王洙遠嶼煙光散夕藍幽尋有客問盧巖疏鐘隱約穿林出古篆迷茫遍石鑱擎蓋蟠松何鬱鬱濺珠飛瀑故潺潺久居城市逢山快况值清秋景不凡盧巖觀瀑布柬登封令王洙怪得高人勝地潛懷歸客子也須淹三生石上聞仙樂百尺崖前看瀑過眼浮雲從漠漠映階草自纖纖問君解組前來否塵世真能吏隱兼宿少林寺任惟賢都御史數聲清磬度林霏琴鶴隨僧入翠微絶俗信無塵得到開山真有錫曾飛青峰處處堪容隱白髮勞勞未息機禪榻夜臨窗月臥覺來深悟昔時非登嵩嶽携程兒王應鵬秋郊蹇步信遲遲吏隱吾今兩得之天欲假年逢閏月景當適意侍佳兒子長只了名山債老杜空遺亂世詩間處光隂應自惜野雲溪月未深知登封尹侯安甫陪謁中嶽王應鵬令尹追陪樂事偕探幽攬秀亦吾儕山蟠平野寰間少景到中天分外佳疊嶂籠雲連碧落藂林輝日接丹崖十年來往中州路此日投閒夙願諧望少林王應鵬半日𢌞溪路始通僧家遙在翠微東目隨飛鳥依青嶂心與浮雲入太空木落秋飈雙澗碧日銜西壁萬山紅到門應看花臺月試問當年面壁功嵩山王尚絅山西參政丹峰黃葉淨秋顏鳩杖芒鞋出舊𨵿日腳已曛雙乳洞月明先宿二熊山融融潁谷瞻雲外歷歷箕峰想樹間獨向空巖慚病體誰將玉屑飯吾還嵩嶽蔡汝楠東來伊洛訪名山二室崚嶒霄漢間石壁雲橫迷鳥道嵩門月出見天𨵿蛟龍吐霧晴嵐濕虎豹生風夕草班萬歲峰頭瞻北極恍聞嵩祝動宸顏遊少林寺李乘雲陝西參政亂峰突兀問嵩林福地煙霞望處深石壁倚天清漠漠女蘿懸霧碧隂隂落花風定栖禪影樵唱月明應梵音獨坐悠然塵慮息不知身世有華簮遊盧巖寺徐南金監察御史岧嶤嵩嶽與雲連攬勝尋幽洞壑邊古寺紆隨蒼徑轉層崖直傍紫霄懸金鰲日映氷霜石珠縷空飛霹𮦷泉獨憶高風唐諫議宛留真蹟恣攀緣少林寺次華原韻李仁河南按察副使秋日名山初攬勝青蓮大士舊為家風林晝響千巖瀑繡嶺晴飛百道霞寶相當天流佛日香雲繞座結曇華空門誰解西來意為問恆河幾許沙遊少林史褒善河南布政使偶因行部陟嵩岑暫駐肩輿訪少林前代古碑蒼蘚合上方精舍白雲深山腰雨過龍歸洞樹杪風清鳥弄音一宿頓忘塵俗慮雅懷渾覺似禪心石道喜雨趙諫之百嶮才登碐磴坡深雲四面起山阿原田喜足千家雨野水新添數尺波即見青苗生秀色便聞赤子會謳歌故鄉風土渾相似料得流亡起色多碐磴坡趙諫之萬疊峰頭一徑穿亂雲無數水潺湲隨花好鳥啼春晝𭘧雨農人開石田松菊久荒仍宦迹音書不斷自常年孤舟遊客雙蓬鬢何日西洲釣晚天登嵩山絶頂溫如璋都御史羊腸仄徑曉攀遊步入層霄山盡頭白鶴觀迎泉水細高登崖轉洞雲浮海邊紅日孤九上天際黃河一線流符籙漢封無覔處佇看寰宇小中州宿少林寺劉紹恤雲南按察僉事萬峰疊疊漸崚嶒徑入轘轅興轉增黃葉滿前猶作客白雲深處且依僧中原月度三更夜少室天開第一乘試望高臺甘露色不妨重藉玉蓮燈首歲寓登封項璁新年騎馬到登封遙望天門第幾重曲坂三三通輦轂群峰六六秀芙蓉吟看少室山頭雪臥聽嵩陽寺裏鐘明日又從清潁去遠尋巢父舊遊蹤登天中閣周鑑巡撫河南都御史高閣憑虛萬仞顛四圍山色淨娟娟白雲時自封中出玉鏡遙從象外懸曉日氤氳張彩幕秋風蕭瑟韻氷絃飄飄為問吹笙侶月下歸來不記年登嵩嶽穆文熙考功員外郎六十峰高望欲平何年神降甫申生形分二室盤中土地接三川走上京怪道逹磨能面壁傳來子晉解吹笙逃空我欲成小隱未許盧鴻浪得名五言排律宿少林寺寄余何二分教兼呈松庭長老山錫之看山投晚寺緣徑入幽林蓮宇瞻弘敞龍宮聳鬱森鈴傳梵語松吹響潮音雲起千巖白泉流萬壑深天風飄靜院寶月印禪心翠閃山窺戶金輝閣映岑蘚埋碑篆古花覆石幢隂愈覺真源迥何曾俗垢侵迢遙懷勝景邂逅愜幽尋借衲依禪寂拈花啓笑吟寄言分教容仙境幸同臨遊嵩少劉紹恤河洛呈天瑞嵩高協地靈雲連平野白日擁萬峰青應宿中為火居方鎮是星上公崇秩祀貝闕儼儀形歷代陳圭壁層巒列障屏函開寶籙絳節引雕軨客有吹笙嶺僧留面壁亭鶴能驂叱馭石亦解談經玉井涵仙液金壺注淨丹砂因頌顯青鳥應時停箕潁瓢無跡浮丘洞自扃柏猶稱漢將槐更肇秦庭演法曾留偈登封早勒銘霓裳侵晚度清梵夜深聽暮靄吟楓葉朝霞覆茯苓煙嵐晴裊裊花雨晝冥冥月冷虛堂鉢風傳高閣鈴十年塵外想百念靜中寧倏爾超三界悠然小四溟采真疑汗漫泛泛愧流萍中嶽唐順之巡撫都御史巫閭控北戶蔥嶺奠西隅茲地隂陽合中天洞壑孤黃樞標正位紫氣護真圖近接浮丘宅深藏軒后符疏峰連太乙列館象清都圜宮猶漢築馳道尚秦除肅肅泥書祕森森羽蓋趨仙遊微見迹帝幸暗聞呼露洗千齡柏霜封九節蒲星榆臨砌發月莢應時敷將訪三山記猶迷七聖途今朝陪廣樂直擬到方壺遊嵩山少林寺唐順之淨域龍巖上香臺鷲嶺邊山由巨靈闢教以法王傳二室圍蘭若三花接梵筵土中元此地檻外即諸天復岫低𢖍岱𢌞軒寫澗𤄊雲衣披雜樹虹影度飛泉綴牗皆青壁緣堤盡白蓮神猿參講幕馴鴿繞罏煙慧月秋逾徹泥珠夕更鮮谷將鐘迸響潭共鏡爭圓萬劫終成幻三生併是緣願假金力一為照迷川嵩陽宮柏唐順之嘉樹植崆峒年長勢更雄已無秦帝幸尚有漢皇封幹比孤生竹根猶半死桐靈泉玉女灌甘雨嶽神通葉密鶯難度枝樛葛易蒙垂隂九華帳弄影五雲宮色掩重巖翠聲含衆竅風賓來虬蓋偃仙去鶴巢空非因不材壽春秋自無窮遊少林寺文熙海內稱名剎無如此地偏蓮華九頂出玉乳五峰連甘露瀰金界慈雲護梵天法輪西域轉象教震方傳唐碣推神武秦槐飛斷煙齊心依靜土不是野狐禪五言絶句過崇福宮李元散步長松下時聞出世音山泉煮山茗小啜洗塵心遊嵩少二首李元聞道少林好百年欣此遊金仙杳何處山頂白雲流其二境勝神自清魔輕睡難箸孤榻坐深更天風語簷鐸盧巖飛瀑王尚絅雲崖掛澗石橫玳𤦛晚霽試憑闌釣月明珠碎早發崿嶺趙諫之鼓吹落微月旌旗映曉林竹深山復靜一鳥送清音再過崿嶺趙諫之秋草連天碧秋雲萬里長日西過崿嶺少室在蒼茫七言絶句少林寺僧話二首喬宇甘露臺邊秋月明偶逢曇彥話二生藜牀獨坐心如水夜半空山有磬聲其二步入招提日未斜香臺片片落空花少林合是禪棲地常有山僧誦法華釣魚臺何天衢河南府知府歷尚書臺前落日塞鴻哀臺下西風潁水來一曲滄浪秋寂寂白雲紅葉好登臺盧巖飛瀑王尚絅飛流曾向詩中覔倒硤今從畫裏看不知雪浪高多少能遣茅齊六月寒少林雜詠沈應乾戶部郎中疊疊層巒翠欲流峰𢌞嶂轉跨中州靈車霞佩杳然去目斷飛雲天際頭甘露臺前雷雨飛碧巖突兀映煙扉葛巾野服沾雲濕疑是金牛頂上歸少室縈𢌞太室西松風蘿月近丹梯攀緣欲探金明草回首煙霞路又迷亭亭御寨禪𨵿北兩兩龍泉虎澗西雲霧叢中瞻佛榻薜蘿密處聽猿啼少林寺趙震三十六峰凌紫霞白雲深處有僧家影搖絶壁菩提樹香藹空門般若花日晚憩少林二首趙貞吉大學士崑崙東下海天𢌞翠疊嵐重二室開欲訪琳堂問仙藥金童疑在碧雲隈其二東周鶴與洞簫回西竺人隨折葦來塵世未逢浮海筏青山空繞謫仙臺同登封令汪君循嵩麓至盧巖二首趙貞吉秦槐漢柏瞰扶桑瀚海雲波歲月長獨有游人驚物候六花飛盡又三陽其二雲蒸縹出蓬壺雪液嵌空噴玉珠幽棲高士不可見悵望冥鴻天際孤遊少林用趙內翰韻四首今録二首楊洞山僧午夢乍驚回報道高人勒馬來步入叢林最僻處不知塵世有麟臺其二蒼茫海日上扶桑禪榻雲深夢正長一枕青山天地晚何妨松影轉斜陽門人魏三槐張孔修校字
