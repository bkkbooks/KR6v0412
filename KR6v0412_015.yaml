body:
  text: 韻始篇四大明洪武至隆慶年詩五言古詩詠隱逸二首高啓戶部侍郎武攸緒孽后移寶鼎同姓咸析圭獨去謝親寵龍門事冥棲淡泊如素嘗衣褐復茹藜賜器不肯御牀頭委塵泥族人豈不華回首已粉苟榮禍必集達識乃弗迷蟬衆濁中名與嵩高齊盧鴻皓然守泰一高臥在幽壤開元始求治賢哲勞夢想詔書起巖扃宸意勤挹仰入京遽還山孰得磨以鞅天子遂其高營室致安養爵祿不可加貪士應泚顙別盧巖厲仲彰洛陽知縣愛山有深癖况此丘壑美高韻拔風塵一見如知己秀色聳遐觀清聲洗凡耳久住嗟未能回首情無已黑石渡于範山足縈清波渡頭枕黑石野花學菊黃山果如丹赤高岸穿林過深溝落葉集雲靜正秋空出門雙眼碧登崿嶺望少室山王堯弼赤日登崿嶺薰風自南來滌彼溽暑退吹我衣裳開我懷覺清灑我行實徘徊節彼少室山峰巒鬱崔嵬白雲鎖其巔蒼松盤其隈芙蓉接漢出畫倚天排不說神仙事雲霞亦奇哉平生愛山水此興詎能灰仰止意不盡日夕還登臺何如凌絶頂憑高瞰九垓過望嵩陳棐中書舍人遠岫倚天高望入碧雲際白鶴駕吹笙仙人去千歲孤標二室尊四嶽群峰細欲赴小山招幽巖結叢桂渡伊洛望嶽吳三樂大理寺卿端居厭俗紛逸興懷林莽勝景標靈山秀拔中天敞二室最奇絶芙蓉似仙掌取號寄吾生雲壑空遐想佳辰朱明積雨何蕭爽驅車渡伊洛霽景晨曦朗祥飈鼓蘭橈素波時滉漾遡流一以眺川原修且廣沙浦多芳林好鳥遞清響欲濟且踟蹰水木坐俯仰丹嶂尚冥濛倏忽煙雲蕩風磴掛飛泉中有叢桂長眷彼山中人薜衣閒蘿幌子晉從浮丘出入緱山上携手有良朋駕願長往枕石採芝芩餐霞吸瀣沆行行近山阿去去出塵壤夙心今已諧明發恣幽賞嵩陽宮觀漢柏楊家相河南巡按御史受命巡中土攬轡日駸駸汝南初訖事飛蓋指嵩岑迤邐來登封厥邑幽以深鬱鬱嵩陽宮宛在城北林穹碑紀唐事靈應俱銷沈階前存古柏圍大踰五尋歲月歷千齡老幹何森森龍鱗時剝落風雨長哀吟我來躡芳境坐玩開塵襟因嗟梁棟材乃在煙霞潯盤桓不能去歲晚結同心崇福宮禱雨李禎河南左布政使清曉戒徒御禱雨謁道宮焚香古像前拜跪肅以恭因之感興亡華構久已空尚有敕撰碑狼籍蔓草中慨想宋全盛鑾輿屢遊從名臣領祠職列辟嚴睟容運往物隨改偉觀難再逢登臨睇煙霞頗愜眺望踪遲回不能去樹杪來長風辛亥端午日遊少林寺示檜菴班上人李禎少林聳岧嶤有路達蔥嶺半生懷勝槩老得踐真境緇流遠見迓偏袒仍露頂升高縱遐觀頗覺癡緣屏蒲風卷帙艾色侵衣領摩挲前代碑文詞極嚴整掇蔬僧具供飲騎童汲井自拈清淨香作禮古鼎超超昔神師順寂同溟涬而於片石上留此不滅影竺夏雖異轍皆貴能猛省閒雲許分坐禪定畢餘景登嵩山吳會茲嶽冠神區方中環四維煙霞晨夕幻矅靈東西馳群峰萬古石芳樹千年枝山駐周王駿途經漢帝輜空巖答清嘯豈異三呼時淡淡秋日光漠漠寒雲移悲風振柯條百草無威孤征感節變惝恍臨路岐𢌞瞻北邙道為咏遊仙詩子晉去不復浮丘杳難追何當從之遊服食恆在斯天中閣醉後俚語呈鄭明府金一陽我登嵩之巔萬壑白雲連不知天路近忽覺有神仙神仙仙令才携手登蓬萊一醉天中閣四望可徘徊徘徊來松風拂我客塵衷歌笑情不極倣佛超樊籠七言古詩咏王子喬劉基誠意伯諡文成王子喬乃是皇王之子賢聖之孫深宮洞房不稱意𨚫駕白鶴尋軒轅虹霓為旗雲為旙飄然乘風上崑崙王子喬去何之朝發暘谷暮崦嵫六龍九鳳相追隨穆王西上不得王母訣胡為元氣獨爾私王子喬去不還社稷功業巍如山猶見九鼎之神姦王城日夕生茆菅爾獨胡為白雲間王子喬空長歎遊少林寺劉咸河南按察僉事嘗讀古人詩知有少林寺十年欲往苦無因今朝始得遂初志危峰五乳高插天勢與少室相聯綿青宵簾幕貫星斗白日窗戶通嵐煙山僧見客喜相迓環立道傍留駐馬蒼忙延入禪𨵿中殷勤羅拜法堂下循廊導引看殘碑一一指點談當時崇建祇稱唐宋盛品題亦識蘇黃奇須臾邀我凌山頂直向懸崖覽勝景溪邊洗鉢汲清泉澗底拾薪煮香茗為言此山稱法窩開創緣自僧跋跎一從藏經入中國築臺繹字功居多後來達磨方卓錫九年此中坐面壁功成隻履向西歸尚遺靈影在山石當時慧可皈依深斷臂立雪求安心燈燈繼續幾千載妙法相傳猶至今從容問答未及已忽聽蕭颯松風起層巖徙倚重徘徊但覺煩襟清似洗歸來幽興殊未闌還登鐘閣窮遐觀憑欄獨立久延佇置身恍在青雲端大雄殿西古輪藏金碧熒煌屹相向月下平分寶隂空中每接仙韶響吁嗟好山真可居公程促迫將何如平生塵土滿胸臆安能為我俱消除出門別僧僧送罷又復回顧與僧話他年優詔許歸田準擬相尋結蓮社少林行沈文華河南府知府鬼鑿山空風滿窟御寨峰高寒瀉玉憑虛不覺天宇低倣佛青雲礙雙足泉飛六月侵人肌石迸新芽薦山䔩少林勝槩冠中州黃鳥流音花繡谷不因省斂來此遊誰削芙蓉洗塵目山僧那識長官心錯把笙簧奏新曲村翁牧子傍我車爭欲搴帷話風俗溫言慰藉良再三重惜我民貧切骨臨風感慨不成吟日落山深聲振木嵩陽宮三柏歌沈文華蒼龍蜿蜒潛深淵一飛直上嵩之巔須臾雲雨遍八極歸來排立宮之前神物從來變化速頭角崢嶸鱗甲緑長髯鼓動清風生世人錯認柏為骨漢武當年重遠遊旌幢五色翳山頭嵩呼萬歲效三祝聲飛千古遵遺猷惟有將軍心素赤鐵面生寒光射日高標豈肯伍凡材矢與皇家為柱石我來再拜嵩陽宮欲祈哀我民疲癃將軍不惜鞭龍雨我土崇臺偉榭千秋報祀無終窮三將軍古柏歌陳棐昔摩東嶽大夫松今觀中嶽將軍柏偃蓋影走老蛟青怒濤聲瀉寒空碧扶疏掩映嵩陽宮仙蹕曾經漢武封溜雨霜皮合六抱凌霄秀色敵群峰嵩峰靈氣來千古神降生申應生甫英賢鍾育應人文遺靈孕出將軍武尚父八十舊鷹楊方叔元老總戎行此柏正同三代將豈爾秦漢可比量貞心早際風雲會徑節曾依日月光龍虎踞蟠稱得地麒麟殿閣待傳芳老來閒退嵩山前顏色蒼古風韻全金鎖緑沈拋暮景深巖靜壑得遐年君不見三鶴峰滿山明月鶴無蹤又不見三花樹花落秋風不知數惟有將軍三柏幾千秋壽過子晉邁浮丘將軍將軍天下稀才大真成與用違誰能移置廟堂上莫使風霜冷鐵衣登嵩山駱顒放歌今幸游嵩山懸崖千仞初躋攀浮丘子晉在何處祇見白雲時往還石牀洞口處處有青壁截斷仙人𨵿飄然便欲凌汗漫俯視八表空人寰塵緣未盡恣幽探捫蘿豈惜徒步艱穿雲回首葛衣濕林端香氣芬幽蘭轉松移岫坐超忽遙聞流水聲潺潺山高水遠望不極長風飛雨來山間枕璞難得遇金漿堪駐顏玉室儻名列願乞長生丹舉首一笑出塵網不老渾令歲月閒遊少林吟馮世寧登封教諭罡風吹衣山霧黃松筠繞繞身欲僵攀緣石磴險不上舉頭還有青林岡雲霞遠鎖達磨寺中有山堂說偈事蒼松偃蹇虬龍形石上篆成霹靂字江濤浪擁摘蘆來西域曾踏青蓮臺一朝老坐少林石五乳山峰生紫苔山中秋月明如鏡山下清泉流不盡禪心如月復如泉野壑禽聲天宇淨偶來此地一遨遊登臨直上山之頭雲林杳杳奇如畫恍若三島與十洲鳳聲不聞仙已泯掩靄雲山真列盾千崖掃石看名詩古字蒼苔如虬蚓嵩山高吳三樂望嵩嶽兮乃在伊洛之浦箕潁之隈巃嵸萬仞何奇哉盤礴中原橫九垓隂陽昏曉多變態吐吞日月相縈𢌞翠屏孤聳排丹嶂二室東西宛相向諸峰𨚫立如欲摧削出芙蓉千萬狀紫峰高處從中起瑤臺紺宇白雲𥚃古松偃蹇不知年溪流惟見石齒齒遙接崑崙巔下看扶桑水天際長河一線來鯨掀鰲掣勢難止日觀蓮峰稱最高嵬乎泰華未足恃有峰六十信插天森森劍㦸自蜿蜒玉女青童遞隱見紫微黃蓋生雲煙上有三花之古樹下有百丈之飛泉晴空片片灑寒雪飛蘿懸瀉如珠連我欲乘風到絶嵿恨無羽翰愁攀緣策杖徘徊日將午倏忽隂雷散輕雨長風為我捲浮雲飛來倒掛巖前樹振衣宛轉陟層巔四顧茫茫小寰宇神僧面壁人不知仙子吹笙鶴自舞即欲舉手探月窟廣寒倣佛見銀闕醉把金壺餐綺霞坐看玉鏡邀明月入石室臥雲門那知身外有乾坤劃然長嘯如雷奔萬壑雲霾虎豹蹲山鬼倚巖笑山鳥繞樹喧靈怪恍惚不可測更從何處問真源君不見周家申甫元非偶詩云嶽降理或有又不見盧鴻巖下草生春卜居偏傍洗耳人吁嗟乎靈山自是育精英古來高士留其名秀色攬結真堪把而我豈終軒冕者紅塵白馬竟何為不如棲息此山下出山日落迷煙霧回首恐失桃源路他年儻得伴松筠買山還許留詞賦解五嶽圖贈少林寺僧洪川廣令歌陳文燭大理寺卿夜坐不厭山中月晝行不厭山中雲雲飛月落興無盡披圖指點岡巒分此圖真形號最古天壤名山惟有五芙蓉日觀在東南蓮花仙掌開西土太行峨峨碧玉間一到嵩丘是中宇携來傍我亦有年何人贈之郭次甫高僧况是惠遠流卜居它日誰為主好勒達磨第一峰寒林夜半生風雨嵩丘歌送蔣子雲薛蕙吏部考功郎中君不見𢖍恆泰華奠九州豫州巨鎮名嵩丘中天照耀白日景后土灌注黃河流往者天皇題寶帙五嶽真形標第一三花隱映玉女臺二峰羅列仙人室曾聞軒后駐雲駢復有周儲吟鳳笙緱氏山頭鸞鶴去鼎湖水上蛟龍迎君看萬乘亦何似古人棄之如脫屣紛紛流俗笑此言肯把山林易青紫世間萬事俱零落何用明珠彈鳥雀因嗟季子狹三河轉憶尚平娛五嶽我今思歸殊未還夢中每每遊仙山頗疑羽翼落天外但覺烟霧非人間君不見謝公李白神蕭爽天姥羅浮夢來往豫也頻夢山中遊心知自是神仙流異時最愛安期術擬臥名山采芝术羽化青雲雖未期肥遁丹崖詎為失送君南行洛陽道一望嵩山愁絶倒溪口空餘躑躅花澗中不見菖蒲草薄遊已自厭風塵多病祇堪學隱淪明年定訪浮丘伯為掃雲林作主人五言律詩少林寺𨶒禹錫監察御史梵闕珠林靜巍巍枕大阿嵐風當戶擁鳥韻隔花多禪室通幽徑金田長亂莎山門環洛水萬籟響清和周公臺厲仲彰周公初建洛昌運此時開天子垂衣坐諸侯執玉來仁風涵九有王氣接三台餘烈今猶在江山繞廢臺漢柏厲仲彰嵩陽有嘉樹漢武號將軍老大空懷寵孤高自出群樛枝懸日月老幹挾風雲正合明堂用誰能運斧斤盧巖寺孫永思河南巡按御史僧笛從雲墮翛翛引露旌翠微通樹色虛谷應鐘聲弔古深山入尋幽仄徑行當門萬竿竹長日引風清望日遊少林寺陳棐夕陽在嶺外林壑已黃昏真境藏蘭若幽尋入祇園慧燈明佛界圓月滿空門欲問傳衣法石間幻影存過少林寺再吟毛伯溫兵部尚書聞道嵩山峻今知天下奇千巖屏障列二室霧雲移野鶴巢煙樹松風漾石池徘徊為幽興不覺日西垂過少林二首王河南提學副使披霧縱幽尋頻年說少林到門山雨至繞寺石泉吟花落中天淨松藏太室深燈龕耿未滅猶自照禪心其二草樹連中嶽煙霞𭘧北邙古禪傳後魏巍碣峙初唐地僻鯨音壯峰高鶴韻長浮丘招未去夜夜禮名香會善寺王青山迂轡至不顧客程違荏苒惜芳歲留連餘落暉石同僧貌古泉共梵音微亦有箕山對無人禁采薇戒壇王兩日登三剎興衰亦漫傷樹交雲榻廢草長石壇荒乞供朝馴鴿栖禪夜怖狼惟餘茶榜在贏得打碑忙奉陪巖翁相公遊少林寺二首薛蕙吏部考功郎中久悔凡夫行今參初祖禪山開諸佛界樹換六朝年聖諦元無法真空詎有詮不知衣鉢外何物是相傳其二少林多老宿祖意若為傳莫學諸方法應參一味禪真心元寂滅妄想浪攀緣季世須龍象題