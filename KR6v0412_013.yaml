且單夜扣柴門與我別媿君冐寒來別我為君沽酒張燈火酒酣火暖與君言何事入𨵿又出𨵿答云前年偶下山四十餘月客長安長安古來名利地空手無金行路難朝遊九城陌肥馬輕裘欺殺客暮㝛五侯門殘茶冷酒愁殺人春明門門前便是嵩山路幸有雲泉容此身明日辤君且歸去雜體送考功武員外學士使嵩山置舍利徐堅集賢院學士伊川別騎灞岸分筵對三春之花月覽千里之風烟望青山兮分地見白雲兮在天寄愁心于尊酒愴離緒于清絃共握手而相顧各銜悽而黯然嵩山天門歌宋之問登天門兮坐盤石之磷𥒘前漎漎兮未平下漠漠兮無垠紛窈窕兮巖倚披以鵬翅洞膠葛兮峰稜層以龍鱗松移岫轉左變而右易風生雲起出鬼而入神吾亦不知其靈恠如此願遊杳冥兮見羽人重曰天門兮窮崇𢌞合兮攢藂松萬接兮柱日石千尋兮倚空晚隂兮足風夕陽兮赭紅試一望兮奪魄况眾妙之無窮五言律詩登石門駱賔王臨海丞層巖遠接天絕嶺上棲煙松低輕蓋偃藤細弱絲縣石明如挂鏡苔分似列錢蹔策為龍杖何處得神仙同太平公主遊九龍潭武后山牕遊玉女澗戶對瓊峰巖頂翔雙鳳潭心倒九龍酒中浮竹葉杯上冩芙蓉欲驗山家賞唯有風入松嶽館沈佺期洞壑仙人館孤峰玉女臺空濛朝氣合窈窕夕陽開荒澗含輕雨虛巖應薄雷正逢鸞與鶴歌舞出天來幸少林寺應制沈佺期長歌遊寶地徙倚對珠林鴈風霜古龍池歲月㴱紺園澄夕霽碧殿下秋隂歸路煙霞晚山蟬處處吟扈從嵩山途中作宋之問帳殿鬱崔嵬仙遊實壯哉曉雲連幕捲夜火雜星回谷暗千旗出山鳴萬乘來扈遊良可賦終乏掞天材幸少林寺應制宋之問紺宇橫天室𢌞鑾指帝休曙隂迎日盡春氣抱巖流空樂繁行漏香煙薄綵斿玉膏從此泛仙馭接浮丘登嵩山嶺應制宋之問翼翼高旌轉鏘鏘鳳輦飛塵銷清蹕路雲濕從臣衣白羽搖丹壑天營逼翠微芳聲耀千古四海警宸威幸嶽寺應制宋之問蹔幸珠筵地俱憐石瀨清泛流張翠幕拂迥挂紅旌雅曲龍調管芳尊蟻泛𦨻陪歡玉座晚復得聽金聲扈從登封告成頌宋之問複道開行殿鉤陳列禁兵和風吹鼓角佳氣動旗旌後騎𢌞天苑前山入御營萬方俱下拜相與樂昇平緱山廟宋之問王子賔仙去飄颻笙鶴飛徒聞滄海變不見白雲歸天路何其遠人間此會稀空歌日云暮霜月漸微微寄嵩陽隱者李咸昔年江上別初入亂離中我住匡山北君之少室東信來經險道詩半憶皇風何事猶高臥巖邊夢未通永泰公主挽歌二首吳兢右庶子後為恒王傅穠華從婦道釐降諸侯河漢天孫合瀟湘帝子遊𨵿雎方作訓鳴鳳自相求可歎凌波迹東川遂不流其二舜華徂北渚宸思結南陽綬哀榮備遊軒寵悼彰三川謀遠日八水宅連岡無復秦樓上吹簫下鳳凰陪張丞相登嵩陽樓孟浩然襄陽布衣獨步人何在嵩陽有故樓歲寒問耆舊行縣擁諸侯林莽北彌望沮漳東會流客中遇知己無復越鄉憂汝墳寄盧徵君孟浩然行乏憩余駕依然見汝墳洛川方罷雪嵩嶂有殘雲曳曳半空裏溶溶五色分聊題一時興因寄盧徵君遊精思題觀主山房孟浩然誤入花源裏初憐竹逕㴱方知仙子宅未有世人尋舞鶴過閒砌飛猿嘯密林漸通玄妙理㴱得坐忘心遊精思觀𢌞王白雲在後孟浩然出谷未停午至家日已曛𢌞瞻山下路但見牛羊群樵子暗相失草蟲寒不聞衡門猶未掩佇立望夫君口號贈盧徵君鴻李白陶令辤彭澤梁鴻入會稽我尋高士傳君與古人齊雲臥留丹壑天書降紫泥不知楊伯起早晚向𨵿西中峰居喜見苗發祖詠駕部員外郎自得中峰住㴱林亦閉𨵿經秋無客到入夜有僧還暗澗泉聲小荒岡樹影閒高牕不可望星月滿空山謁啟母祠崔曙閟宮凌紫微芳草閉閒扉帝子復何在王孫遊不歸春風鳴玉珮暮雨拂靈衣豈但湘江口能令懷二妃緱山廟崔曙遺廟肅隂隂孤峰映綠林步隨仙路遠意入道門㴱澗水流年月山雲變古今袛聞風竹裏猶有鳳笙音送盧逸人李頎洛陽為此別攜手更何時不復人間見袛應海上期清溪入雲木白首臥茅茨共惜盧敖去天邊望所思歸嵩山作王維清川𭘧長薄車馬去閒閒流水如有意暮禽相與還荒城臨古渡落日滿秋山迢遞嵩山下歸來且閉𨵿過方尊師院綦母潛著作郎羽客北山尋草堂松徑㴱養神宗示法得道不知心洞戶逢雙履寥天有一琴更登玄圃上仍種杏成林謁焦鍊師王昌齡龍標尉中峰青苔壁一點雲生時豈意石堂裏得逢焦鍊師爐香淨棐案松影閒瑤墀拜受長年藥翩西海期登少室山寺褚朝陽大曆時人飛閣青雲裏先秋獨早凉天花映近月桂拂簷香華嶽三峰小黃河一𭘧長空聞指歸路煙處有垂楊滻水東店送唐子歸嵩陽岑參野店臨官路重城壓御隄山開灞水北雨過杜陵西歸夢秋能作鄉書醉嬾題橋回忽不見征馬尚聞嘶尋少室張山人聞與偃師周明府入都岑參中峰鍊金客昨日遊人間葉縣鳬共去葛陂龍蹔還春雲湊㴱水秋雨懸空山寂寂青谿上空餘丹竈閒送靈澈上人歸嵩陽蘭若劉長卿南地隨緣久東林幾歲空暮山門獨掩春草路難通作梵連松韻焚香入桂叢唯將舊瓶鉢𨚫寄白雲中遊少林寺戴叔倫經略使步入招提路因之訪道林石龕蒼蘚積香徑白雲㴱雙樹含秋色孤峰起夕隂屧廊行欲遍回首一長吟㝛靈巖寺戴叔倫馬疲盤道峻投㝛入招提雨急山溪漲雲迷嶺樹低凉風來殿角赤日下天西偃腹虛簷外林空恣鳥啼送李城門罷官歸嵩陽權德輿與君相識處吏隱在墻東啟閉千門靜逢迎兩掖通罷官多暇日肄業有儒風歸去塵寰外春山蘭桂叢送盧處士歸嵩山別業劉禹錫禮部尚書世業嵩山隱雲㴱無四隣藥爐燒姹女酒甕貯賢人晚日華隂霧秋風函谷塵送君從此去鈴閣少談賔看嵩洛有嘆白居易今日看嵩洛回首嘆世間榮華急如水憂患大於山見苦方知樂經𢗅始愛閒未聞籠裏鳥飛出肯飛還早春題少室東巖白居易三十六峰晴雪消嵐翠生月留三夜㝛春引四山行遠草初含色寒禽未變聲東巖最高石唯我有題名夜從法王寺下歸嶽寺白居易雙剎夾虛空緣雲一逕通似從忉利下如過劒門中燈火光初合笙歌曲未終可憐獅子坐昇出淨名翁㝛石窟寺喻鳬一剎古岡南孤鐘撼夕嵐客閒明月閣僧閉白雲菴野鶴立枯枿天龍吟淨潭因知無生理合自此中探贈中嶽僧方干處士坐來叢木大誰見入巖年多病長留藥無憂亦是禪搘牀移片石舂粟引高泉盡願求心法逢誰擬即傳送韓處士歸少室山張喬進士江外立千岑還歸少室吟地閒緱嶺月迥洛城砧石竇垂寒乳松枝長別琴他年瀑泉下亦擬置家林寄中嶽顓頊先生張喬先生顓頊後得道自何人松柏卑于壽兒孫老𨚫身夜峰頂曙寒澗洞中春戀此逍遙境雲間不見親題嵩陽隱者崔𡍼進士四十年高夢生涯指一丘無人同久住有鶴對冥修草雜芝田出泉和石髓流更嫌庭樹老疑是世間秋題嵩高隱者居鄭谷都官郎中豈易訪仙蹤雲蘿千萬重他年來卜隱此境願相容亂木林中路㴱山望裏鐘見君琴酒樂𢌞首興何慵潁陽縣韋莊琴堂連少室故事即仙蹤樹老風聲壯山高臘𠋫濃雪多庭有鹿縣僻地無鐘何處留詩客茅簷倚後峰㝛山寺張蠙中峰半夜起忽覺有青冥此界自生雨上方猶有星樓高鐘尚遠殿古像多靈好是潺湲水房房伴誦經贈王道士釋清塞藥力資蒼鬢應非舊日身一為嵩嶽客幾洛陽人冰縫瓢探水雲根斧斷薪𨵿西往來熟誰得水銀銀送賛律師歸嵩山釋清江禪客歸山意山㴱定易安清貧修道苦孝友別家難雲路尋溪轉花宮映嶽看到時松暮松月向人寒七言律詩遊石淙詩並序武后若夫圓嶠方壺涉滄波而靡際金臺玉闕陟玄圃而無階惟聞山海之經空覽神仙之記爰有石淙者即平樂澗也尓其近接嵩嶺俯届箕峰瞻少室兮若蓮睇潁川兮如𭘧既而躡崎嶇之山徑䕃蒙密之藤蘿洶湧洪湍落虛潭而送響高低翠壁列幽澗而開筵密舒帷屏梅氛而蕩燠踈松引吹清麥𠋫以含凉就林藪而王心神對煙霞而滌塵累森沈丘壑即是桃源淼漫平流還浮竹箭䋄薜荔而成帳聳蓮石而如樓洞口全開溜千年之芳髓山腰半坼吐十里之香粳無煩崐閬之遊自然形勝之所當使人題綵翰各冩瓊篇庶無滯於幽栖冀不孤於泉石各題四韻咸賦七言聖製三山十洞光玄籙玉嶠金巒鎮紫微均露均霜標勝壤交風交雨列皇畿萬仞高巖藏日色千尋幽澗浴雲衣且駐歡筵賞仁智琱鞍薄晚雜塵飛侍遊應制碑刻每人名上有臣字名下有上字今削皇太子顯三陽本自標靈紀二室由來獨擅名霞衣霞錦千般狀雲峰雲岫百重生水炫珠光遇泉客巖懸石鏡厭山精永願乾坤符睿算長居膝下屬歡情太子左奉裕率兼檢校安北大都護相王旦奇峰嶾嶙箕山北秀㟧岹嶢嵩鎮南地首地何曾擬天目天台倍覺慙樹影蒙籠鄣疊岫波聲洶湧落懸潭願紫宸居得一永欣丹扆御通三太子賓客上柱國梁王三思此地巖壑數千重吾君駕鶴乘龍掩映光含翡翠參差石影𭘧芙蓉白日將移衝疊巘玄雲欲度礙高峰對酒鳴琴追野趣時聞清吹入長松內史狄仁傑宸暉降望金輿轉仙路崢巆碧洞幽羽仗遙迎鸞鶴駕帷宮直坐鳳麟洲飛泉灑液恒疑雨密樹含凉鎮似秋老臣預陪玄圃宴餘年方共赤松遊奉宸令張易之六龍驤首曉駸駸七聖陪軒集潁隂千丈松蘿交翠幕一丘山水當鳴琴青鳥白雲王母使垂藤斷葛野人心山中日暮幽巖下泠然香吹落花㴱麟臺監中山縣開國男張名剝落或昌宗也雲車遙裔三株樹帳殿交隂八桂藂磵嶮泉聲疑度雨川平橋勢若晴虹叔夜彈琴歌白雪孫登長嘯韻清風即此陪歡遊閬苑無勞辛苦向崆峒鸞臺侍郎李嶠羽蓋龍旗下絕冥蘭除薜幄坐雲扃鳥和百籟疑調管花發千巖似畫屏金竈浮煙朝漠漠石牀寒水夜泠泠自然碧洞窺仙境何必丹丘是福庭鳳閣侍郎蘇味道琱輿藻衛擁千官仙洞靈谿訪九丹隱曖源花迷近路參差嶺竹掃危壇重崖對聳霞文駮瀑水交飛雨氣寒日落宸襟有餘興徘徊周矖駐歸鑾夏官侍郎姚元崇二室三塗光地險均霜揆日處天中石泉石境恒留月山鳥山花竸逐風周王久謝瑤池賞漢主懸慙玉樹宮別有祥煙伴佳氣能隨輕輦共䓗䓗給事中𨶒朝隱金臺隱隱陵黃道玉輦亭亭下絳雰千種岡巒千種樹一重巖壑一重雲花落風吹紅的歷藤垂日晃綠葐蒀五百里內賢人聚願陪閶闔侍天文鳳閣舍人崔融洞口仙巖類削成泉香石冷晝含清龍旗畫月中天下鳳管披雲此地迎樹作帷屏陽景翳芝如宮闕夏凉生今朝出豫臨玄圃明日陪遊向赤城奉宸大夫汾隂縣開國男薛曜玉洞幽尋更是天朱霞綠景鎮韶年飛花藉藉迷行路囀鳥遙遙作管絃霧隱長林成翠幄風吹細雨即紅泉此中碧酒恒參聖浪道崐山別有仙守給事中徐彥伯碧淀紅涔㟧嶂閒淙嵌洑岨洊成灣琪樹琁娟花未落銀芝窟咤露初還八風行殿開仙牓七景飛輿下石𨵿張蔦席雲平圃讌焜煌金記蘊名山右玉鈐衛郎將左奉宸內供奉楊敬述山中別有神仙地屈曲幽㴱碧澗垂巖前蹔駐黃金輦席上還飛白玉巵遠近風泉俱合雜高低雲石共參差林壑偏能留睿賞長天莫遽下丹曦司封員外于季子九旗雲布臨嵩室萬騎星陳集潁川瑞液含滋登禹膳飛流薦響入虞絃山扉野逕朝花積帳殿帷宮夏連微臣獻壽迎千壽願奉堯年億萬年通事舍人沈佺期金輿旦下綠雲衢綵殿晴臨碧澗隅谿水泠泠雜行漏巖煙片片遶香仙人六膳調神鼎玉女三漿捧帝壺自昔汾陽紆道駕何如太室覽真圖是碑刻于久視元年蕤賔之月薛曜奉敕書也在石淙北岸磨崖石為之下臨㴱谿非架木為梁不可以讀世鮮有見者所傳僅沈佺期宋之問應制二篇而已今觀碑列十六人延清之名與其詩俱不載豈別有續遊耶抑此公中熱而擬作也按傳稱三陽宮御苑東西二十里削巒起觀竭流漲海池亭奇巧仰出雲路今尋一斷礎敗瓦了不可得獨此石以僻險完好無恙予棧觀良久因嘆武氏操粉奩而移國命此時年七十有六耄矣猶復作此清遊勝語文彩精神暎𭘧千古之下豈其人果由天縱耶惟是太子相王與三思鴈行在側而狄姚諸公亦與二三嬖幸之臣接席唱和不知當日母子君臣作何面孔相向真不滿弔古者一笑耳予故備錄如其式而梓之俾後世有所考焉更從正文十一字剥落闕四字侍遊石淙應制宋之問離宮祕苑勝瀛洲別有仙人洞壑幽巖邊樹色含風冷石上泉聲𭘧雨秋鳥向歌筵來度曲雲依帳殿結為樓微臣昔忝方明御今日還陪八駿遊過乘如師蕭居士嵩丘蘭若王維無著天親弟與兄嵩丘蘭若一峰晴食隨鳴磬巢烏下行踏空林落葉聲迸水定侵香案濕雨花應共石牀平㴱洞長松何所有儼然天竺古先生送方尊師歸嵩山王維仙官欲往九龍潭旄節朱幡倚石龕山厭天中半天上洞穿江底出江南瀑布杉松常𭘧雨夕陽蒼翠忽成嵐借問迎來雙白鶴已曾衡嶽送蘇眈送常十九歸嵩山故林劉長卿迢迢此恨杳無涯楚澤嵩丘萬里賖岐路別時驚一葉雲林歸處憶三花秋天蒼翠寒飛雁古堞蕭條晚噪鴉他日山中逢勝事桃源洞裏幾人家題嵩陽焦道士石壁錢起考功郎中三峰花畔碧堂懸錦里真人此得仙玉醴纔飛西蜀雨霓裳欲向大羅天綵雲不散燒丹竈白鹿時藏種玉田幸入桃源因去世方期丹訣一延年謁許由廟錢起故向箕山訪許由林泉物外自清幽松上挂瓢枝幾變石間洗耳水空流綠苔唯見遮三徑青史空傳謝九州緬想古人增嘆息颯然雲樹滿巖秋酬暢當嵩山尋麻道士見寄盧綸聞逐樵夫閒看棋忽逢人世是秦時開雲種玉嫌山淺渡海傳書怪鶴遲隂洞石幢微有字古壇松樹半無枝煩君遠示青囊籙願得相從一問師送澹公歸嵩山龍潭寺楊巨源河中少尹野煙秋水滄茫遠禪境真機去住閒雙樹為家思舊壑千花成禮寒山洞宮曾向龍邊㝛雲徑應從鳥外還莫戀本師金谷地空門無處復無𨵿嵩陽觀夜奏霓裳白居易開元遺曲自凄凉况近秋天調是商愛者誰人唯白尹奏時何處在嵩陽迥臨山月聲彌怨散入松風韻更長子晉少姨聞定怪人間亦便有霓裳與諸道者同遊二室至九龍潭作白居易喜逢二室遊仙子厭作三川守土臣舉手摩挲潭上石開襟抖擻府中塵他日終為獨往客今朝未是自由身若言尹是嵩山主三十六峰應笑人從龍潭寺至少林題贈同遊者白居易山屐田衣六七賢搴芳踏翠弄潺湲九龍潭月落杯酒三品松風飄管絃強健且宜遊勝地清凉不覺過炎天始知鶴駕乘雲外別有逍遙地上仙欲遊嵩嶽留別李少尹益賈島司倉參軍孤策遲𢌞洛水湄孤禽嘹唳幸人知嵩嶽望中常待我河梁欲上未題詩新秋愛月愁多雨古觀逢仙看盡棋微眇此來將敢問鳳凰何日定歸池同徐處士秋懷少室舊居周賀處士曾居少室黃河畔秋夢長懸未得回扶病半年離水石思歸一夜隔風雷荒齋幾遇僧眠後晚菊頻經鹿踏來燈下此心誰共說傍松幽徑已多苔送蕭處士歸緱山別業許渾節勝二州刺史醉𢽽烏帽髮如絲曾看仙人一局棋賔館有魚為客久鄉書無雁到家遲緱山住近吹笙廟湘水行逢鼓瑟祠今夜月明何處㝛九疑雲盡綠參差題潁源廟韋莊曾是巢由棲隱地百川唯說潁源清微波乍向雲根出去浪遙衝雪嶂橫萬木倚簷踈榦直群峰當戶曉嵐晴臨川試問堯年事猶被封人勸濯纓看賀自真飛昇陳陶處士子晉鸞飛古洛川金桃再熟賀郎仙三清樂奏嵩丘下五色雲屯御苑前朱頂舞低迎絳節青鬟歌對駐香軿誰能白晝相悲哭太極光隂幾萬年和趙嘏題嶽寺溫庭筠方山尉疎鐘細響亂鳴泉客省高臨似水天嵐翠暗來空覺潤澗茶餘爽不成眠越僧寒立孤燈外嶽月秋當萬木前張邴宦情何太薄遠公外有池蓮寄嵩陽道人曹鄴洋州刺史三山浮海倚蓬瀛路入真元險盡平華表千年孤鶴語人間一夢晚蟬鳴將龍逐虎神初定積火焚心氣漸清見說嵩陽有仙客欲持金簡問長生遊上方石窟寺劉滄龍門令苔徑縈𢌞景漸分翛然空界靜埃氛一聲疎磬過寒水半壁危樓隱白雲雪下石龕僧在定日西山木鳥成羣幾來吟嘯立朱檻風起天香處處聞贈顓頊山人劉滄浩氣含真玉片輝著書精義入玄微洛陽紫陌幾曾醉少室白雲時一歸松雪月高唯鶴㝛煙嵐秋霽到人稀知君濟世有長策莫問滄浪隱釣磯龍泉寺絕頂方干未明先見海底日良久遠雞方報晨古樹含風常𭘧雨寒巖四月始知春中天氣爽星河近下界時豐雷雨均前後登臨思無盡年年改換往來人龍潭張道者伍喬碧洞幽巖獨息心時人何路得相尋養生不說憑諸藥適意惟聞在一琴石逕掃稀山蘚合竹軒開晚野雲㴱他年功就期飛去應笑吾徒多苦吟五言排律和劉侍郎入隆唐觀楊炯盈川令福地隂陽合仙都日月開山川臨四險城樹隱三臺伏檻排雲出飛軒遶澗𢌞參差凌倒影瀟灑軼浮埃百果珠為實群峰錦作苔懸蘿暗疑霧瀑布響成雷方士燒丹液真人泛玉杯還如問桃水更似得蓬萊漢帝求仙日相如作賦才自然金石奏何必上天台從駕幸少林寺覩先妃營建之所倍切焭衿逾悽遠慕聊題即事用述悲懷武后陪鑾遊禁苑侍賞出蘭闈雲偃攢峰蓋霞低插浪旂日宮疏澗戶月殿啟巖扉金輪轉金地香閣曳香衣鐸吟輕吹發幡搖薄霧霏昔遇焚芝火山紅迊野飛花臺無半影蓮有全輝寔賴能仁力攸資善逝威慈緣興福緒於此歸依風枝不可靜泣血竟何追扈從登封告成頌應制宋之問御路𢌞中嶽天營接下都百靈無後至萬國競前驅文衛嚴清蹕幽仙讀寶符貝花明漢果芝草入堯厨濟濟衣冠會喧喧夷夏俱宗禋仰神理刊木望山途撫己貧非病時來本不愚願陪丹鳳輦率舞白雲衢秋日於天中寺尋復禮上人武三思封梁王後伏誅妙域三時殿香巖七寶宮金繩先界道玉柄即談空喻筏知何極傳燈竟不窮彌天高義遠初地勝因通理詣歸一處心行不二中有無雙惑遣真俗兩緣同摘葉疑焚翠投花若散紅網珠遙暎日簷鐸近吟風定沼寒光素禪枝暝色蔥願隨方便力長冀釋塵籠和武三思於天中寺尋復禮上人之作蘇味道眉州刺史藩戚三雍暇禪居二室隈忽聞從桂苑移步踐花臺敏學推多藝高譚屬辯才是非寧滯著空有掠嫌猜五術幽機暢三番妙鍵開味同甘露灑香似遡風來砌古留方石池清辨火灰人尋鶴洲返月逐虎谿𢌞企躅瞻飛蓋攀游想渡杯願陪為善樂從此去塵埃登封禮畢洛城酺宴奉和聖製張九齡中書令左遷長史大君畢能事端扆樂成功運與千齡合歡將萬國同漢酺歌聖酒韶樂舞薰風河洛榮光遍雲煙喜氣通春華頓覺早天澤倍知崇草木皆沾被猶言不在躬送漪叔遊潁川兼謁淮陽太守李頎罷吏今何適辤家方獨行嵩陽入歸夢潁水半前程聞道淮陽守東南臥理清郡齋觀政日人馬望鄉情疊嶺雪初霽寒砧霜後鳴臨川嗟拜手寂寞事躬耕題石窟寺宋昱中書舍人梵宇開金地香龕鑿鐵圍影中群象動空裏眾靈飛簾牖籠朱旭房廊挹翠微瑞蓮生佛步寶樹挂天衣邀福功雖在興王代久非誰知雲朔外更覩化胡歸寄張十二山人彪杜甫工部員外郎獨臥嵩陽下三違潁水春艱難隨老母慘澹向時人謝氏尋山屐陶公漉酒巾群兇彌宇宙此物在風塵歷下辤姜被𨵿西得孟鄰早通交契密晚接道流新靜者心多妙先生藝絕倫草書何太古詩興不無神曹植休前輩張芝更後身數篇吟可老一字買堪貧將恐曾防寇㴱潛託所親寧聞倚門夕盡力潔餐晨踈嬾為名誤驅馳喪我真索居猶寂寞相遇益愁辛流轉依邊徼逢迎念席珍時來故舊少亂後別離頻世祖修高廟文公賞從臣商山猶入楚渭水不離秦存想青龍祕騎行白鹿馴耕巖非谷口結草即河濱肘後符應驗囊中藥未陳旅懷殊不愜良覿眇無因自古皆悲恨浮生有屈伸此邦今尚武何處且依仁鼓角凌天籟𨵿山倚月輪官場羅鎮磧賊火近洮岷蕭瑟論兵地蒼鬬將辰大軍多處所餘孽尚紛綸高興知籠鳥斯文起獲麟窮秋正搖落回首望松筠和鄭少府祭中嶽寺因訪蕭居士之作皇甫冉右補闕肅事祠靈境尋真到隱居夤緣幽谷遠蕭散白雲餘晚節持僧律他年著道書海邊曾狎鳥濠上正觀魚寂靜求無相淳和覩太初一峰綿歲月萬象任盈虛門掩林鐘度窻臨澗水疎謝公懷舊壑迴駕復何如酬暢當尋嵩嶽麻道士見寄盧綸自別前峰隱同為外累侵幾年親酒會此日有僧尋學稼功還棄論邊事亦沈眾歡徒滿目專愛久離心覽𩯭絲垂鏡彈琴淚灑襟訪田悲洛下寄宅憶山隂薄溜漫青石橫雲架碧林壞簷藤陣密衰菜棘籬㴱流散俱多故憂傷併在吟唯當竢高躅歸止共抽簪和太常王卿秋日即事盧綸嵩高雲日明岳賦初成籬槿花無色堦桐葉有聲絳紗垂簟淨白羽拂衣輕鴻鴈悲天遠龜魚覺水清別絃添楚思牧馬動邊情田雨農官問林風苑吏驚松篁終茂盛蓬艾自衰榮遙仰憑軒夕惟應善宋生題緱山王子晉廟鄭畋檢校司徒贈太傅在昔靈王子吹笙遡泬寥六宮攀不住三島去相招亡國原陵古賔天歲月遙無蹊窺海曲有廟訪山椒石帳龍蛇拱雲樓彩翠銷露壇粧琬琰真像冩松喬珠館青童宴琳宮阿母朝氣輿仙女侍天馬吏兵調湘妓紅絲瑟秦郎白管簫西城邀綽約南嶽命嬌嬈句曲觴金洞天台嘯石橋曉花珠弄蘂春茹玉生苗二景神光祕三元寶籙饒霧垂鴉翅髮冰束虎章腰鶴馭爭銜箭龍飛各獻綃衣從星渚浣丹就日宮燒物外花常滿人間葉自凋望臺悲漢戾閱水笑梁昭古殿香殘燼荒堦柳長條幾曾期七日無復䧏重霄嵩嶺絙天漢伊瀾入海潮何由得真訣使我珮環飄贈蕭鍊師并序許渾鍊師貞元初自棃園進為內妓善舞柘枝宮中莫有倫比者寵錫甚厚及駕幸奉天以病不獲從遂失所止洎復宮闈上頗懷其藝求之浹日得于人間後聞神仙之事謂長生可乞奉黃老上許之詔居嵩南洞清觀迨今八十餘矣雪膚花顏與昔無異則方龜鶴之壽安得不由所尚哉因賦是詩題于院壁曾試昭陽曲瑤齋帝自臨紅珠絡繡帽翠鈿束羅襟雙闕朝塵起千門㝛霧隂出宮迷國步回駕軫皇心桂殿春空晚椒居夜自㴱急宣求故劒冥契得遺簪暗記神仙傳潛封女史箴壺中知日永掌上畏年侵莫比班家扇寧同卓氏琴雲車辭鳳輦羽帔別鴛衾網斷魚游藻籠開鶴戲林洛煙浮碧漢嵩月上丹岑露草爭三秀風篁共八音吹笙延鶴舞敲磬引龍吟旄節纖腰舉霞杯皓腕斟還磨照寶鏡猶插辟寒金東海人情變南山聖壽沈朱顏常似渥綠髮已如尋養氣齊生死留形盡古今更求應不見雞犬日駸駸緱山月夜聞王子晉吹笙張仲素中書舍人王子千年後笙音五夜聞逶迤遶清洛斷續下仙雲泄泄飄難定啾啾曲未分松風助幽律波月動輕文鳳管聽何遠鸞聲若在群暗空思羽蓋餘韻自氛氳前題厲玄侍御史緱山明月夜岑寂隔塵氛紫府參差曲清宵次第聞韻流多入洞聲度半和雲拂竹鸞驚侶經松鶴舞群蟾光聽處合仙路望中分坐惜千巖曙遺音過汝墳前題鍾輅月滿緱山夜風傳子晉笙初聞盈谷遠漸聽入雲清杳異人間曲遙分鶴上情孤鸞驚欲舞萬籟寂無聲此夕留煙駕何時返玉京唯愁音響絕曉色出都城嵩山望幸王邕峻極位何崇方知造化功降靈逢聖主望幸表維嵩隱映連青壁嵯峨向碧空象車因叶瑞龍駕願升中萬歲聲長在千巖氣轉雄東都歌盛事西笑佇皇風五言絕句嵩山夜還宋之問家住嵩山下好采舊山薇自省遊泉石何曾不夜歸荅田徵君宋之問出遊杳何處遲回伊洛間歸寢忽成夢宛在嵩丘山題田洗馬遊巖桔橰陳子昂望遠長為客商山遂不歸誰憐北陵井未息漢隂機寄王長史祖詠汝潁俱㝛好往來託層巒終日何寂寞遶籬生蕙蘭贈柳喜自號嵩山老釋皎然一見嵩山老吾生恨太遲問君年幾許曾出上皇時七言絕句嵩山尋馮鍊師不遇崔曙青谿訪道凌煙曙王子仙成已飛去更值空山雷雨時雲林薄暮歸何處少室韋鍊師昇仙歌皇甫冉紅霞紫氣晝氤氳絳節青幢迎少君忽從林下昇天去空使時人禮白雲㟧嶺四望武元衡平章事封臨淮郡公漢家仙仗在咸陽洛水東流出建章野老至今猶望幸離宮秋樹獨蒼蒼寄李渤張籍主客郎中五渡溪頭躑躅紅嵩陽寺裏講時鐘春山處處行應好一月看花到幾峰山中五絕白居易遊嵩陽見五物各有所感感興不同隨興而吟因成五絕嶺上雲嶺上白雲朝未散田中青麥旱將枯自生自烕成何事能逐東風作雨無石上苔漠漠斑斑石上苔幽芳靜綠絕纖埃路傍凡草榮遭遇曾得七香車碾來林下㯉香檀文桂苦雕鐫生理何曾得自全知我無材老㯉否一枝不損盡天年澗中魚海水桑田欲變時風濤覆沸天池鯨吞蛟鬬波成血㴱澗游魚樂不知洞中蝙蝠千年鼠化白蝙蝠黑洞㴱藏避網羅遠害全身誠得計一生幽暗又何如王子晉廟白居易子晉廟前山月明人聞往往夜吹笙鸞吟鳳唱聽無拍多似霓裳散序聲送嵩客白居易登山臨水分無期泉石煙霞今屬誰君到嵩陽吟此句與交三十六峰知送友人遊嵩山陳羽嵩山歸路繞天壇雲影松聲滿谷寒君見九龍潭上月莫辤清夜訪袁安嵩陽客舍月夜憶清上人徐凝金部侍郎獨夜嵩陽憶上仙月明三十六峰前瑤池月勝嵩陽月人在玉清眠不眠緱山廟許渾王子求仙月滿臺玉笙清轉鶴徘徊曲終飛去不知處山下碧桃春自開前題鄭仲賢秋風寂寞秋雲輕緱氏山頭月正明帝子西飛仙馭遠不知何處夜吹笙箕山胡曾寂寂箕山春復秋更無人到此溪頭棄瓢碞畔中宵月千古空聞屬許由題中峰費冠卿中峰高拄泬寥天上有茅菴與石泉晴景獵人曾望見青藍色裏一僧禪門人焦弘祚陳懋齡校字
