body:
  text: 韻始篇二唐五言古詩歸山劉希夷一名庭芝汝州人歸去嵩山道煙花覆青草草綠山無塵山青楊柳春日暮松聲合空歌思殺人嵩嶽聞笙劉希夷月出嵩山東月明山益空山人愛清景散髮臥秋風風止夜何清獨夜草蟲鳴仙人不可見乘月近吹笙絳脣吸靈氣玉指調真聲真聲是何曲三山鸞鶴情昔去落塵俗願言聞此曲今來臥嵩岑何幸承幽音神仙樂吾事笙歌銘夙心田家王績待詔門下省家住箕山下門枕潁川濱不知今有漢唯言昔避秦琴伴前庭月酒勸後園春自得中林士何忝上皇人鳳笙曲沈佺期太子詹事憶昔王子晉鳳笙遊虛空揮手弄白日安能戀青宮豈無嬋娟子結念羅帷中憐壽不貴色身世兩無窮感遇陳子昂右拾遺吾愛鬼谷子青谿無垢氛囊括經世道遺身在白雲七雄方龍鬬天下亂無君浮榮不足貴遵養晦時文舒可彌宇宙卷之不盈分豈徒山木壽空與麋鹿群寄宋之問田遊巖太子洗馬信彼稱靈石居然狎遁棲徘徊承翠巘斌駁𭘧㴱溪夕隂起層岫清景半虹蜺風來應嘯阮波渡可琴稽僕也潁陽客望彼空思齊倘見山人至簪蒿且杖藜答田遊巖宋之問越州刺史家臨清溪水溪水遶盤石綠蘿四面垂褭褭百餘尺風泉度絲管苔蘚鋪茵席傳聞潁陽人霞外漱靈液忽枉巖中翰吟臥朝復夕何當遂遠遊物外𠋫逋客奉使嵩山途經緱嶺宋之問侵晨發洛城城中歌吹聲畢景至緱嶺嶺上煙霞生草樹饒野意山川多古情大隱德所薄歸來可退耕賦得雨從箕山來宋之問雨從箕山來倏與飄風度晴明西峰日綠縟南溪樹此時客精廬幸蒙真僧顧㴱入清淨理妙斷往來趣意得兩契如言盡共忘諭觀化靜不動聞鳥懸可悟向夕聞天香淹留不能去使至嵩山尋杜四不遇慨然復傷田洗馬韓觀主因以題壁贈杜侯杜四宋之問洛橋瞻太室期子在雲烟歸來不相見孤賞弄寒泉與君闊松石於茲二十年田公謝昭世韓子祕幽埏憶昔同携手山棲接二賢笙歌入玄地詩酒坐寥天舊友悉零落罷琴私自憐遊者非藥誤餐霞意可全為余理還策相與事靈仙初至崖口五渡宋之問崖口眾山斷嶔崟聳天壁氣衝落日紅影入春潭碧錦繢織苔蘚丹青畫松石水禽泛容與巖華飛的皪微路從此㴱我來恨于役惆悵情未已群峰暗將夕入崖口五渡寄李適徐彥伯宋之問抱琴登絕壑伐木泝清川路極意謂盡勢迴趣轉綿人遠草木秀山㴱雲影鮮余負海嶠情自昔微尚然彌曠十餘載今來宛仍前未窺仙源極獨進野人船時攀乳竇憩屢薄天牕眠夜絃響松月朝楫弄苔泉因冥象外理永謝區中緣碧潭可遺老丹砂堪學仙莫使馳光暮空令歸鶴憐答宋十一入崖口五渡見贈李適工部侍郎聞君訪遠山躋險造幽絕眇然青雲境觀奇彌年月登嶺亦泝溪孤舟事沿越崿嶂傅彩翠崖磴互欹缺石林上攢叢金澗下明滅捫壁窺丹井梯苔瞰乳穴忽枉巖中贈對翫未嘗輟殷勤獨往事委曲煉藥說邀余名山期從爾泛海渤歲晏秉夙心斯言匪張設答宋十一入崖口五渡見贈徐彥伯太子賓客聞有獨往客拂衣捐世心結忻薄枉渚撰念縈舊林經亘去崖合冥綿歸壑㴱琪樹環碧彩金潭生翠隂㳂洄弄沙榜危仄眺明岑夕聞桂裏猿曉翫松上禽雜珮蘊孤袖瓊敷綴雙衿我懷滄洲想懿爾白雲吟秉願理方叶存期跡易尋茲言庶不負為報巖中琴題元丹丘潁陽山居并序李白翰林供奉丹丘家于潁陽新卜別業其地北倚馬嶺連峰嵩丘南瞻鹿臺極目汝海雲嵓映鬱有佳焉白從之遊故有此作仙遊度潁水訪隱同元君忽遺蒼生望獨與洪崖群卜地初晦跡興言且成文𨚫顧北山斷前瞻南嶺分遙通汝海月不隔嵩丘雲之子合逸趣而我欽清芬舉跡倚松石談笑迷朝曛終願狎青鳥拂衣棲江濆題元丹丘山居李白故人棲東山自愛丘壑美青春臥空林白日猶不起松風清襟袖石潭洗心耳羨君無紛喧高枕碧霞裏潁陽別元丹丘李白吾將元夫子異姓為天倫本無軒裳契素以煙霞親嘗恨迫世網銘意俱未伸松柏雖寒苦羞逐桃李春悠悠市朝間玉顏日緇磷所共重山嶽所得輕埃塵精魄漸蕪穢衰老相憑因我有錦囊訣可以持君身當餐黃金藥去為紫陽賔萬事難並立百年猶崇晨別爾東南去悠悠多悲辛前志庶不易遠途期所遵已矣歸去來白雲飛天津聞丹丘子於城北營石門幽居中有高鳳遺跡僕離群遠懷亦有棲遁之志因序舊以寄之李白春華滄江月秋色碧海雲離居盈寒暑對此長思君思君楚水南望君淮水北夢魂雖飛來會面不可得疇昔在嵩陽同衾臥羲皇綠蘿笑簪𥿈丹壑賤巖廊晚途各分析乘興任所適僕在鴈門𨵿君為峨眉客心懸萬里外影滯兩鄉隔長劒復歸來相逢洛陽陌陌上何喧喧都令心意煩迷津覺路失託勢隨風以茲謝朝列長嘯歸故園故園恣閒逸求古散縹帙久欲入名山婚娶殊未畢人生信多故世事豈惟一念此憂如焚悵然若有失聞君臥石門㝛昔契彌敦方從桂樹隱不羨桃花源高鳳起遐曠幽人跡復存松風清瑤瑟溪月湛芳樽安居偶佳賞丹心期此論尋高鳳石門山中元丹丘李白尋幽無前期乘興不覺遠蒼崖渺難涉白石忽欲晚未窮三四山已歷千萬轉寂寂聞猿愁行行見雲𭣣高松上好月空谷宜清秋壑㴱古雪在石斷寒泉流峰巒秀中天登眺不可盡丹丘遙相呼顧我忽而哂遂造窮谷間始知靜者閒留歡達永夜清曉方言還訓岑勛見尋就元丹丘對酒相待以詩見招李白黃鶴東南來寄書冩心曲倚松開其緘憶我腸斷續不以千里遙命駕來相招中逢元丹丘登嶺宴碧霄對酒忽思我長嘯臨清飇蹇余未相知茫茫綠雲垂俄然素書及解此長渴饑策馬望山月途窮造階墀喜茲一會面若覩瓊樹枝憶君我遠來我歡方速至開顏酌美酒樂極忽成醉我情既不淺君意方亦㴱相知兩相得一顧輕千金且向山客笑與君論素心題嵩山逸人元丹丘山居有序李白白久在廬霍元公近遊嵩山故交㴱情出處無間巖信頻及許為主人欣然適會本意當冀長往不返欲便舉家就之兼書共遊因有此贈家本紫雲山道氣未淪落沉懷丹丘志冲賞歸寂寞朅來遊閎荒捫涉窮禹鑿夤緣泛湖海偃蹇涉廬霍憑雷躡天弄景憩霞閣且欣登眺美頗愜隱淪諾三山曠幽期四嶽聊所託故人憩嵩潁高義炳丹雘滅跡遺紛囂終言本峰壑自矜林湍好不羨朝市樂偶與真意并頓覺世情薄爾能折芳桂吾亦采蘭若拙妻好乘鸞嬌女愛飛鶴提攜訪神仙從此鍊金藥贈盧徵君昆弟李白明主訪賢逸雲泉今已空二盧竟不起萬乘高其風河上喜相得壺中趣每同滄洲即此地觀化游無窮水落海上青背覩方蓬與君弄倒景攜手凌星虹嵩山采菖蒲者李白神仙多古貌雙耳下垂肩嵩嶽逢漢武疑是九疑仙我來采菖蒲服食可延年言終忽不見滅影入雲煙喻帝竟莫悟終歸茂陵田魯城北郭曲腰桑下送張子還嵩陽李白送別枯桑下凋葉落半空我行懵道遠爾獨知天風誰念張仲蔚還依蒿與蓬何時一杯酒更與李膺同送于十八應四子舉落第還嵩山李白吾祖吹槖籥天人信森羅歸根復太素群動熙元和炎炎四真人摛辯若濤波交流無時寂楊墨曰成科夫子聞洛誦誇才才故多為金好踊躍久客方蹉跎道可束賣之五寶溢山河勸君還嵩丘開酌眄庭柯三花如未落乘興一來過送裴十八圖南歸嵩山李白何處可為別長安青綺門胡姬招素手延客醉金樽臨當上馬時我獨與君言風吹芳蘭折日沒鳥雀喧舉手指飛鴻此情難具論同歸無早晚潁水有清源君思潁水綠忽復歸嵩岑歸時莫洗耳為我洗其心洗心得真情洗耳徒買名謝公終一起相與濟蒼生送楊山人歸嵩山李白我有萬古宅嵩陽玉女峰常留一片月挂在東溪松爾去掇仙草菖蒲花紫茸歲晚或相訪青天騎白龍贈嵩山焦鍊師李白嵩山有神人焦鍊師者不知何許婦人也又云生於齊梁時其年可稱五六十常胎息絕穀居無室廬遊行若飛倐忽萬里世或傳其入東海登蓬萊竟不能測其往也予訪道少室登三十六峰聞風有寄灑翰遙贈二室凌青天三花含紫煙中有蓬海客宛疑麻姑仙道在喧莫染跡高想已綿時餐金鵝蕊屢讀碧苔篇八極恣遊憩九垓常周旋下瓢酌潁水舞鶴來伊川還歸空山上獨拂秋霞眠蘿月挂朝鏡松風鳴夜絃潛光隱嵩嶽鍊魄棲雲幄霓裳何飄飄鳳吹轉綿邈願同西王母下顧東方朔紫書倘可傳銘骨誓相學寄焦鍊師李頎新鄉得道凡百歲燒丹唯一身悠悠孤峰頂日見三花春白鶴翠微裏黃精幽澗濵始知世上客不及山中人仙境若在夢朝雲如可親何由覩顏色揮手謝風塵潁陽東谿懷古崔曙進士靈谿氛霧歇皎鏡清心顏空色不映水秋聲多在山世人久疎曠萬物皆自閒白鷺寒更浴孤雲晴未還昔時讓王者此地閉玄𨵿無以躡高步凄凉林壑間早發交崖山還太室崔曙一作薛據東林氣微白寒鳥忽高翔吾亦別茲去北山歸草堂仲冬正三五日月遙相望蕭蕭過潁上朧朧辨少陽川冰生積雪野火出枯桑獨往路難盡窮隂人易傷傷此無衣客如何度雪霜留別溫古上人兄并示舍弟縉王維尚書右丞解薜登天朝去師偶時哲豈惟山中人兼負松上月㝛昔同遊止身雲霞末開軒臨潁陽臥視飛鳥沒好依盤石飯屢對瀑泉歇理齊小狎隱道勝寧外物舍弟官崇高宗兄此削髮荊扉但灑掃乘閒當過拂戲贈張五弟諲時在常樂東園走筆成三首王維吾弟東山時心尚一何遠日高猶自臥鐘動始能飯領上髮未梳牀頭書不卷清川興悠悠空林對偃蹇青苔石上淨細草松下軟牕外鳥聲閒階前虎心善徒然萬象多澹爾太虛緬一知與物平自顧為人淺對君忽自得浮念不煩遣其二張弟五車書讀書仍隱居染翰過草聖賦詩輕子虛閉門二室下隱居十年餘宛是野人野時從漁父漁秋風日蕭索五柳高且疎望此去人世渡水向吾廬歲晏同攜手只應君與予其三設𦊨守兔垂釣伺遊鱗此是安口腹非𨵿慕隱淪吾生好清靜蔬食去情塵今子方豪蕩思為𪔂食人我家南山下動息自遺身入鳥不相亂見獸皆相親雲霞成伴侶虛白侍衣巾何事須夫子邀予谷口真至閒居精舍呈正上人即天后故宮儲光羲監察御史太室三招提其趣皆不同不同非一趣况是天遊宮雙嶺前夾門閣道復橫空寶坊若花積宛轉不可窮流泉自成池青松信饒風秋宴景氣𢌞晶明丹素功近將隱者鄰遠與西山通大師假慧照念以息微躬嵩陽觀即天皇故宮儲光羲真人上清室乃在中峰前花霧生玉井霓裳畫列仙念茲宮故宇多此地新泉松栢有清隂薜蘿亦自妍一聞步虛子又話逍遙篇忽若在雲漢風中意泠然𦂐氏尉沈興宋置酒南溪留贈王昌齡龍標尉林色與溪古㴱篁引幽翠山樽在漁舟棹月情已醉始窮清源口壑絕人境異春泉滴空崖萌草坼隂地久之風榛寂遠聞樵聲至海鴈時獨飛永然滄洲意古時青冥客滅迹淪一尉五子躊躇心豈其紛埃事𦂐岑信所剋濟北余乃遂齊物意己會息肩理猶未卷舒形性表脫略賢哲議乘月期角巾飯僧嵩陽寺過𦂐山王處士黑石谷隱居岑參嘉州刺史舊居𦂐山下偏識𦂐山雲處士久不還見雲如見君別來逾十秋兵馬日紛紛青谿開戰塲黑谷屯行軍遂令巢由輩遠逐麋鹿群獨有南澗水潺湲如昔聞山西峰草堂岑參結廬對中嶽青翠常在門遂耽水木興盡作漁樵言頃來闕章句但欲閒心魂日色隱空谷蟬聲喧暮村曩聞道士語偶見清淨源隱几閱吹葉乘秋眺歸根獨遊念求仲開徑招王孫片雨下南澗孤峰出東原栖遲慮益淡脫略道彌敦野藹晴拂枕客帆遙入軒尚平今何在此意誰與論佇立雲去盡蒼蒼月滿園自陵尖還少室秋夕憑眺岑參草堂近少室夜靜聞風松月出陵尖照見十六峰九月山葉赤谿雲淡秋容火點伊陽村煙㴱嵩角鐘尚子不可見蔣生難再逢勝愜只自知佳趣為誰濃昨詣山僧期上到天壇東向下望雷雨雲間見回龍久與人群疎轉愛丘壑中心淡水木會興幽魚鳥通稀微了自釋出處乃不同况本無宦情誓將依道風㝛五渡谿仙人得道處常建旴𣅿尉五渡谿上花生根依兩崖二月尋片雪願㝛秦人家上見懸崖崩下見白水湍仙人彈碁處石上青蘿盤無處求玉童翳翳惟林巒前谿遇新月聊取玉琴彈詠史李華司戶參軍巢許在嵩潁陶唐不得臣九州尚洗耳一命安能親綿邈數千祀丘中誰隱淪朝遊公卿府夕是山林人蒲帛揚側陋薜蘿為搢紳九重念入夢三事思降神且設庭中燎寧窺泉下人季冬自嵩山赴洛道中作獨孤及司封郎中皇運偶中變長虵食中土天蓋西北傾眾星隕如雨胡塵動地起千里聞戰鼓死人成為阜流血𡍼草莽策馬何紛紛捐軀抗豺虎甘心赴國難誰謂荼葉苦天子初受命省方造區宇斬鯨安溟波截作天柱三微復正統五玉歸文祖不圖漢官儀今日忽再覩升高望京邑佳氣連海浦寶𪔂歊景雲明堂舞干羽虎臣頗激昂奔走爭禦侮腐儒著縫掖何處議鄒魯西上轘轅山丘陵橫今古和風蒸萬物臘月春靄吐得為太平人窮達不足數他日遇封禪著書繼三五寄劉方平皇甫冉右補闕坐憶山中人窮棲事南畝煙霞相親外墟落今何有郎作賦年陶令辤官後達生貴自適良願固無負田取潁水流樹入陽城口歲暮憂思盈離居不堪久經少林精舍寄都邑諸親友韋應物州刺史息駕依松嶺高閣一攀緣前瞻路已窮既詣喜更延出巘聽萬籟入林濯幽泉鳴鐘生道心暮鶴空雲煙獨往雖蹔適多累終見牽方思結茅地歸息期暮年經李蒙潁陽舊居錢起考功郎中同心而早世天道亦何論獨有山陽宅平生永不諼青溪引白鳥流涕弔芳蓀蔓草入空室叢篁㴱毀垣舊遊還在眼神理更忘言唯見東山月人亡不去門奉送韋起居老舅百日假滿歸嵩陽舊居權德輿平章事進扶風郡公威鳳翔紫氛孤雲出寥天奇彩與幽姿縹緲皆自然嘗聞陶唐氏亦有巢許全以茲聳風俗豈必效羈牽大君遂群方左史蹈前賢振文去朝市賜告歸林泉滑和固難久循性得所便有名皆畏途無事乃真詮舊壑窮杳冥新潭漾淪漣巖花落又開山月缺復圓輕策逗蘿徑幅巾凌翠煙機閒魚鳥狎體和芝术鮮四皓本避難二疏猶待年况今寰宇清復此𩯭髮玄顧慙纓上塵未絕區中緣齊竽終自退心寄嵩峰巔石淙十首今錄二首孟郊參謀巖谷不自勝水木幽奇多朔風入空曲徑流無大波迢逗難盡參差勢相羅雪霜有時洗塵土無由和潔冷誠未厭晚步將如何其二出曲水未斷入山㴱更重泠泠若僊語皎皎多異容萬響不相雜四時皆自濃日月互分照雲霞各生峰久迷向方理逮茲聳前蹤哀孟雲卿嵩陽荒居孟郊戚戚抱幽獨晏晏沈荒居不聞新歡笑但覩舊詩書藝蘗意彌苦耕山食無餘定交昔何在至戚今或疎薄俗易銷歇淳風難久舒秋蕪上空堂寒槿落枯渠薙草恐傷蕙攝衣自理鋤殘芳亦可餌遺秀誰忍除徘徊未能去為爾涕漣如訪嵩陽道士不遇孟郊先生五嶽遊文熖藏金𪔂日下鶴過時人間空落影常言一粒藥不墮生死境何當列禦𡨥去問仙人請夢上嵩山時足病未平白居易刑部尚書夜夢上嵩山獨攜藜杖出千巖與萬壑遊覽皆周畢夢中足不病健是少年日既悟神返初依然舊形質始知形神內形病神無疾形神兩是幻夢悟俱非實晝行雖蹇澀夜步頗安逸晝夜既平分其間何得失送李垣先輩歸嵩少舊居劉駕國子博士高秋灞滻路遊子多慘戚君於此地行獨以尋春色文章滿人口高第非苟得要路在長安歸山𨚫為客狂歌罷嘆息我豈無故山千里同外國寄友人于鄴長安清渭東游子跡重重此去紅塵路難尋君馬蹤昔時輕一別漸老貴相逢應戀嵩陽住嵩陽饒古松山廟吳筠嵩山道士朝吾自嵩山驅駕遵洛汭逶迤轘轅側仰望山際王子謝時人笙歌此賔帝仙材夙所稟寶位焉足繫為迫丹霄期闕流蒼生惠高蹤邈千載遺廟今一詣肅肅生風雲森森列松桂大君弘至道層構何壯麗稽首環金壇焚香陟瑤砌伊余超浮俗塵慮久已閉况復清夙心蕭然叶真契府尹王侍郎准制拜岳因狀嵩高靈勝寄呈三十韻尉遲汾衛尉少卿雄雄天之中峻極聞維嵩作鎮盛標格出雲為雨風瑞時物不癘順澤年多豐加高冠四方視秩居三公明朝虔昭報頒祀歲嚴恭署祝䊸御札詔賢導宸衷皇皇三寸守馨德清明躬肅徒奉蘭沐竟夕玉華東星漢耿齋戶松泉寒壽宮具修諒蠲吉曙色猶蔥𣋡端儀大圭立興俛聲玲瓏挹瓚椒桂馥奏金巖壑空靈歆若有答髣髴傳祝工卒事不遑偃勝奇紛四叢朝霞破林嶂錯落間蒼紅動息形似蟻玄黃氣如籠奔傾千萬狀群岳安比崇日月襟袖捧人天道路通冥搜必殫竭躋覽忘崎穹踏翠遍諸剎趣綿步難終浮丘仙袂接謝公屐齒窮龍潭應下瞰九曲當駭容龍門計東豁三臺有何蹤金像語奚應玉人光想融瑤漿與石髓清骨宜遭逢况是降神處跡惟申甫同周翰已洽論伊衡亦期功誠富東山興須陟中台庸勉促旋騑軫未可戀雲松散材事即異期為卜一峰此唐太和三年石刻也予葺岳廟于圮墻之下得之移置壁間續錄于此庶可永乎七言古詩送考功武員外仲春赴嵩山置舍利張說尚書左丞相懷玉泉戀仁者寂滅真心不可見空留影嵩巖下寶玉四海轉千輪金曇百粒送分身山中二月娑羅會虛唄遙遙愁思人我念過去微塵刼與子禪門同正法雖在神仙蘭省間常持清淨蓮花葉來亦好去亦好了觀車行馬不移當見菩提離煩惱王子喬宋之問王子喬愛神仙七月七日上賔天白虎搖瑟鳳吹笙乘騎雲氣噏日精噏日精長不歸遺廟今在而人非空望山頭草草露濕人衣下山歌宋之問下嵩山兮多所思攜佳人兮步遲遲松間明月長如此君再遊兮復何時和