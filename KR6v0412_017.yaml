body:
  text: 韻始篇六大明萬曆年詩下五言排律寄嵩山何野鶴黃輝少詹事兼侍讀學士二室峰爭秀君栖第幾層巖歸依虎跡壑轉斷人踪白石連雲煮黃精𭘧雪舂沾衣霞片片繞戶水溶溶徙倚龍潭月盤桓鶴觀松向平雖有約咫尺眇相從石淙同元鼎修禊事高出衆壑淵源合飛淙倚伏斜勢吹星宿海聲折斗牛槎天后摩崖古群公麗藻賒蒲茸穿玉髓石乳𭘧芹芽濯足滄浪闊醒心碧落華車廂亦有谷衣𭘧若為遐上已欣和暢名賢足怨嗟傾壺臨險仄惆悵渺雲沙春日偕元鼎沿洛入嵩高出方駕春花內青袍照眼新仙才俱不世吾道孰能馴雨裊垂絲淨風翻落蘂勻煙墟含白羽漲岸𭘧青蘋玄鶴瞻緱氏明珠贈洛神乾坤三月麗山水兩心親群鳥還求友雙龍怕近人五噫去梁子百謫滿陳遵矜誕論文日幽偏種藥春好尋梅福跡時事倍沾巾後遊少林寺兼呈道公高出衆山趨少室古寺𭘧深堂日奪三花曜泉飛五乳香龕燈懸縹寶半低昂苓术精靈久松杉雨露長摩尼侵隱映梵鐸殷微茫石壁人間有金田異代荒千秋聖諦義萬丈白毫光藤葛春俱蔓雲霞遠益蒼跋陀啓檀越惠遠擅蓮場三笑從茲去同遊耿不忘馴禽疑解語伏虎欲相將苦更憐桃桞風前劇太狂觀星臺高出山豁陽城內雲涵潁水東觀臺銜睥睨漏刻隱蒿蓬泉注丹型舊銘湮石磴同風雷遭忽仄天地劃當中禮樂繁周室星辰擁漢宮登臨美人思今古慨無窮寄贈傅元鼎明府時豫渡河將遊嵩山不果遂訂後期穆光胤四顧河山勝中原未可方嵩峰連地起洛水接天長有美邢州彥分星列潁陽丰標來自晉詩句妙于唐日有林泉約都無簿領忙三花爭獻秀二室藹生光筆底煙霞滿胸中丘壑藏明珠投客歲夜月想空梁自愧逃名淺獨憐寄興狂春來雲作駕天外羽為裳已度洪濤險欲憑華蓋傍遠心陟絶巘浪跡阻他行日影誰能測鶴仙祗自翔盧敖歸杖穩宗炳靜琴張把酒頻懷友聽鶯幾斷腸雄雌曾合劍風雨會連牀偶有雙魚便因裁寸楮將他時能過訪傲吏是吾鄉少林寺觀十二靈芝圖穆光胤勝地鍾靈異托根自不常千年白玉碣十二紫芝房燦燦珊瑚色熒熒寶樹光風臨三秀動雲護九莖長隱士商山曲仙人瀛海傍披圖當此際盛代想休祥嵩山少林寺月夜談禪一首王世懋太常寺少卿少室少林寺何年中嶽中人天正南北吾道自西東藤秀三花老燈傳六葉紅我來尋祖義師老振門風步入嶺雲盡坐深山月空何須問密印祇自證玄同枕簟清無夢津梁去不窮君看王逸少理得似支公恭謁中嶽廟禮成賦十六韻傅梅縹眇神人宅穹窿帝者宮靈蹤千在美利萬方同分野從周啓明禋自漢崇金泥朱闕表玉輦翠華叢指顧天門近吸呼帝座通土圭均日景玉像鎮天中傑閣翔威鳳修梁駕彩虹青牛曾化樹白鶴每盤空瑤草當階碧璦霞映壁紅含生歸浩渺列象育洪濛宸獻通幽遠神功翊運隆坤維資奠麗元氣鬱蕭蔥故檢疑終祕遺碑自昔豐皇恩晞湛露民慍解薰風肅肅虔將祀明明恪在公登封稱奉邑柴望永無窮少林寺贈道公傅梅傳衣登法席卓錫倚嵩峰𣲖自曹溪衍人從㠋嶺逢青林甘露降紺宇碧雲封燈續光常燦𪏰添氣轉濃簷窺初入鴿鉢隱舊降龍聽講淹星駕參禪過夜鐘一乘歸淨業半偈豁塵胸潔比箕山雪癯同太室松到來風謖謖定後月溶溶豈礙朱門入還期白社從師應歸正果吾亦重南宗每到臨岐處溪邊見虎蹤春日送客即事傅梅送客閒適揬奇過遠鄉峰紋看錦繡鳥語聽笙簧映水花饒態迎風竹有香漁樵飲食爾汝話農桑雅喜淳風在兼便苛禮忘忙官真火宅此際暫清凉七言排律遊象極洞有引傅梅金壺峰下大石踰畞面開一洞厥形正圓俗以雞卵名之左右雙井可𢲘而酌天然之奇非人力也自道士建老君祠蒙冒其外而洞與井不見天日矣豫遊此决計欲毀之易以今名實夢中所得見靈緒篇洞去逍遙谷尚遠向附會師正恐未必然為賦十四韻誰剖鴻濛開太極包涵元氣鬱蕭森疑經鬼斧中央劈應遇仙軿下界臨穿自雲根通地肺劃從石竇見天心青蘿密抱喬松老碧草紛隨曲徑深背倚孤峰惟鳥度面開雙井待龍吟玉漿穴古非難覓丹竈烟寒尚可尋何物羽𣴑增小築遂教真境閉重隂寧知柱史非應祀若遇梁公定毀淫䇿屐徒令生俗障飛觴何以塵襟易名表箸神為助違衆更張令獨任引水便應通別澗憑虛從此見長林夢回還憶山靈語𡚖去生憎暝色侵幾縷潁烟漠漠一輪嵩月望沉沉清遊轉成陳跡物換星移自古今五言絶句達磨面壁石李化龍達磨面此壁形踪如何辨飛空本無迹遺像終成幻登二祖𤲅四首𤲅在鉢盂峰磴道險絶蓋少林苦無水而茲峰有四井故獨勝焉周夢暘孤峰接天雲斗絶無可儷欲參斷臂師排雲入天際其二跋陀叱水後二祖據峰巔卓錫一以定雙雙玉井泉其三二祖覔心時師與安心竟持鉢還峰頭境淨心亦淨其四捫蘿陟峰頂頓令猿鶴驚忽爾萬籟發如聞鉢盂聲秦槐張應登陝西按察副使槐樹何年植秦時大數待三百尺化作老龍飛面壁菴龍膺陝西按察副使觀相原無相言心即著心蔥菁巖下柏霜雪鬱森森少林寺達磨像陳繼儒布衣西來初祖像人天共瞻仰若問祖師禪罪福原無相四樓詠有引方重舉人署登封教諭令君傅公元鼎既城登封撤舊堞而更新之又改作四門各創建高樓三楹規制弘敞並錫以佳名豫每同諸子登其上輒留連忘歸漫為四詠焉考辰樓下為春雨門登高遠目四野動春耕瞑色淡忘返鐘聲雜雨聲大觀樓下為黃離門四山如郛郭蒼翠入高樓樹杪看飛練遙遙潁水流寶成樓下為鴻澤門少室對孤城寒色滿林薄禾黍自垂垂三花何處落天咫樓下為萬歲門新閣倚嵩山去天不盈咫直北盡浮雲長安何處是達磨面壁石杜文煥四大非我身况此虛無影我來一仰瞻豁然發深省天中閣杜文煥高閣在天中去天更幾許舉首撼天𨵿欲與天人語詠六祖柏王孫昌千年柏尚存杵臼人難遇自謂無菩提如何更有樹六十峰詩傅梅青童峰青童者誰子捧書自來去山高白雲深不得語黃蓋峰一峰出木末端整更無奇只有黃雲色東南覆嶽祠浮丘峰浮丘棲隱地雲白與山青自從仙舉後惟傳相鶴經三鶴峰當年李道士煉藥峰之下若更來三鶴吾甘棄駟馬遇聖峰仙人𡸁大耳石上采菖蒲漢主無仙骨重逢更有無萬歲峰漢皇修大禮龍駕此間登可歎三呼後無人問茂陵玉鏡峰峰上無所有人傳一鏡懸若云天上月何得夜長圓獅子峰擊象曾有圖似麟亦充貢如何入嵩山斂形不敢動虎頭峰山頭似虎頭常在此山踞只為守隂符不肯渡河去起雲峰古稱雲從龍雨降雲先起望不慰三農漫天亦徒爾鳳凰峰地本屬潁川吾以潁川治但願鳳凰來不願黃金賜金壺峰老子出𮤚日尹喜彊著書不知金壺墨較此色何如華蓋峰華蓋最高峰呼吸通帝座不敢發嘯聲恐振星辰墮玄龜峰直北峰頭水泠泠玉井寒若開蓮十丈人擬華山看臥龍峰蟠結如龍臥一臥幾千年猶勝南陽客當時臥未堅會仙峰羣仙曾會奕奕罷仙蹤絶不似世局長悠悠未可結子晉峰王子飛升去千山空月明我來峰上坐猶似聽吹笙玉柱峰山形真奇絶一柱插青天日月東西轉亭亭不記年老翁峰我歎此老翁跏趺常在此不似面壁人空自留隻履玉人峰山中見玉人云是嶽神像至今古殿裏精光不可望玉女峰玉女何年至天書七字符靈文人不識非是篆糢糊金匱峰石作黃金色崔巍何壯哉儻移易水北便道是燕臺積翠峰登眺趂朝暉夕陽未擬歸山中積翠色似欲上人衣太白峰太白本庚星化石在此處若教化為人應又騎鯨去右太室二十四峰朝嶽峰二室如弟兄鴈行左右立此峰獨居前東望常拱揖望洛峰山頭瞻洛水滔滔日向東洛京興廢事都在逝波中太陽峰離位自文明孤峙無所庇太陽一當空何處容魑魅少陽峰怪得滿山紅高巖映海曙殘霞落水中流下潁川去石笋峰山形真似笋誰錫以佳名常作含苞色不聞解籜聲檀香峰林是旃檀林外更無雜樹可怪卓錫人不在此峰住丹砂峰我笑葛稚川迢求勾漏何如嵩山長丹砂亦可就鉢盂峰高峰宛如鉢卓錫有清泉坐到會心處不必鳥巢肩香峰香不焚香雲氣如香氣似為供如來常傍少林寺連天峰山腰散白雲連天一色碧怪我未得歸峰高礙雙舄紫霄峰高峰連紫霄轉盻別昏曉因觀日月流方知天地小羅漢峰五百阿羅漢住世亦無住見色非真實標謂恐成誤七佛峰七覺開世迷七花屏塵相分茲黃金身偶現此峰上靈隱峰有山無人隱山靈轉自驕我向山靈語山林亦市朝來仙峰仙人有時來仙人有時去來去兩茫茫仙人在何處清凉峰上有清凉峰下有清凉寺願以清凉心消除火宅事寶勝峰寶勝峰前寺寺亡峰獨存多寶即無寶合掌問世尊瑞應峰疊嶂鬱參差連雲𢌞相蕩中有神仙人光彩真難望瓊壁峰初日紅于染山光相映明人傳是瓊壁我道是赤城紫蓋峰才御青蓋來又登紫蓋住我自慚我俗山靈當自喻翠華峰輦路生荒草山形空翠華浮雲復滿目那得不長嗟紫薇峰上山采紫薇下山棄山下豈不愛榮華此物終凋謝藥堂峰山中多藥草因有藥堂名不須求服食無生即長生白道峰青山是主人隱士暫為客主已冒客名客子竟何適帝字峰嶽神比公秩望祭夷臣位太室效三呼少室尊一字卓劒峰從軍不可佩為客不可彈夜夜龍光起只愁星斗寒白雲峰出岫本無心從龍亦有會此中可卜居組繫身無奈金牛峰金牛臥少室不知幾千齡平地皆蜀道何方驅五丁明月峰山本無消長月自有盈虧此中覺少趣月明山靜時凝碧峰愛此山中石一色如凝碧振衣陟其巔塵勞得暫釋迎霞峰山體本常靜霞光只暫明物情偶自值何處用逢迎玉華峰孤城堪吏隱春晝早分衙說駕桑田處褰帷看玉華寶柱峰石光成五色壁立入青冥磨崖留姓字猶勝勒燕銘繫馬峰黛色滿千林清光連四野吾自愛山遊峰頭堪繫馬白鹿峰山遠往來閒雲深眠食穩莫為梁稻謀走入宜春苑石城峰御寨雲連處高城亦石頭乍看如白下只少大江流右少室三十六峰增定太室十二峰詩傅梅雞鳴峰海日未生紅雞聲聞四野試問山下人誰是起舞者春震峰山上幾縷雲山下幾片水時聞霹靂聲應有蟄龍起懸練峰峰頭瀑布水寒色動諸天遠望青林外還疑匹練懸周道峰千載登封地鑾輿曾此過一片荊榛色幾聲樵牧歌勝觀峰岸幘坐高峰聊用祛塵俗雲氣蕩寬𦚾嵐光送遠目石幔峰山名太室古峰名石幔新如何常入室不見幔中人松濤峯半空響秋濤翛然下白鶴不似泰山松辱以秦時爵河𭘧峰山足陟山顛天中見天外黃河萬里流隱隱如衣𭘧桂輪峰雙闕拔地起一鏡繞天飛每遇中秋夜遊人不肯歸立隼峰突兀峰頭石穿雲復幾重近天常立隼我欲射高墉觀香峰仙子本王姬學道辭世榮至今深山裏如聞環珮聲望都峰嵩山望洛都一朝一興敗洛都望嵩山萬載常不壞六言絶句嵩麓四大寺偶題傅梅少林寺跋跎臺銷甘露達磨洞鎖慈雲西來文字不立十方武藝相聞法王寺殿角峰標玉柱座前地湧金蓮正趣已𡚖上果化城獨表中天嵩嶽寺梵剎俯臨雙闕浮圖高出九城洞裏常傳靈異潮音足破迷情會善寺碧樹高連鴈丹崖忽瀉龍泉䕃覆菩提聖種波流十萬福田七言絶句初祖庵示幻休上人二首王世懋太常寺少卿新裁居士薜蘿衣偶愛嵩山到翠微聖祖西來本無義野人乘興亦東歸其二常持般若覓知音喜有高僧住少林莫怪相逢易分手扁舟不住似禪心少林雜詩四首徐學謨禮部尚書禪棲幽洞三三載法箸名山六六峰隻履無端葱嶺去至今惟有白雲封其二名香古殿自氤氳舞劍揮戈送落曛怪得僧徒偏好武曇宗曾拜大將軍其三丹崖青嶂燦雲霞殿閣參差帝釋家寶樹珠林生欲滿不知何處有三花其四五乳危峰飛刺天長松落落注雲烟雪巖久滅高人迹石同空存老衲禪五品封槐李化龍禿枝老幹已龍鍾道是曾銜五品封誰向山中招大隱由來捷徑在嵩峰嵩山道中劉楚先禮部侍郎鄉心先曉促寒旌却為名山緩客程萬壑煙濛千嶂雪夜深猶在半空行望嵩少二首袁宏道客程行盡太行山又見嵩高紫翠間料得有人山上笑紅塵如海沒朱顏其二欲從影裏問胡僧車馬勞勞謝不能縱有洗塵千澗水夏蟲那可叩堅氷觀嵩陽古柏口占二絶袁宏道苔甲生生裂水波蒼皮十度手摩挲問君那只高如許漢壘唐基積幾多其二雲散煙飛岫亦枯風霜不上老肌膚山中怪事知多少石母生兒定有無欲登嵩嶽先呈傅元鼎令君二首項士美山人嵩峰聳翠鬱天中二室盤紆鳥道通我欲乘風登絶巘翩躚好看舄翔空其二百里花成萬戶春琴堂咫尺絶無塵看山不比來看竹問勝先須問主人和傅元鼎嵩陽十八詠高出崿嶺穿雲二室中分豁一門岧嶤萬仞上轘轅千秋輦路生春草不待啼鵑已斷魂盧巖飛瀑太室東來第幾峰孤巖側削半芙蓉親看飛瀑三千尺直透春雲一萬重少室朝暉八百餘疊涵翠微三十六峰天外飛寒巖別有達磨影時𭘧朝霞終不歸嵩門秋月嵩陽宮外碧雲輕秋色年年月倍明騎鶴仙人來往地知他何處試吹笙箕隂避暑幽壑虛嵐太古春前賢遺跡棄瓢新枕流多少高人臥不獨當時洗耳人潁水耕春潁隂春水抱城阿穀雨朝時布穀多縣尹勸耕車繞雉飽聽于蒍野童歌中峰長嘯縹中峰四望平天風萬里步虛聲擬攀星斗歸闕鸞鳳同聞子晉笙御寨高吟明霞掩映御帷深想像鑾輿不可尋少室千年山色在看人寂寂古還今石淙修褉風雨他年上巳時石流瀺灂酒觴遲但看應制唐人句無讓蘭亭數子詩玉溪垂綸春流窸窣漾𢌞溪倣佛桃紅客更迷時倚晴雲一垂釣石羊𨵿外午鶯啼雲洞探奇吞呷隂森古洞深紫雲蒼莽一龍吟幽探時擬看神物風雨茫茫不可尋星臺望遠千秋逝矣美人哉縹天中百尺臺圭刻茫茫人不識猶餘佳氣日徘徊秦槐䕃日獨樹祇園歷歲華根柯百畞影龍蛇遊人多作三生夢時逐檀落細花漢柏參天參差三柏插天中蕭飋長鳴漢代風下馬徘徊還下拜離離麥秀滿遺宮鶴觀棲霞王子吹笙月滿庭丹霞隱映旦雲青萬年仙觀留芝檢傳得浮丘相鶴經熊山積雪縹熊山五月寒中天積素倚巑岏分將群玉峰頭色一半峨嵋頂上看九潭風雨空門漠漠白雲還雲外春潭鏡裏山獨有鉢龍眠不穩時來行雨到人間五渡煙波仙源圓折抱嵩流石戴菖蒲一萬秋漢主可憐仙骨少封中只有白雲愁余嘗遊嵩若㠋嶺則所經行者也嶽祠少林則所信宿而旅禮者也盧巖曾午憩之矣秦槐漢柏亦所手度者也其他諸勝則見於元鼎之記述而已然余皆嘗望之聞之若可想像在目昔聞語長安者猶彂西笑况曾掛眼二室之巔哉余詩不逮元鼎乃不為無徵方且倚和章圖後遊庶幾余附元鼎之遇山靈不誣矣右孩之和詩與所自跋俱從盧隱集鈔來後和者益衆不能盡收也嵩陽十八詠有序傅梅今天下郡邑志率有所謂八景者以供題詠即境甚無奇亦必牽強紐造效姑蘇之顰學瀟湘之步若登封志亦然則可議矣嵩下山川如錯繡異蹟勝界不可枚舉乃儉于八焉寧免遺珠之歎乎暇日稍為增益遂定十八目各詠一詩蓋為地靈昭雪耳非鋪張也崿嶺穿雲崚嶒九折入高雲一嶺東西二室分遊宦地如棲隱地北山不必更移文盧巖飛瀑度嶺穿溪蠟屐勞飛泉如練下嵩高臨流暫濯塵纓色似聽秋江萬里濤少室朝暉孤城四面四山圍少室雲開出翠微歷歷晴峰三十六朝來各自領春暉嵩門秋月坐久天風𢿱白雲嵩門中斷月華分不知子晉仙遊去何處吹笙夜半聞箕隂避暑箕山林水自成隂萬古蕭然洗耳心一自挂瓢何處樹清風習習到于今潁水耕春匹馬郊行勸稼初即看潁水動春鋤山𢌞又過荒蕪地誰引西門十二渠中峰長嘯中嶽中央獨此峰振衣千仞暫從容一聲長嘯秋天碧不是孫登可易逢御寨高吟御寨梯雲登少室蓮花九頂轉分明朗吟謝驚人句太華如何獨擅名石淙修禊峰巒疑自太湖分曲曲清流衆響聞石笋浪花能戀客一觴一詠落斜曛玉溪垂綸孤村流水漲秋山緑樹風微鳥共閒釣罷玉溪垂落虹白雲偏護石羊𮤚雲洞探奇石堂山對潁陽城山下流泉不記名洞裏若非龍臥處何緣歲歲紫雲生星臺望遠成周禮樂久塵埃弔古強登百尺臺滿目浮雲何處望愁看洛水自西來秦槐䕃日獨䕃祇園隔世塵相傳手植自西秦我來不識槐安國時作三生夢裏人漢柏參天參天三柏倚嵩峰武帝曾經駐六龍閲盡隋唐爭戰色至今不改漢家封鶴觀棲霞白鶴長飛幾歲華孤松猶自屬仙家丹砂不必求句漏我欲朝餐五色霞熊山積雪大小熊山列案齊同雲積雪遠天低郊行不見袁安臥獨有寒聲送馬蹄九潭風雨暝色招提四望平九潭風雨一時生長林豐草情何限都入蕭蕭此夜聲五渡煙波縈𢌞東谷響流泉一水煙波五渡連不信菖蒲堪服食石根靈氣幾千年續嵩陽二詠有引傅梅豫既作嵩陽十八詠高孩之和如其數並刻嵩吟中傳播詞林久矣後友人崔元暉曰可增至二十乎豫曰可遂再作二詠以孩之既去不欲更張姑續于後以存之少林翠靄少室如屏隱少林松杉翠靄講堂深閒來頻對高僧坐便是當年面壁心嶽廟黃雲五嶽分封代有祠三呼漢帝至今疑黃雲只在東南上風雨天中感歲時嵩山四詠傅梅嵩山雨二室春深花欲稀朝來一雨淡林霏不知新畝耕多少添得巖泉百道飛嵩山雲天中嶽色秀芙蓉縹奇雲繞漢封朝暮城頭常自見飛來海外幾千峰嵩山月南樓清興倚胡牀雲淨天空夜未央六十峰頭秋月色一聲長笛盡如霜嵩山雪東閣疏花入曉寒嵩高一望雪漫漫群峰乍可如群玉絶勝峨𡼴天際看門人高亮郭國器校字
