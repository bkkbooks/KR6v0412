body:
  text: 嵩書自序文林郎登封縣知縣邢臺傅梅元鼎撰世謂天道遠人事邇乃儒者有言天人相與之際可得兮遠邇乎此其故聖人罕言之即門弟子無所聞而恆言則曰飲啄皆前定夫飲啄性也前定命也津津出庸愚之口抑又何耶先揚州府君年不惑時四上春官三試既畢出闈就寢夢有冕而自稱山人者直入內室寤而識之數日家報至第四子生問懸弧之候即夢寤之頃也府君私念曰既冕矣猶稱山人是兒必當有異因命名山子山子年七歲從父官山東始出就外傅更今名曰梅則受詩季父南先生年十一從父官宛南則受易吉水羅先生年十六從父官京師則受春秋麻城梅先生後以春秋舉京兆自府君謝郡數載即世梅年三十北遊成均間從建業焦先生受書久之丁先恭人艱友里中吳生讀三禮蓋三十年泛濫六藝之中卒無所遇久待公車不覺顛毛短矣夫學者載籍極猶考信於六藝梅自髮未燥從事鉛槧于二酉之藏多所涉獵今雖老大偃蹇不敢跳入二氏惟是以六經為折衷也六經聖人之文聖人亦數變矣蓋上古之世惟結繩而治耳自書契與八卦畫為文字之始嗣是而增卦爻而箸本草而服衣裳而制律呂至於治曆明時齊政徽典煥乎其有文章也凡五變而盛矣又至於忠質文互用制作損益爛焉方册而文無可加凡三變而極矣孔子轍環列國東周志阻歸而歎鳳泣麟乃刪述六經為萬世之憲聖人而至此變之盡矣其曰述而不作非不能作無庸作耳竊惟功業者持世之法度言語者救世之津梁兩者並重而要以心德為之基前人有言而不朽者三豫不謂然也夫世代遷易理勢遞移乘時遘會非中有所得嘗試而漫為之功於何有若夫言也者往往出於約結之人或圍於時束於格意不得自宣思藉空言以俟來哲舉而措之鑿鑿也故非盛德君子謂之窽言世見夫言者有當乎哉六藝而後奇勛偉伐垂諸竹帛者歷歷可數即論箸自顯代不乏人要以體大而瞻志曠而肆探六經之祕擷百氏之華則不能不服膺司馬子長焉子長世為太史以其宏恣其馳述先人之意為史記百三十篇自黃帝迄天漢蓋治亂善敗之林今古火薪之寄序天官闡天地陰陽之奧近於易著平準河渠律歷彂經綸制作之蘊近於書禮樂兩篇悉二經之旨而諸篇中更舉山川草木鳥獸為風人所未殫者又近於詩至其抑揚褒貶微詞隱義亦庶幾春秋家法也彼以絶代之才古之學而遭李陵之禍名辱身冤安得不鳴今讀其自序引西伯之羑里孔子之陳蔡與屈原之離騷以至於失明臏遷蜀囚秦之流謂其人皆意有所鬱結不得通其道也以此發憤遂志有所論載卒欲藏之名山副在京師俟後世聖人君子其思深其致可念矣今國家坐襲承平之業日久上視士太輕求士太薄自制舉義外別無物色之典無論三代耕莘釣渭之遇杳不可復即如中古束帛尺書下賁巖穴尋常細事亦成曠儀矣士生斯時一降世格生平之氣立盡噫天下一家誰肯北走胡南走越哉雖有豪傑不得不俯首就之屈志受之此其常也梅既以數奇久待公車不第家日益貧不得不效陶元亮思以弦歌資三徑乃謁選探策得濟北之商河既組而悔喟然歎曰男子生而桑弧蓬矢以射四方六合內事皆兮內事豫自少至壯東未嘗觀海南未嘗渡江西未嘗入北未嘗至塞既不能如子長世官太史得紬覽石室金匱之書廣其聞見又不能如子長足迹遍天下遐陬僻壤無不有車輪馬迹以縱覽海內之勝擴其胸懷徒區區守一簿書局促轅下俟河之清人壽幾何於是陳牒銓部乞返初服當事者弗許未幾乃自商河移令登封甫入境見二室插漢不覺躍然喜曰此古所謂中嶽嵩高也夫天下之山讓嶽四方之嶽讓中梅卑卑黃綬儼然稱茲山主雖一城僅如斗大而左右前後無非山者因思先大夫曾名豫山子以示賤於稚齡殆成夙讖矣又思子美稱也在周班爵列第四等應兮茅土方五十里今郎官出宰百里輿圖倍之又主祭境內名山得比於古之諸侯豈偶然哉嚴親命之名大君授之位相去四十年若合符節詎止一飲一啄蒼蒼之表有主之者矣嵩故無書古今一切禮樂名物委諸草莽掌故之謂何蓋亦有司失職所致也梅竊有志焉以初至無年拮據荒政未敢誦言纂述既踰一考徼天之幸時和年豐百姓順化諸臺薦剡數上謬以治行高第拜璽書之寵有懷二人晉秩號有加小子梅深自愧念無足稱塞萬一惟有搦三寸管率職終志陰藉山嶽之靈以上報君父仰答天意此其時矣魯論有言賢者識其大者不賢者識其小者嵩山在禹貢名為外方漢制大邑曰令小邑曰長梅所領小邑也奄有全嵩得自稱外方長在山言山於是退公布卷舊捃新考證往古之失得發明昭代之典則期以補職方之遺僃史官之采凡有𮤚於嵩山者芟其煩蕪正其缺謬兮曹列類自天象始維天垂象者列星太陽之榮萬物之精填官土位主茲中央兮經遵紀職在保章辨色審度以觀妖祥慎哉下土勿謂杳茫述星政第一二氣肇兮萬類森然峙而為山流而為川奠方布潤千祀萬年峴山墮淚鄴渠永傳一丘一壑得麗斯延仰止嵩高峻極於天述峙勝第二形勝自天選勝則人景山揆日土木以新物盛必衰消息環循繁華餘幾化為埃塵既傷實亡更慮名湮眷茲遺址懷彼先民述卜營第三粵稽虞帝省方惟時柴望山川侯度以垂舉隅而反中嶽可知後皇封禪作俑者誰三公視秩萬歲傳疑警蹕盤遊𣪞鑒在茲述宸望第四或謂才賢生不擇地載觀往逖降實不易出必有為氣必有萃造化鍾靈適與之值人亦有言聖以學至告爾後哲聿貞厥志述嶽生第五巖巖嵩嶽作鎮中州冠蓋至止懷彼前修仕無顯晦澤斬名留德功尚矣言亦千秋悠悠我思皇皇我憂不知我者謂我何求述宦履第六大人達道高士隱迹異遇殊趨各安所適泉石寄情煙霞奚癖玉質輝山珠光媚澤處則皓皓出則赫赫捷徑終南虛聲何益述巖棲第七黃帝無為天下以理清淨養性厥惟李耳可以御政可以全己且與化齊而畏生舉世皆迷日求久視外身身存知者與幾述黃裔第八浩浩乾坤茫茫亭毒聖凡均性華夷同育聖人大僃斯文炳煜若夢若非佛生天竺三乘誰兮五宗惑俗愈遠愈離吾道吾𢋫述竺業第九坤德凝厚載嶽巍然巍然者嶽寶藏興焉簡册匪誣微顯可詮生之居之總總綿綿方內資用方外延年刪同存異奕世珍傳述物華第十土有墳羊山有靈夔造化變態不知所為界幽生異境絶集奇出鬼入神若信若疑溺之障意通之解物君子無為世述靈緒第十一四始炳煥六義昭敷世變體兮代有前驅詠歌陳志天藻自攄登高能賦庶幾大夫完石非寶有瑕或瑜披蓁覓路不憚刪鉏述韻始第十二日星代明雲漢為章高山峩峩流水洋洋天地之文悠久無疆前為後師今傳昔名以繼以開有裁斯成知我罪我先民是程述章成第十三外方長曰余吏隱陽城述嵩書十三篇統計二十餘萬言食則噍之寢則枕焉手判文書心搖袖札者再更歲曆仰極天象俯究物情上下數千年間自六籍所及以逮今茲凡星緯次舍流峙動靜之故州域國邑宮室田里君臣朝野禮樂制度詞賦文章之迹即仙釋之流詭異之事細而至於夭喬鳥獸鱗介器物之屬亦為品詮悉合規度務在昭垂鑒戒非雅馴不軌於正者靡得而載焉雖遜子長不敢自謂成一家之言然彼以其十識其大者吾以其一識其小者云耳至若所謂有能紹明世正易傳繼春秋本詩書禮樂之際故非此書所敢任也噫身已詘矣名已晦矣言之傳否遑足計乎先正有言聖人之言海也苟能通陰陽之氣達水泉之流以海為歸者皆海之溢也夫小子亦囿於天道而不能已者也萬曆四十年歲次壬子冬十月望日嵩書自序終寺院六菴附大法王寺在縣北十里嵩山之南麓僃考志傳乃漢明帝永平十四年創建魏明帝青龍二年車駕駐蹕更名護國寺晉惠帝永康元年前增建一寺名曰法華元魏孝文帝避暑於此隋文帝仁壽二年創造舍利又名舍利寺唐太宗貞觀三年敕補佛像賜莊安禪僧名曰功德寺玄宗開元十八年更名御容寺代宗大曆元年重修又更名文殊師利廣德法王寺五代後唐因廢壞之餘分為五院仍歷代舊稱曰護國曰法華曰舍利曰功德曰御容至宋初五院僧願合居仁宗慶曆八年增置殿閣僧寮重造佛像賜名嵩山大法王寺金元與本朝俱因之寺背負嵩岑如倚左右高峰張兩翼如衛俯瞰二熊諸山排列如拱真天下形勝之區也嵩嶽寺在法王寺西一里許元魏宣武帝於永平二年令馮亮與沙門統僧暹河南尹甄琛等同視嵩山形勝之處創興土木本離宮也孝明帝正光元年榜間居寺廣大佛剎殫極國財僧徒濟濟彌七百衆堂宇落落踰一千間可謂盛矣後周斷廢佛法欲以寺為觀以為壇未果至隋開皇五年始改題嵩嶽寺又度隸僧徒四百五十人未幾兵亂焚毀唐興重為修復特賜田碾四所武后每幸嵩山則以寺為行宮送鎮國金佛像貯焉後中宗又於寺前造十三層浮圖讀李雍碑想其壯麗宋元以後漸墮偉觀今也荒涼不堪吊矣會善寺在嵩嶽寺西五里許本北魏孝文帝離宮也魏亡為澄覺禪師精舍至隋開皇中賜名會善寺唐興大加增飾有窣堵波琉璃壇記稱歲成具戒者盈千日受潔供者數百可謂一時之盛矣朱梁初營宮闕撤佛殿材木輦致汴京寺廢壞者六十餘載宋開寶初有僧奉言全審者同心發願募化重修漸復舊觀金元至今代有補葺不甚荒落寺右一泉泠泠流於階下僅供僧汲至山門而隱亦一奇也少林寺在縣西北三十五里少室北麓五乳峰之隈後魏孝文太和中建沙門跋陀自西域來詔有司於此寺處之乃於寺西臺造舍利經堂周建德中滅法廢寺大象中即興復之尋改名陟岵寺隋高祖受禪特令寺名仍舊開皇中詔賜少林寺柏谷屯地一百頃大業末寺為盜焚獨存焉王世充僭號洛邑立戍柏谷將圖梵宮寺僧志操惠㻛曇宗等率衆擒世充姪仁則獻之於唐時太宗為秦王賜書慰獎仍賜柏谷地四十頃水礳一具既一天下盡廢偽主寺觀此寺特蒙置立歷太宗高宗武后朝屢被恩寵玄宗開元中御書碑額七字命鐫刻文皇手書於寺中裴漼作文記之歷代相繼修營今獨完好峻極寺在太室絶頂中峰之上按金碑云後唐天成間有僧安禪師自金陵來駐足斯峰感文殊降迹遂立殿一所至晉天福年中賜額峻極禪院至宋末王貴妃自僃俸錢重修大殿後遭兵火廢蕩無遺金大定間有忠公禪師者經營數載院宇重新此峻極之始末也豫按峻極寺有三院在中峰者為上院在山麓者為中院在西𨵿者為下院後上中二院俱廢獨下院存耳今為朝賀習儀之所永泰寺在縣西北二十里太室之右足後魏正光二年孝明帝之妹出家為尼敕為置此本名明練寺周武時廢隋開皇中重加修復又度尼若干人唐貞觀三年議尼寺居山慮恐非人侵擾敕令移額於偃師至神龍二年嵩嶽寺僧道瑩奏請重修追薦故永泰公主改名永泰寺記稱簷宇四繞回廊復周蹬道凌虛懸階數匝倚山臨水亦名剎也今寺廢將盡有石幢石獸數事雕鏤精巧近代所無盧巖寺在縣東北十五里太室之左麓也踰嶺渡澗五六轉始望見寺門峰巒環繞寺後有瀑布泉茂樹清湍足稱幽勝相傳是盧鴻故居因名盧巖按盧徵君所居自號寧極乃官為營建者鴻又廣學廬聚徒至五百人規模闊大其沒也子孫不宜居遂舍宅為寺此理之可信者第按鴻所自著嵩山十志有太室南麓天門石崖之語與此東西相去踰三十里鴻不應有兩宅也又按李白集有贈盧徵君昆弟詩云二盧竟不起萬乘高其風惜史逸其名意盧巖或鴻之昆弟故居耶下盧巖寺在盧巖寺東南三里平坡之上登盧巖者自此寺後方漸高也龍潭寺縣東北二十里在盧巖之北隔一大嶺由嶽廟赴寺者渡嶺沿溪令人應接不暇寺據太室左陲面前平壤可容萬馬倚山環水規模壯麗自寺右登山五七轉折便至九龍潭潭上三面山圍中開平地數十畝形勢絶佳相傳武后遊龍潭時曾建離宮於此後改為上龍潭寺今廢武后有同太平公主遊九龍潭詩見類苑或曰今龍潭寺在金元時稱龍潭下院碑樓寺在縣東四十里平原之上內有豫州劉刺史碑石惡字泐逸其名矣寺前二里許有聚落古名劉碑村蓋以此也又一斷碑文不可讀後僅存天寶八年等數字乃知寺為唐人建也在孫寺在縣東南四十里蔣莊古碑猶存碑隂刻大齊河清三年歲在甲申敬造惜文字剝落殆盡不可讀矣龍華寺在告成鎮測景臺之東齊武平元年建馬鳴寺在縣東四十里景店之南金大定十四年建西勝寺在縣東五十里大冶鎮元至大年間建清涼寺在縣西二十里少室清涼峰之下金貞祐四年重修華嚴寺在縣西三十五里水磨灣之上金正大三年建寶林寺在潁陽鎮南門外元至大間建三峰寺在縣西九十里大峽內背山如屏面水如𭘧元至正元年建右諸寺創建之年大半考諸正統間舊志所載彼時古人碑碣尚有存者八朝以來為前邑令磨平遞鐫時貴詩文用之幾盡矣貞珉之災慘於秦火良可歎恨亦有寺僧苦於拓取而潛瘞之土中者瓦礫縱橫荊蒿滿目豫雖有好古之心從何處一一尋覓耶今通將基宇僅存世代無考者録其名與地於左方玉泉寺在石羊𨵿外泉自地湧水光如玉淨明寺在縣南三十里南店之東對箕山環潁水大嶽寺在縣東南五十里費莊之陽黃峪寺在縣東南四十里小熊山白栗坪之隂水峪寺在縣東南五十里大熊山麓其南曰臥羊坪石門寺在縣東南五十里石門山下境頗幽奇竹園寺在縣東南六十里大熊山之隂龍泉寺在縣西南五十里石道鎮寶勝寺在少室寶勝峰下今廢弘化寺在清涼寺西北一里許今廢普照寺在縣西五十里胥店鎮崇法寺在潁陽鎮西門外溫姑寺在潁陽之南三里許菩提寺在潁陽北二里背山面水松柏森然清水寺在石堂山東嶺上襟山𭘧水亦勝境也白雲寺在縣西八十五里于家集宣陽寺在縣西九十里東王村崇福寺一名潭榆寺在縣西九十里普明寺在縣西南一百二十里丁流鎮之西長河當門遠山列障去嵩雖遠然嵩之餘也而嵩山之寺盡於此矣又有史傳明繫嵩山而基址漫滅無考者書之以存舊迹吊古君子或有契焉目列於左道場寺馮亮為宣武造間居佛寺林泉既奇營製又美曲盡山居之妙亮時至京師延昌二年冬遇疾還居嵩高道場寺見北史石窟靈巖寺北魏永熙二年正月齊獻武王自晉陽出討爾朱兆大破之於赤洪嶺兆遁走自殺車駕幸嵩高石窟靈巖寺見魏書天中寺唐蘇味道有天中寺尋復禮上人詩云藩戚三雍暇禪居二室隈見類苑封禪寺五代時高僧貞峻在嵩山會善寺戒壇院納法因棲封禪寺學新章律疏見高僧傳戒壇院在會善寺西二百步許積翠峰下古稱會善寺戒壇院非另一寺也其壇名琉璃壇唐宋時天下僧尼受戒於此有四石刻天王像立四隅未圮其餘棟柱陛礎石雕鬼神山水之形今俱臥荊棘中矣壇東有元僧學士溥光石刻茶榜獨完好字徑二寸頗具風骨峻極中院在太室之麓今廢峻極下院在西𨵿今為峻極寺頗稱修整內有古檜數株寶林院在中嶽廟北黃蓋峰之傍今廢龍潭院在縣東北大寧保今廢淨明院在縣南高馬保按舊碑云金貞祐四年僧法通重修護國院法華院舍利院功德院御容院以上五院注見前大法王寺下面壁菴亦稱初祖菴在少林寺西北三里許即達磨九年面壁之處也背倚五峰前臨䨥澗古松偃蓋古柏參天為山中之勝境菴有蔡卞署書黃庭堅頌俱鐫碑寺西閣簷下有石刻面壁之菴四大字則蔡京書也菴內影石不類好事者為之耳二祖菴在少林寺南鉢盂峰之巔乃惠可禪棲地也菴前有四井探手可汲泉味甘美名卓錫泉門對高岑稍升之西北望伊洛二水如雙白練平鋪煙靄中亦奇觀也寶珠菴在縣南白栗坪西十里南北有石門境有幽間之趣白雪菴在城東南十四里雷家岡之南朝陽菴在白栗坪河西吏隱菴宋國博龐元常隱嵩山所築司馬溫公有詩今廢張相公菴在萬歲峰之前見邵堯夫集惜不著張之名也郎官菴與羅漢洞相近金元光二年菴僧慧朗曾與五渡保民郭道寧同修羅漢洞見碑刻長春菴谷神菴二菴見嵩陽宮元時仆碑控鶴菴在嵩山顛最深處宋劉居中居此二十年壁間得異書習之成仙又孫登天臺賦曰王喬控鶴以沖天菴名蓋取諸此今不詳其處矣
