body:
  text: 韻始篇五大明萬曆年詩上五言古詩孫熙宇令登封三年嵩高諸峰尚未識焉戲為此嘲李化龍少傳兵部尚書嵩高插天中二室遙相向絶巘倚雲開幽壑臨虛壙下有將軍柏偃蹇一何壯我為探奇來攀躋窮諸嶂山靈如有嗔使君何孟浪此山有主者不識作何狀出入頻戴星三載日無曠叢桂與寒巖可聞不可望我為山靈言若翁自高尚神可遊八極𦚾原羅萬象五嶽五卷石四溟四潦漲么麼一嵩高安得屈俶儻嵩高不可屈其高信無上由二祖菴登鍊魔臺眺望周夢暘河南提學副使二祖巖既奇鍊魔臺益矯石磴上盤雲曲徑羊腸繞捫蘿陟其巔身入星辰表四壁勢削成巉巖礙飛鳥把杯矚遠天翻覺神州小黃河崑崙來經過細如沼亦有伊洛流茫茫一線渺西華與東岱倣佛煙村杳中多白玉膏服之輕且清晨如露漙飲此世絶少我志愛餐霞坐待天將曉少林寺王士嵩刑部主事嵩少夫何極中嶽名獨尊杖䇿千里外陘峴手自捫朅來梵宇憩不數秪樹園古樹浮夕靄蒼翠明朝𥋆形勢互回薄周遭虎豹蹲雲霞麗丹闕日月夾層軒佛燈燃長夜鐘聲時在門遊絲靜不飛春鳥爭自喧奇趣茲已窮洗心道亦存素衷諒有孚勝遊竟難諼卜築行拂衣無令孤願言甘露臺王士嵩振衣登層臺雲物互森爽縱睇臨空闊矖矚極泱暄陽散長阡曙煙晴浩蕩白日麗平原碧草萋萋長高情恣凌厲健步愜心賞遠目無近尋倏然祛俗想猶憶甘露漙倣佛仙人掌仰身挹天瓢超超謝塵坱法王寺王士嵩訪勝屢回往寄興良不鮮漠漠岫煙霏泠泠巖露泫沾濡意已困憩頓聊所遣倚䇿玉柱峰歷覽信窮遠連巖互參錯雲物森婉孌古剎制未頽高棟負絶巘方池不盈咫洞徹足清淺采采金蓮花盈盈玉鑑展紛吾塵滓隔心顏藉霑洗慷慨有深衷從茲卸軒冕遊嵩山四首區大相左中允調南太僕丞名嶽宅中土生賢借奇巘圖為風雨會地以揖讓顯崖崿雖峻極岡阜亦平衍憩麓果紆回登崇更凌踐夙多遺世蹤到此塵慮遣箕潁信高蹈陽城道未貶揆迹有絀伸忘懷任舒卷素風諒不遐幽意得所展欲去還復留低回不能返其二尋真紫芝館訪古白雲衢年代一何杳輦道尚盤紆秦槐餘一樹漢柏有三株金丹既淪沒玉檢亦荒蕪神仙術久閟多欲為纍愚千秋與萬歲無乃太矯誣其三薄遊吹笙嶺回憩搗衣石玉女不可遇青童似相識遺我一廂藥金膏和玉液服之容色改自然生羽翼體輕若黃鵠一舉凌八極顧視讓王人纍纍塜上石天地可齊年浮名竟何得其四二室麗中天三花落雲外遠勢浮河洛穹標掩華岱珍木自成隂瑤草何曾溉神膏沆瀣霏金砂碧潭碎風從箕山來思與逸駕會天路杳難即霞術久蕪穢獨見周王子吹笙遊鶴背青宮生塵埃紫房絶情愛逍遙白雲間欲歸迷所在山中贈丁元父給諫時謫令登封區大相謫宦嵩山陽山深意不俗巖扉時自開雲構何常卜隱几見少室三花媚林麓簿書展長松印綬挂深竹山僧似定猿吏人偶馴鹿褰霞上高嶺採秀入幽谷攬古將軍樹息蓋帝休木石泉夜雨聲數寸階苔緑自𨵿道氣清豈受塵網束正直神不欺幽間理自足時有箕潁人相過論心曲登少室絶頂區大相二室俱造天少室難與侔將凌岝崿險遂涉清淺瀏隂磴煙尚霏陽崖雨乍收曳曳雲觸石涓涓溪亂流攀崖苔蘚滑踰嶺徑未修下窺元氣合上列象緯周霞彩席間發嵐氣衣上浮彈琴衆山響吹萬群壑幽方茲展奇眺聊用豁遠眸顧瞻盡河洛表裏見神州海客談員嶠羽士慕丹丘茫昧理豈設想像步難留平生徒欣仰即事恣冥搜寄言賞心客去此復何求登箕山區大相杖䇿訪名山夙慕良有以素琴石上橫清風松下起昔日讓王人含芬遺垢耻飲泉想棄瓢臨流思洗耳太古多逸民中世寡奇士回䇿下巖翠放歌入煙紫白雲何時來荒途誰與理終願畢吾志抗手謝坌滓城潁區大相停車指城潁芳躅何繽紛巢許既高蹈千載離垢坌如何遺𦎟子純孝至今聞揖讓君臣全憤爭骨肉分積憾天性蝕微言大義存至情在感發口舌徒云云荒隧淪故道薄采奠孤墳寄言茅焦者潁谷有餘芬潁陽道中贈登封燕明府區大相王喬玉舄飛方朔金門待久聞有仙吏思願與之會君宦嵩山陽而與箕潁對案牘積煙霞訟庭落蒼翠人吏青巖中簪紳白雲外有時驅馬出獨晤飲牛輩雖復稍逢迎顧少風塵態乍到賞心愜久遊神理會臥理時自間撫字亦勞瘁洗耳未必賢折腰豈為纍我尋五嶽期君報三年最何日丹砂成乘鸞謁華蓋將遊嵩少發偃師曉行田間周傳誦河南按察使蚤起穿林薄零露濕人衣禾黍滿周原果實垂葳驅車尋曲徑𢽽蓋避低枝鳴蟬高樹發兩耳清風吹青山若相呼白雲夙有期回首戒從人毋得田間馳田間幾莖禾農家數口飢勿以遊觀故而令向隅悲問俗數憑軾野老對歔欷數載空皮骨茲庶免仳離但恐征求急不得救然眉殷勤慰野老努力畎畝為歲時有豐歉帝澤無偏私願告司牧者痌瘝尚念茲同傳元鼎遊中嶽有序高出南京戶部郎中盧氏去嵩山五百里往令多不至豫實慕嵩兼甚慕元鼎特往遊焉遂與元鼎登其巔嵩高自上古峻極造太清嵥嵲表天柱欻吸絶生成三花發瑤檢露葉夾雲莖二室相橫亘揖讓若弟兄決眼入三河他山皆硜硜登陟愜心期招攜兼友生平生五嶽興茲也結初盟主賓在不負俱留千載名悠悠一世人歷覽各含情相對盡為客偶爾感合并飽聞前朝事萬乘擁霓旌秩祀隆百代壯哉帝玉程山川紀功德星辰揚光精牲𤩹久滅沒探䇿竟誰明後世絶省方黎庶適無驚禮樂貴通變馨香惟利貞四月旱頗甚茂宰憂如酲為君鼓薰風一為解慍鳴神嶺白日蔽高閣丹霞平渺渺懷古仙登舉鴻毛輕願隨浮丘伯雲中學吹笙同元鼎遊盧巖寺高出盧巖嵩之崖根豁一半前賢所隱居迹為名勝冠絮雲重岫光華常似旦飛泉鬪流霞俯注谺散濤聲懸百尺碧與千頃亂琪花飄香雨紫蟹穴空岸石壁白日藏金沙明珠燦晤賞眷伊人道契同汗漫朗詠大人歌超哉凌風翰孰令意不酬臨觴喟三歎箕山高出箕山於太室如岱有梁甫輔嶽並稱尊他山遑敢侮潁水源更清石流歷可數所以讓王人洗耳臨其滸一瓢棄陶唐飲牛愧巢父後代鮮若儔高風激千古緬懷眷有遇嗟哉不復覩惟見波湛湛雲氣朝如雨褰裳行欲涉身上慙絓組孰云能曠覽徒羡翩翩羽茲意諒自解來者將可補贈別傅元鼎三首有序高出盧氏之役豫假公事入嵩者再矣己酉冬量移南戶曹乃三入嵩山別元鼎共被信宿元鼎宴送天中閣揮泣賦別不勝離群之感也時大飢當事者憂礦寇為變擬調元鼎代豫元鼎辭故末章及之嵩高浮白日北風天地涼翳翳黃蓋峰執手臨其陽晤笑一室內頃刻來蒼黃行子歸匹儔飛鳥回且翔馬嘶人無聲潁水不可航吾子揚惠聞豫其歸故鄉路岐再三歎沾灑征衣裳其二衣裳奈天風伊洛揚廣瀾贈我西方綺輕毳可禦寒相思南國深采寄江之蘭石上秀菖蒲可以助加餐各慎千金體默默兩無言志士聊慷慨且使崇令顏其三令顏誰不觀傾城入宮忌樂哉為新知猶恐傷憔悴中夜忽忘寢思惟子同被恩愛暫虧隔沒齒慎失墜豈不念風波難為他人媚與子相代治快亦千古事北風雪霰零蒼然自酸鼻鴻鴈東南飛時寄一掬淚登太室光胤中書舍人平生有癖性好入名山遊方壺與員嶠杳冥不可求晨起䇿玉杖翛然望嵩丘仲冬野草枯高巖古木稠穿雲惟樵徑赴壑有奔流野猿引我去超距衣自摳回沓千萬轉雨汗不能休飲澗飛虹斷駭人猛獸遒伯昏無絶技若士有天遊齊梁分遠界伊闕來中州天風黃鵠下白日蒼雲浮五色拾金草三花獻玉樓振衣星漢落高呼帝座愁下界疑無地諸天接斗牛元氣空中合嵐光望裏收晚燈遺野燒斜月半縣鈎歸路煙霞滿回身係望周何當為麋鹿日走北山頭元鼎令君招同王義華戚不磷遊盧巖二首崔萬仞舉人字元暉青山含素氣谷隱多真賢聞昔盧徵君結菴太室前䇿馬尋幽蹤行行異山川林木恱我目流石契我偏峩峩削峻壁泠泠挂飛泉萬事自陵谷舊地列諸天吾友稱靜者歌吹列華筵客遊不知疲四座意悠然感慨有餘情含語俱未宣我為前致詞興盡且言旋廢興自有數喧寂亦有緣冉冉下夕陽歸路聽潺湲其二人命如朝露舉世誤榮華徵君抱遠性日日臥雲霞諫議非不貴等之若泥沙天子不能屈貞心誰可磨嵩嶽高不極與爾共嵯峨蔥蔥二室下是處有煙蘿誰能待婚嫁願此長婆娑何必求勾漏特地就丹砂夏日同元鼎遊石淙過告成劉先輩叔姪見邀飲觀星臺崔萬仞久雨暑氣薄聯翩出城隈縣令愛敬客冠蓋行趨陪道逢衣𭘧士邀我登高臺高臺臨測景仰懷元聖才荒荒衆山裏前階盡草萊他鄉如舊識傾意倒樽情長苦日短倒景忽相催我行為山川自勸覆餘杯望嵩嶽寄傅元鼎明府釋欽義託身寄孤雲飄零慙飛藿生不羡榮名死只耽丘壑曉發大梁城暮宿武𨵿郭據牀望嵩陽嶻嶪隱林薄清川寫幽谷浮嵐噴樹末揮手鳴琴懷人發腦豁倚杖冀王鳬延頸佇緱鶴安得一携手舒嘯登嵩嶽登嵩嶽四首戚伯堅布衣字不磷夙昔秉微尚目欲覽八荒寄身菰蘆中窘步騰驤聿來登嵩高浩若升混茫連山亘百里窈窕踰崇岡崖傾不留趾石破馬足傷盤盤歷御道封禪思前王天高氣爽清身遠目蒼黃窮隂懍萬壑珍木含群芳列岫爭輔佐大小紛翱翔𨚫立覽季室傍若右臂張高情恣凌踐升險神肅將解纓濯天池醉倚仙臺傍自覺非世人天風灑衣裳其二少室如蓮花一朵高插天低昂互分態開合左右連石脊盤迂途渺若孤線懸猿猱為之𨚫况乃通人煙天門壯崇墉俯睇伊洛川萬里豁遐矚兩戒分幅員谷空答清嘯塵淨無鳴鳶忽逢浮丘子羽騎何蹁蹮手持相鶴經云與俗世傳捧讀再三歎茫然昧道詮其三朝攀萬歲峰暮躋定心石懷仙儻一遇雲開晃石室三花燦戶牗日月影倒射別壺中天五穀爛狼藉中有白髮翁紅罏煉靈液玉漿注瓊碗芳氣滿席一飲清肌骨再飲生羽翮煙霞嬉遨遊體輕異疇昔咄嗟住世人忽為出世客紫簫曲未終桑滄幾遷易其四夜永晦群景遠壁明璵璠稍稍天地啓千峰延朝暾爽氣散林籟雲英相吐吞黃河落眼前萬里波濤奔捫天摘白榆西笑卑崑崙始知崇嵩高獨邁五嶽尊山花異世植帝休蟠石根食者捐妬性仁義草木存垂老踐靈境久悲蝨處褌王喬儻相招誓判骨肉恩登嵩山傅梅太室似龍眠少室如鳳舞左石鬱相望維嶽重千古往來凌其巔去天餘尺五皓氣連鴻濛煙塵隔下土黃河一線明女几列睂宇洛邑鼎既沈梁園簡亦腐中原興廢地蒼茫不可數豫本曠放人偶然披紳組雖為世網攖幸作名山主天池朝濯纓御寨暮陳俎長風襲奔雲時常爭武高峰采丹砂邃井采雲母聊以遠穢濁非為慕輕舉茲意難具陳四顧空延佇滄溟與崦嵫日月自吞吐中峯清晨欣褰帷息軌翠微路捫蘿陟中峰遠覽策高青天曠浩蕩下迷煙霧不遇浮丘公何能展心素中天池傅梅嵩山神仙館絶頂有天池靈源應銀漢砥柱命玄夷玉漿任上薰石髓受下滋飲此可遐舉不必求刀圭逍遙峪傅梅奇陟追夙懷靈山每獨往遵巖過平峪物境愜心賞松頂峰霞飛松根石瀨響前賢迹已陳徘徊空瞻仰天門泉傅梅崇巘闢天門劃然湧清泉濺拂雲根潤圓折地寶宣度林平鋪練逼細調弦清遊暢玄覽一酌心瑩然石樓洞傅梅扶笻下崇椒爰循芳麓遊積嶂忽復啓中有巖洞幽天然匪結構麗名蘊石樓寢憩煩勞釋遺家欲終留少陽河傅梅少陽峰下水宛轉流成河在山傳清瀨出山揚素波芳樹蔭華渚白鳥行青莎欣此滄浪趣不聞孺子歌石柱川傅梅雙石昂壁立中豁廣川流雨挾疊浪急風襲漣淪稠浦深堪垂釣岸曲詎容舟放遊增浩歎逝者空悠悠雲母井傅梅邃井倚崇丘