難搖八面風興來忽散千峰綺最憐平易喜親人不作巉巖拒俗子一任塵凡日日過穿脅摩肩如集蟻嵩高之量如天寬至人心事應爾耳萬歲峰嵩呼行葉秉敬君不見嵩山無人寂無説萬歲傳呼驚欲絶誰識千年峻極區都來一片廣長舌開脣剛只作三聲千載舌似結祇今不語𨚫如雷面壁磨翁得祕訣嵩陽宮三柏歌傅梅突兀三柏插天中碧鱗剝脫如蒼龍拗雪凌霜鬬日月拏雲攫兩吼雷風旁蔭嵩陽一千𤱔爭雄二十四高峰山中之人相傳聞漢武曾封三將軍御蹕巡遊幾千載斷碑磨滅無完文從幸諸臣知多少人人先此將軍老隋唐戰骨久成灰矍鑠三君獨矯矯人言不死是神仙子晉吹笙去不還煮石蒸霞何地覓琪花草空蒼煙滄海桑田變朝暮種樹者誰今何處閲盡遊人誰復來日見新墳高古墓吾聞泰山有松今未枯秦皇亦封五大夫後凋皆與山同壽片時虛爵何為乎政也徹也俱多事松兮柏兮蒙其污我來幸作名山主每過遺宮悲稷黍徘徊樹下不能歸有懷欲向將軍語此間箕潁有天人敝屣曾輕萬乘主况與衛霍同一流人奴齷齪何足數三君果受漢家封萬古高風讓巢許少室行傅梅鴻濛下墜元氣結巨靈劈天天柱折大禹安所施神功五丁蜀道疑拙寒玉削成萬仞高森森畫戟排天闕遊人多在側背行誰識此山真奇絶前日我從臨汝來方知山西南開百里巑岏看九頂蓮花一朵誰為栽四下群山低若水丹崖翠嶂凌波起韡韡正如菡萏舒亭亭直上雲霄裏端整巍峩若冕旒宋人所以稱冠子近山步步漸易形三十六峰插青冥疑神鬼紛難狀吐霧吞霞了不停似獅似象似奔馬如笏如几如張屏看山到此愜幽賞雙眼生饞雙足癢脫却青袍箸短衣捫蘿捋葛披榛莽絶嶠谺斷忽連幽崖磊砢窄還廣同遊二客俱好奇穆君翩翩戚君絳綃十丈代藍輿百夫更挽作前驅凌險狎危賈勇進十里五里才須麋鹿豺狼俱逃遁惟有騰猿飛鳥相追呼絶頂振衣何所見石粼粼兮雲片片京洛依稀幾縷煙黃河倣佛一條練西天門內鐵窗遙玉膏神霧時時變帝休貝樹生何所萬壑千巖目欲眩三定思過眼界空全山一副羅心胸向背參差不必問根枝脈絡遙相通錦繡臺中猶爛熳光明穴裏自玲瓏來仙靈隱群真府寶勝清涼列梵宮巃嵸石笋映瓊壁白鹿金牛堪共櫪歌山舞水能娛人昔日雲鐘聲未寂檀香紫薇原有種雲母丹砂亦可覓石室無主石床寒玉笈琅函空歷歷連天高接紫霄白道洞邊多白雲此間便好尋仙去緱嶺吹笙咫尺聞藥堂藥草多難識神芝甘果長芳芬一丈鍾乳千歲穀冥搜未遘西日曛二君勸我觀且止歸來黯淡思無已隱士惟知索價高縉紳絶無濟勝趾方今領略屬何人揮毫一雪名山耻吁嗟乎樓異之賦二千言描畫色澤都且美後來楊奐十字詩分明寫出神共髓豫懷正與昔賢同萬古山靈有知己白鶴觀古松引傅梅嵩山之奧多古樹幽巖深澗紛無數愛此突兀一老松巍然獨秀仙人宮跨鶴之事若可信我來不見王子晉惟有此松常閲人榮枯代謝春復春遠望亭亭如車蓋風入松濤鳴天籟千仞盤桓眼界寬東西日月飛雙丸龍蟠虬蟄石𦉑裏震雷破嶽驚不起從來神物難久羇如何不離此山垂我欲叱之乘雲走駕我天池摘星斗白雲空繞故宮飛誰見白鶴復來歸教人却憶丁令威五言律詩同滕北海管建初二山人暨幻休上人遊二祖菴遇雨黃洪憲少詹事掌翰林院迢遞青山暮崚𡾓石磴斜孤雲生杖履細雨濕袈裟古井餘雙柏煙嵐散五花何年謝軒冕此地學丹砂遊達磨面壁洞黃洪憲躡屐上層岑千峰𭘧夕隂芙蓉青嶂合芳草白雲深洞回迷人徑壇空只梵音相看面壁處聊足洗煩襟謁初祖孫繼臯吏部侍郎雲開初祖殿清磬禮香筵座擁三花淨燈明幾葉禪山屏圍積靄石室寫流泉欲問西來意天風為灑然面壁洞孫繼臯一葦何年渡千春此洞存身留片石現道與孤峰尊曲磴隂雲入層崖古雪翻西來本無意吾對亦忘言遊少林寺周夢暘長日驅塵境今依梵帝筵檀風氣逆寶剎歲華偏龍象諸天迥香花二室連未能拋世慮聊此一逃禪少林寺夜坐待月周夢暘萬籟此俱寂空山星宿稀挂林殘月吐入定一僧歸岐路誰招隱風塵未息機鄉思渾不滅幾欲遂初衣贈無言禪師住持少林二首李言恭臨淮侯一衲孤雲外遙棲帝釋家結茅依二室飛錫采三花蓮是談經座杯為泛海槎豫方迷彼𡶨肯為指津涯其二有相皆為幻無言始是真爾能通大慧我欲悟前因孤月懸心印三天轉法輪達磨千載後面壁更何人贈少林無言法師二首宋世恩西寧侯道自西方至僧從上國來翻經留二室演法駐三臺錫挂嵩雲破杯浮海月回貝多何處樹到日幾花開其二鹿苑曾傳法龍宮暫説經蓮花披寶藏貝葉啓珠扃禪定方離日名高已應星猶聞銅銚在為我訊山靈謁嵩嶽廟萬象春巡撫山東都御史紫蓋開中嶽瑤宮逼上霄四圍山拱伏萬仞壁岹嶢神降傳周詠壇封侈漢朝空庭瞻拜畢歸路隔笙簫天中閣萬象春摳衣上危閣一望思無窮地擁天中勝山標海內崇煙光平入望雲樹遠連空對酒清歌發泠然欲御風使大梁因遊少林寺潘豫之駐節且逃禪清涼此地偏雲深孤磬濕寺古一燈縣閲樹知僧臘鐫碑紀佛年愧非蓮社客空對遠公賢三柏李思孝巡撫河南都御史崒嵂生崖表移根遂不群月隂千畞落風葉半空聞比嶽將同壽為靈欲化雲作梁誇漢史何事號將軍甘露臺李思孝曲徑經臺出齊心謁四禪鳥鳴春欲盡林霽日初懸忍草披香徑靈花覆法筵願將甘露瑞遙祝聖人年寄傅元鼎明府于嵩山于若瀛巡撫陝西都御史迢迢嶽色明君去宰瑤京才豈嫌煩劇間堪養性情堂高雲不遠山近月偏明怪得稱仙令時聞子晉笙少林晚坐區大相山扉橫夕景石室吐晴煙門對吹笙嶺窗臨洗耳泉巖隂回竹院香梵起花天坐待浮丘鶴歸來松上眠面壁洞同丁元父給諫區大相震旦初來日煙霞啓洞扉苔生面壁石雲濕坐禪衣五葉燈前度三花頂上飛不知傳教後何事又西歸題無言上人溪南精舍二首區大相一燈傳教後此地又開山二室三花裏千峰萬木間香臺携客上竹院待雲還既了安心義何須長閉𨵿其二居士住人天精廬水石邊傍林開寶界持鉢酌香泉花發傳燈後鳥歸鳴磬前上方留客處松月共安禪偕朱非二入少林至初祖洞袁宏道吏部郎中宿世同來否青山記夢登雲分新墜石樹老舊扶藤古蘚番文印胡䰄壁影僧磨公真狡獪隻履去何曾話無言上人方丈袁宏道杖子撥秋煙堂頭二十年還君半面識乞我一蠡禪石壁分窗看松風對榻眠浮生成泛泛俱有雪毛縣雨後登嵩山張邦紀右贊善攀雲凌昊杳芳樹緑參差春盡花仍發雨餘山更奇青童空碧草丹竈隱靈芝探勝懷高士煙霞洞口披雪中同劉用貞孝廉訪無言禪師楊玉潤蘄州知州寒日朔風急披裘向少林雪巖群玉合霜徑萬山深豈謂探奇至還因訪道臨遠公曾有約今到虎溪尋寄懷戚不磷于登封時客傅元鼎明府馬之騏翰林院編修憶爾遊河洛翛然一劍從勝應窮少室重想托臨卭尊酒堪誰共盤餐仗僕供轉嗔分手易空此惜萍蹤春分日送戚不磷重遊嵩少兼柬傅元鼎王稚登桞色緑於染折來重送君路從江便隔春與客同分鴈度嵩山月猿吟少室雲到時花滿縣仙令共論文龍潭光胤寺下澄潭靜不緣風雨驚披雲雙鷺起入夜九龍鳴潁水分餘脈嵩陽助早耕安能當此際揮手試星精紫雲洞穆光胤深洞何年鑿清虛對石堂泉飛花片片雲起水茫茫鍾乳仙人館紫芝白鹿鄉誰能當此地不遣世緣忘嵩嶽詩二首杜文煥副總兵官山色碧嶙峋山形若鬼神佛圖金作像嶽廟玉為人獨鶴何年駐三花幾度春晚風吹几杖縹眇出松筠其二浮雲觸石低嶽色與天齊有穴通仙館無人狎隱棲玉漿甘似酒石髓細如泥勝具吾真有何時一上躋遊盧巖寺觀瀑布水率爾有作魏大儒蠡縣訓導萬疊雲流處飛泉一道清風回長練捲日射碎珠明隔樹青天色環亭驟雨聲天然此真境夢想若為情少林寺二首方承郁南京兵部主事一入轘轅嶺盤紆見少林白雲僧衲冷黃葉寺門深果出菩提種泉飛梵唄音清涼靈境別最好滌煩襟其二五乳開初地高僧立雪年燈光熒碧漢香氣吐青蓮藤結三花樹經傳六葉禪勞勞人世裏從此息塵緣少林寺四首傅梅石磴接金繩揬奇次第登野雲間似吏古柏禿如僧梵韻千林雨禪心萬壑水西來無一字何處別三乘其二山葉欲紅秋山泉滿澗流參禪知政拙到寺覺心休影斜書漢鐘聲晚咽樓伊蒲清供罷欲去更淹留其三日落萬山蒼天風晚涼開簾雲入座𠊓屋樹成墻塵慮空花盡清言漏水長青蓮何處是飛唾口餘香其四樹密晝長隂山雲白可尋欹松寒抱石細遠穿林香真如地燈明不二心遠公容入社誰復戀華簪過鶯鳴澗懷高計部孩之傅梅褰帷省稼穡攬轡過林丘黃鳥鳴高樹丹崖束衆流幽懷聊獨往同氣阻相求何日山隂道重來訪戴舟漁樂坡傅梅倚巘編茅屋臨流繫釣船已教山作主更以水為天間網當風挂輕簑選石眠避秦疑此地莫向世人傳存古堂傅梅披荊尋斷石剝蘚列空堂鐘鼎千秋色圖書四壁香靈開嵩室祕奇類酉山藏流覽生遐想前修詎可忘醉雨亭傅梅向日壺觴地悠然見此亭兩年頭欲白四野地重青命駕看禾黍開筵問醁醽豐年真有瑞不必獨為醒渡潁水有感傅梅洗耳逃名位高風自潁濱山川無定主天地幾間人逝水悲前代浮雲歎此身褰裳歸未得低首任紅塵盧巖寺看瀑布傅梅鳥道任躋攀泉飛萬仞間亂流爭潄石群籟欲聾山施食魚遊壑經鶴守𨵿乍臨人境外長日飽潺湲客有獨登太室者問之傅梅聞君登太室嗟我未能從陟巘應千仞穿雲約幾重有無𤲅控鶴多少穴藏龍石室曾誰遇歸聞何處鐘秋雨初霽率爾登山有作傅梅秋日山行好秋山雨乍晴有巖皆作瀑無水不成聲墜葉沾衣潤飛雲拂蓋輕歸途天欲暝灼灼片霞明七言律詩登中嶽李化龍少傅兵部尚書獨步嵩峰最上頭憑凌萬里見高秋西連紫塞千山出東指黃河一線流漢畤秦封何處所盧巖許嶺自清幽登臨頓失風塵色極目浮雲淡不收嵩陽宮李化龍懸崖壞壁草芃芃傳是嵩陽舊日宮何處間雲飛嶺外有時佳氣起封中螭紋剝落唐碑古虬樹隂森漢柏雄指點千年成感慨悲風蕭颯萬山空天中閣李化龍橫天飛閣俯神州漠漠中原此上遊地轉三河紛秀色窗開八極起涼颼峰頭夜聽玄猿哭檻外朝看白鹿遊回首漳川何處是仲宣無賴賦登樓少林寺張維新陝西布政使躡屐名山若有期秋霖忽霽萬峰奇慈雲初結曇花蕊甘露低垂祇樹枝上界鐘鳴僧定後西山日落鳥歸時一塵不到禪𨵿掩何處風翻貝葉辭少林寺馬化龍天津兵備副使維嶽曾聞六十峰偶依禪室寄間蹤諸天鐘磬穿雲度萬壑煙霞拂檻濃古柏森森標漢迹高槐矗矗識秦封撚燈欲問西來偈尚逐塵緣未許從登嵩山禱祠夜宿少林值雪志喜徐申南京通政使中嶽曾聞漢代封諸天秀色攬群峰千年玉檢藏靈瑣萬壑松濤雜暮鐘弭節三川如可抱振衣二室若相從喜看瑞雪垂垂合回首巖巒吐玉龍遊中嶽丁應泰兵部職方主事謫籍天中吏事間扶藜名嶽幾飛攀昔聞武帝鸞輿至晚待浮丘鶴馭還隔嶺春雲分二室垂巖寒瀑響千山遲回獨立嵩呼地青瑣猶然憶舊班遊少林寺丁應泰青山空曲地清嘉紺殿中藏帝釋家秪苑禪枝開五葉珠林仙樹採三花天空池水沈孤月日射爐煙結彩霞直悟一乘窺最上何須重問白牛車登太室俞安期布衣字羡長石室逶迤石徑通艱危雙履出巃嵸峰懸午日天中定河引春流洛浦同雷動呼聲傳武帝雲扶鶴駕望仙翁神漿更在三臺上乘月思過玉女宮登少室俞安期嵩高中斷並神丘杖底泉開潁水流