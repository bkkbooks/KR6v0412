其三河洛離宮久已淪禪林獨揭典型存虹梁霧閣臨仙壑月榭霜臺通帝閽二室近攀稱伯仲群峰遙拱作兒孫悠然清舉塵情斷一榻松風警夢魂其四名境精藍七寶房淋漓雲氣和天香千年樹與碑俱古百轉峰將壑並藏僧指翠微標勝迹客磨蒼蘚覔鴻章無論問法傳心事只此幽居興亦長嵩山雜詠四首馮時可萬古宅開萬國中兩山鎮壓兩河雄龍眠鳳舞奇形別玉積蓮苞秀色同雲氣往來常自接天門呼吸近能通仙源有路誰招引八翼泠然好馭風其二仙𨵿深渺閉絪縕萬仞崔巍勢獨尊水外飛霞銜御寨巖頭垂瀑震天門光浮玉鏡常懸月墨灑金壺未滅痕安得青童遂相引剛飈吹翼薄崑崙其三鬼谷龍潭蔽草叢獨餘古色似鴻濛四封嶽瀆環為輔九野星辰拱此中雲裏雙笙仙下上嶺頭隻履佛西東幽奇欲討無栖處他日重來捫大熊其四蒼然嶽色壓天中隂壑陽崖望不同遠水如雲浮落日飛泉似雪舞回風石牀夢醒群魔伏金地心開萬境空誰可入林相把臂朗公今在玉溪東令君傅元鼎邀遊上盧巖嵐寒逼人令小史酒余醉且二三寒氣若失喜而有作蓋余不食酒數年矣馮時可徵士幽居建佛菴到此不飲樂寧耽敵嵐三酌聖能中對瀑連觴禪可參小史紅顏堪引滿令君青眼易成酣松隂山翠煩雲護他日飛鳧再試探寄贈元鼎世丈于嵩陽馬之騏翰林編修使君有子更雄飛載剖單符出帝畿文筆東京推伯仲治聲西漢共光輝窺簾一鶴乘雲入拂席三花𭘧雨霏早晚若聞天上召瑣垣清切嗣前徽寄贈傅元鼎明府馬之駿戶部主事三臺春暖沸絃歌縹瑤笙舄影過勝迹每先猿鶴到新篇翻比簿書多捲簾石髓青常滴推案雲峰翠不磨解識遊仙兼吏隱風流輸爾獨婆娑寄答元鼎世兄馬之駿懷人嵩少鬱千盤交定翻憐識面難課吏秫田常共客尋僧芒屩不知官書成字肯懸金易政暇琴唯閉閣彈可是君家饒治譜桐鄉今已祝衣冠夏日元鼎招飲天咫樓樓在登封北城門上乃元鼎創建者崔萬仞舉人新搆高樓欲近天青山一𭘧供華筵太室少室綺疏外小熊大熊朱檻前始信向來詩有畫試看今日令如仙探奇何地宜先發笑指石淙月滿川訪登封傅元鼎明府穆光胤中書舍人縹嵩雲近帝居此中仙令定何如栽花赤縣聲堪埒種秫公田政有餘馬上看山神色爽巖頭覔句禮文疏因君動我煙霞癖回首應焚學士魚寓登封贈傅元鼎明府戚伯堅布衣字不磷白鹿青童久寂寥美人為政擅風騷名隨伊潁流俱遠身主嵩陽望並高問俗閭閻無逸事題崖靈怪助揮毫三花即是甘棠樹父老春秋瀉翠濤石淙戚伯堅境外尋真境亦真空山雨洗壁痕新怒流亂射泉千鏬砥石中蹲座百人花綺筵張繡幕草深碧澗走朱鱗幽巖若可添茅屋臥聽松風老此身登嵩山白南金塵俗難分半日間嵩高今始一躋攀黃河影接中天上玉壁光搖二室間聽講龍來曾入座吹笙人去幾登山峰頭六十多仙藥何處丹砂可駐顏登測景臺葉秉敬河南提學副使朝出陽城霧色籠登臺如夢見周公臨高洞識隂陽會測景全看天地中二室雲開花爛熳千畦泉繞玉玲瓏前旌指點石淙路馬首徘徊未忍東偕傅元鼎遊石淙望潭而飲尚欲添一斗牛槎也遂成一律葉秉敬驅車未到已聞聲隱耳輕雷笑不驚石湧參差人坐立潭開瑩徹鑑空平徐風入澗回環轉曲水浮觴委宛行欲借傅君舟楫用不教河漢隔盈盈登嵩山二首方承郁南京兵部主事宛轉丹梯歷幾重削成二十四芙蓉秋聲不斷天中雨朔氣疑吹澗底鐘突兀岡頻空翠染參差碑半古苔封興來直借浮丘鶴為上嵩高第一峰其二遙遙空際晝隂冥為愛名山選勝停帝遣五丁丹嶂擘道迷七聖白雲局何年玉笥藏金簡自古祈靈有勒銘休問前朝封禪事宮亭寂寞石花青抵登封柬傅元鼎明府時元鼎先遣吏候豫于轘轅方承郁曾從玉井掩雙扉更向嵩陽一振衣候吏徒勞望紫氣美人真自拂金徽停軺朗月秋空淨入郭薰風朔色微指點群峰青不斷願期仙舄與同飛望子晉峰王孫昌舉人不二門開第一山少陽東去水潺潺峰懸五乳中天下磴歷千盤出世間面壁空留石影在吹笙不見鶴飛還稔聞九頂蓮花寨白玉膏吞可駐顏遊達磨洞陳文燭大理寺卿岧嶤蔥嶺萬重雲䇿杖登臨日欲曛五乳高峰人不到九年空影石為群寶光尚映遺碑字梵宇偏從古樹聞况是友人能解脫夜深還檢釋迦文寄題中嶽余少有五嶽之志不幸牽於世網並未得遊萬曆壬午以計吏北上途中偶爾興懷寄託屠隆禮部主事高柱劖天白日停千峰回合晝冥冥鶴乘秋日笙俱冷虎嘯空巖殿不扃一夕風雷松壑徒九年霜雪石花青竦身欲挂藤蘿外夜聽金臺玉笥經寄題嵩山二室二首王履和字仲美邢臺庠生太室巑岏萬仞倚晴空只赤人間路不同誰遣巨靈開鳥道從勝槩弔雄風憑凌星斗三千外指顧河山百二通大地茫茫看一氣不知何處問鴻濛少室九頂蓮華葉葉分旭光一抹淨塵氛洛川風起晴飛雨崿嶺煙封曉度雲萬壑鐘聲通窈窕千秋劍氣吐氤氳漢唐御蹕從何識古木蕭蕭鳥自群太室傅梅峻極名山稱地主振衣二十四峰高遙看海日生朝曙下見河流捲暮濤古寺空傳龍送水仙壇猶有鶴鳴皋自從漢武登封後多少盤遊置驛勞少室傅梅西嶺天風送鴈羣凌虛千仞人絪縕茫茫貝樹三花落面面蓮華九頂分倚杖漸生梁苑月沾衣幾度洛川雲可憐緱氏笙音斷十八疊中何處聞箕山傅梅嵩南特立如嵩輔萬古箕山祀許由異世猶傳高隱迹當年肯代放勳憂川原寂歷青天暮煙霧蒼茫碧樹秋拜墓自慙紳冤俗孤峰徙倚思悠悠潁水傅梅耿山之麓潁源長東過箕山正渺茫我欲開渠成鄴下誰同遊樂比濠梁中流泛泛桃花色兩岸依依杜若香洗耳挂瓢何處是可能懷古不懷鄉陽城傅梅自從大禹避陽城曆數于今幾代更河洛尚存千載迹謳歌想見萬方情微茫玉帛荒祠暮寂寞舟車古道平故址不堪搔首望高原惟有野人耕轘轅傅梅橫看一嶺側千峰鑿石為𨵿路幾重遠𭘧河流歸上國平連伊闕列崇墉若令方軌應難度即用丸泥亦可封欲向此間占紫氣晨昏好聽少林鐘盧巖傅梅疊嶂懸崖勢欲傾千尋瀑水落縱橫直穿嵩嶽春雲色常作瀟湘夜雨聲幽洞涼生松影合虛亭塵靜竹風輕高賢舊宅今為寺弔古令人減宦情石淙傅梅行春選勝列春筵箕北嵩南此地偏淺澑深潭清自入奇峰平嶂曲相連林帷花草疑無路洞鎖煙霞別有天不分尋常修禊事千秋獨紀永和年過少林寺二首傅梅二室巑岏一徑通少林寺在翠微中地從梁魏標靈異僧自隋唐好武功若道傳衣終箸相須知遺履亦非空年來悟得西方旨才到名山便不同其二禪堂寂寂坐更深月上松杉見遠岑地迥樓臺收翠靄山空鐘磬有清音官間自合無生法政拙還同不住心三十六峰多藥草何時解綬任幽尋春日自嵩入洛四首傅梅黃昏昨命嵩山駕清旦今浮洛浦舟千里悠悠成浪迹一官落落寄深愁新楊新杏爭相媚間水間雲好自由無奈歲荒歸未得豈因五斗暫淹留其二白雲青蓋共飄揚滿路鶯花斷客腸𢬵以忙官消歲月那堪遊子度春陽邙山洛水渾無異金谷銅駝盡已荒弔古傷今情未已故園書問復茫茫其三遠浦微茫接遠岑輕雲輕霧晚隂隂驅車豈敢悲勞役束𭘧惟愁壯心花到春殘應棄葉鳥知天暝亦歸林幾回擬作褰衣遁滿目瘡痍軫念深其四河汝鄰邦同駐驂謁臺大會古周南論官我亦稱民社量地誰還視子男政拙已知無上考時違爭敢縱深談一行作吏傷心甚豈獨嵇生七不堪陪方伯黃公山遊傅梅新秋棨戟下煙嵐六十名峰次第探身立天中見天外路經山北到山南諸方寶樹供揮麈四野甘棠識駐下吏祇應前負弩叨陪宴賞挹清談陪憲長周公山遊傅梅中原山水嵩為勝憲節今逢按部來白晝微雲開二室清秋皓月照三臺旌旗色與林光合鼓吹聲隨澗響廽聞道霜威凌草木陽春三日感趨陪登嵩八首有引傅梅豫至登封三月後始草草遊觀作太室少室箕山潁水陽城轘轅盧巖石淙近體八章詞無足采而住持道公伐石八條刻少林寺好事者拓去有製作屏風者豫見之甚愧恐不足為茲山重也異日見岱史李于田先生督學山東時有登岱八律後來和者往往如其數雖工拙不同亦豪舉也因思嵩何遜岱此假公案似不可缺遂爾效顰不知果足並傳否時豫束裝將上計矣即用以留別山靈可乎四野耕桑吏事間嵩高咫尺任躋攀半空煙霧憑凌過中夏封疆指顧間河水明明吞洛水箕山隱隱接塗山坐看暝色千林寂月印天池未擬還其二煙消雲淨轉嵯峨搔首青天發浩歌山以鴈行分二室地從鱗次辨三河瑤空風起身堪御銀漢星回手可摩萬壑千巖涼似水石樓無主奈愁何其三天雞才唱見朝暾此地先明下界昏霞彩千重生御寨泉光百道挂天門玉華玉柱遙相接金匱金壺盡可捫潁水若如星宿海中原亦自有崑崙其四丹崖翠嶂倚晴空呼吸還疑帝座通至北至南均日景交風交雨列天中高含元氣三台近分奠坤維四嶽同豈為山呼崇祀典虞廷柴望已無窮其五雲棧星梯度幾重石林選石臥孤笻紅塵壙埌三千界碧落巑岏六十峯太乙祠前松鬱鬱天封觀外水溶溶豪華轉成今古欲問浮丘不可逢其六空中九頂似蓮花天際峨嵋未足誇百里蔽虧藏日月四時光怪幻雲霞玉膏石髓神仙饌金界珠林帝釋家綰綬此間真吏隱何須句漏覓丹砂其七宛轉羊腸十八盤中峯峻極入雲端九潭下瞰蛟龍宅五渡遙成鴈鶩灘白日忽沈梁苑暮蒼煙不斷洛宮寒徵書自是前朝事巖穴重尋大隱難其八憑將勝具縱幽尋臘屐穿山深更深峰有奇文傳灑墨泉多妙響號鳴琴琪花瑤草無冬夏白鶴玄龜自古今邑小官間聊寄傲淹留五載未抽簪門人焦弘祚陳懋齡校字
