body:
  text: 文林郎登封縣知縣傅梅元鼎撰韻始篇一外方長曰古人有言登高能賦可以為大夫然則聲律之道果與政通矣而必曰登高何哉豈有待於山川之助耶蓋人之有遠趣逸韻者情近乎山水而登臨眺望往往發為詩歌縱目開心神思若曠而淡焉固其宜耳然古來奧區奇境以不遇通人名湮沒者不可勝數惟曾經品題者稱焉由茲以談山川與人兩相待而俱稱不朽巍巍洋洋雖與天地竝昭可也其何有于政乎嵩高在禹貢稱為外方自大雅篇出而峻極之名遂著豫首録其詩取標于吉甫歸重于嶽神匪獨以其韻也而韻實始基之矣其他古今篇什託于此中者甚侈中原之大觀將在于是豫廣收而精取之各以代次俾觀者得論其世焉周嵩高八章尹吉甫卿士嵩高維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣亹亹申伯王纘之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鉤膺濯濯王遣申伯路車乘馬我圖爾居莫如南土錫爾介圭以作爾寶往近王舅南土是保申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲申伯之德柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯蒸民八章尹吉甫天生蒸民有物有則民之秉好是懿德天監有周昭假于下保茲天子生仲山甫仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏彊禦人亦有言德輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕維仲山甫補之仲山甫出祖四牡業業征夫捷捷每懷靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心漢邛疏劉向光祿大夫八珍促壽五石延生邛疏得之鍊髓餌精人以百年我享千齡寢息中嶽遊步仙庭王子喬劉向妙哉王子神遊氣爽笙歌伊洛擬音鳳響浮丘感應接手俱上揮策青崖假翰獨往魏詠懷阮籍步兵校尉王子十五年游衍伊洛濱朱顏茂春華辨慧懷清真為見浮丘公舉手謝時人輕蕩易恍惚飄颻棄其身飛飛鳴且翔揮翼且酸辛宋王子晉謝靈運臨川內史淑質非不麗難以之百年儲宮非不貴豈若登雲天王子愛清淨區中實囂喧冀見浮丘公與爾共繽梁王太子江淹金紫光祿大夫子喬好輕舉不待鍊銀丹控鶴去窈窕學鳳對巑岏山無一春草谷有千年蘭雲衣不躑躅龍駕何時還效阮公詩江淹昔余登大梁西南望洪河時寒原野曠風急霜露多仲冬正慘切日月少精華落葉縱橫起飛鳥時相過搔首廣川隂懷歸思如何常願反初服閒步潁水阿北朝道士步虛詞庾信司宗中大夫渾成空教立元始正圖開赤玉靈文下朱陵真氣來中天九龍館倒景八風臺雲度弦歌響星移空殿𢌞青衣上少室童子向蓬萊逍遙聞四會倐忽度三災緱山引鮑照前軍刑獄參軍王子吹笙去不還當時舊物惟緱山山深老樹藏遺廟秋月春風空自閒轘轅左界連商雒碧瓦朱欄露華薄經時掩戶庭草深永晝無人對花落徘徊未下日將夕遙望嵩陽煙景微鶴馭飄颻向前許林間空見白雲飛門人焦一霑何流清校字
