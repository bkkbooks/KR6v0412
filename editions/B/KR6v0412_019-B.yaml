body:
  text: 文林郎登封縣知縣傅梅元鼎撰章成篇一外方長曰昔人往矣其不與人俱往者豈不以文哉文者道之所宣章者文之所粲章成而爛然與天地為昭來者快睹焉斯足貴已予掇拾嵩山遺文而傷焉孔子曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也前者已無徵矣失今不採後將何據哉嵩山顯於漢自武帝一詔外他文殊甚寥寥何論三代予出沒巖阿手披榛莽僅得石門古篆數語惜殘缺不可讀矣自唐以後始為差備選義就班分區振藻蓋亦有不得已焉耳易賁之彖曰文明以止人文也觀乎人文以化成天下文無所止其何所定耶後之君子披卷而考代變之實有所益焉是旦暮遇之矣梁達磨大師碑武帝我聞滄海之內有驪龍珠白毫色天莫見人不識我大師得之矣大師諱達磨云天竺人也莫知其所居未詳其姓氏大師以精靈為骨隂陽為器性則天假智乃神與含海嶽之秀抱淩雲之氣類鄔陀身子之聰辯若曇磨弗利之聞總三藏於心河薀五乘於口海為玉㲲久灰金言未普誓傳師化天竺東來杖錫於秦說無說法如闇室之煬炬若朗月之開雲聲震華夏道邁今古帝后聞名欽若昊天於是躍鱗慧海振羽禪河法梁天橫佛日高照爾其育物也注無雨雨灑潤身田說無法法證開明理指一言以直說即心是佛絕萬緣以泯相身離眾生實哉凡哉空哉聖哉心無也剎那而登妙覺心有也曠刼而滯凡夫有而不有無而不無智通無礙神行莫測大之則無外小之則無內積之於無成之於有我真教爾乎於時奔如雲學如雨果而少花而多其得意者唯可禪師矣大師乃舒容而歎曰我心將畢大教已行一真之法盡可有矣命之以執手付之以傳燈事行物外理在斯矣意之來也身之住乎意之行也身之去乎嗚呼大師可謂壽逾天地化齊日月使長流法海洗幽冥而不竭永注禪河滌樊籠而無盡豈謂積善不佑皇天何辜月闇禪庭風迷覺路法梁摧折慧水潛流夜壑藏舟潮波汩起何圖不天俄然往矣神色無異顏貌如常其時也地物變白天色蒼茫野獸鳴庭甘泉頓竭嗚呼無為將來有為將去道寄茲行示現生滅以梁大同二年十二月五日終於洛州禹門未測其報齡也遂塋葬於熊耳吳坂矣於是門人悲感號動天地泣流徧體傷割五情如喪考焉如喪妣焉生徒眼滅傷如之何嗟乎法身匪一不現無方骸葬茲墳形遊西域亦為來而不來去而不去也非聖智者焉得而知之乎朕以不德忝統天業上虧隂陽之化下闕黎庶之歡夕惕勤勤旰不暇食萬機之內留心釋門雖無九年之儲以積群生之福緬尋法意恒寄茲門安而作之精矣妙矣傳之耳目乃大師苗裔也嗟乎見之不見逢之不逢今之古之悔之恨之朕雖一介凡夫敢以師之於後未獲現生之得覬有當來之因不以刻石銘心何表法之有也亦恐天變地化將大教之不聞式建鴻碑以示來見乃作頌曰楞伽山頂生寶月中有金人被縷褐形同大地體如空心如瑠璃色如雪匪磨匪瑩恒淨明被雲卷霧心且徹芬陀利華用嚴身隨緣觸物常歡恱不有不無非去來多聞辯才無法說實哉空哉離生死大之小之眾緣絕剎那而登妙覺心躍鱗慧海超先哲理應法水永長流何期暫湧還暫竭驪龍珠內落心燈白毫慧刃當鋒缺生徒忽焉慈眼閉禪河駐流法梁折無去無來無是非彼此形骸心碎裂住焉去焉皆歸寂寂理何曾存哽咽命之執手以傳燈生死去來如電掣有能志誠心不疑刼火焚燒斯不滅一真之法盡可有未悟迷途茲是謁勑戒壇勑唐代宗戒分律儀釋門弘範用申獎導俾廣勝因允在嚴持煩於申謝右勑乃大曆二年十二月會善寺僧乘如因請允分抽東都白馬等寺僧七人赴戒壇灑掃講律具表稱謝帝手勑二十四字答之今碑刻會善寺中字作行書方廣踰二寸精神飛動可愛其碑界作三層上刻中書省牒平章事元載杜鴻漸王縉俱列名中刻謝表真書清勁不俗下刻此勑碑隂刻陸長源戒壇記陸郢書八分遒逸多態不知何時寺僧苦人榻求凡石上會善寺三字皆椎去棄之寺西荒草中為積埃所掩予尋得之歎惋彌日石不踰四尺真行八分三體各臻玅境殊可寶也今仍扶立戒壇之左能保異日長存否記嵩山會善寺戒壇記陸長源汝州刺史御史中丞嵩高得天下之中也所謂名山福地異人靈跡往往而有漢晉間高僧植貝多子於西峰一年三花因為浮圖遂為寰中之真境又有兩阜中斷豁為石門飛流縈回以噴薄喬木森竦以布護先是有高僧玄同律師一行禪師鏟林崖之𢽽傾填乳竇之𥦖甃玉立殿結瓊搆廊檀為香林琉璃為寶地遂置五佛正思惟戒壇思惟者以佛在貝多樹下思惟因名貝多為思惟即三花之義在此自河洛煙塵廟崩𥚚上都安國寺臨壇大德如脩慈業廣秉律道尊志度有緣法庇群動慨茲堙墜遂為聞徹尋有詔申命安國寺上座藏用聖善寺大德行嚴會善寺大德靈珍惠海等住持每年建方等道塲四時講律藏用上人逸躅徧尋高情獨邁美殿之嚴麗賞泉石之勝絕其跡不朽其教益弘於是鐘梵相聞幡蓋交䕃豈獨罏峰名嶽空記遠公之行沃洲精舍重述道林之跡時貞元十一祀龍集乙亥大火西流之月也嵩嶽少林寺新造厨庫記顧少連登封令終翰林學士啟迪真乘無相之門𡨜發揮象教有為之功大非無不可以臻極非有不可以化凡亦由瞻影求形見煙知火通如來誘善之路為群暗嚮明之階㳂淺詣㴱其實一也自漢明帝夢金人履殿訊之于庭采傅毅的然之詞得竺乾惟肖之像精廬始構廟繼興大抵三教之行各有其屬尊嚴所奉齊壹厥心若遊息不殊則其道閒雜若散漫無守則其風𡨜寥是以從其先師皆致室處故孔徒有庠序道士有樓居而釋流謂之寺此聖人所以崇其教也少林寺者蓋權輿於太和中廢於承光更名於大像錫田於開皇若乃應天順人擒盜助信摧魔軍於充斥保淨土於昏霾此又昭彰於我唐也其神異之尤若跋跎之經始靈刼火不焚指盻泉流使之西注稠公揮杖而二獸解闘惠可割臂而三業息塵荃蘭藂植於緇林鸞鶴連翔於法界則有惠光曇隱播芳烈於前玄素明遵嗣徽音於後戾止者皆同一姓來儀者無復二乘蓋釋氏之淹中西方之別館也况其土圭表正風雨所均嵩高峻極山嶽之秀交艮兊之清氣積靈仙之秘蹤故其志道之人好奇之士繫塵籠者屢至求宴坐者永栖菩薩色身未能忘食苾芻老病斯用依仁而庫舍不營坊厨偪陋每王城信士供施所儲栢谷上田穫斂所入雖真如之性不假多藏而大道之行惡其棄地釋法真聿來從學雅尚住持永言剏立志在弘濟乃誓于僧眾陳于上官願因農隟以果營建河南尹杜公黃裳多歷勝因素崇淨業聆風響應如契夙心於是躬主辦之勤假清白之俸復次都人白仙鶴李秀孫光杜珍等共殖嘉苗用滋景福脫鄙𠫤之韁鏁成智慧之舟航錢財無翼而自飛寒暑不期而繼至單貧展效富有匱財神龍施珠香象均力加以寺半崖巘路躡淩兢伐松栢於山巔治瓴甓於巖下佛教善誘人忘其勞爰始爰謀是啟是辟平其坎窞相其廣輪梓人作程郢匠施巧積幹如阜運斤成風真公杖錫指麾語言渜先饑以班食伺渴而饋漿酬以壯傭任以老事期不揆日工無廢時為為櫨為桴為桷洪纖合度尋尺中規鑿枘靡垂樸斵惟稱板幹既具墻垣以興支𣛟得其宜締搆取諸壯以周用固扃鐍風雨攸除塵泥莫侵若乃曲突以舒煙疏竇以流惡陳其鬲扃其釜鬵釋之蒸之惟精惟潔俾其汁有所注氣焰有所通香風時來蕩滌煩燠斯乃厨之制也㴱中以虛受闔扉以制出陳其杙施其緘縢取之用之不費不約必使公供無所耗歲計惟其明玄𨵿載施成我密固此又庫之宜也乃崇佛宇欄楯孔嚴乃飾僧堂屋壁增煥新亭弘敞閱香積之飯危樓聳擢俯耆闍之山每至華鐘大鳴旭日三舍緇徒總集就食于堂莫不永歎表誠肅容膜拜先推尊像次及有情洎蒲牢之吼餘海潮之音畢五䀋七菜重秬香秔來自中𢊍列于廣榭咸造勿𮒸己事而踆勤求者無次第之勞暮齒者有終焉之託不𠍴于素克壯其猶檢校上座僧淨業寺主靈湊都維那智寰典座道悟惟清老㝛圓濟僧如空惟陟等䖍奉矢謀式昭畢務故得莊嚴寶地豐潔中餐紹前規招延後學以是功德侯其禕而夫教不自弘因人而大有以法從中得默契真空有以事假外緣用扶正諦總是二者其維真公真公俗姓張杭州䀋官人也歷刼勤道髫年出家雖冥心於此山蓋授記於前不然者安得弘誓既發群心悅隨興立招提如此其盛大曆之季少連嘗吏登封暇日之遊竹園伊邇次宗之依惠遠鑿齒之慕道安塵俗之人幸不遐棄一行入仕二紀于茲前年典選洛師邂逅相遇名山在目道友依然願言從之王事拘我於是得其軌躅作厨庫記云時貞元戊寅歲皇帝纘服之廿載也少林寺碑裴漼太子賓客諡曰懿原夫星垂梵界聖緣開萬化之先日照王宮神跡蘊三靈之始包至虛以見世象教久傳於曠刼籠群有以示凡法身初應於中古見神通之力廣拔苦門開智惠之門㴱明樂界鶴林變色觀其戀慕之心鴈開扉通其瞻仰之路少林寺者後魏孝文之所立也東京近甸太室西偏正氣居六合之中清都控九州之會緱山北峙亘宛洛之天門潁水南流連荊河之雲澤信帝畿之靈境陽城之福地沙門跋陁者天竺人也空心玄粹惠性淹遠傳不二法門有甚㴱道業緬自西域來游國都孝文屈黃屋之尊申緇林之敬太和中詔有司於此寺處之淨供法衣取給公府法師廼於寺西臺造舍利後造飜經堂香水成塗金繩為約苦心精力俾夜作晝多寶全身之地不日就工如來金口之說連雲可庇西緣長澗夾松栢之蕭森北拒㴱崖覆筠篁之冥密煙花濃靄暝下天香泉籟清音曉傳空樂跋陁息心茲地樂靜安居感而遂通境來斯證寤寐之際若有神人致石磬一長四尺䂓制自然聲律咸具得之河曲空聞漢使之談浮於泗濱徒入夏王之貢管弦風夜合清響於中天鐘梵霜晨諧妙音於上刼時有三藏法師勒飜譯經論遊集剎土稠禪師探求正法住持廟虬箭不居光塵易遠虹梁所指象設猶存周武帝建德中納元嵩之說斷釋老之教率土伽藍咸從廢毀明皇帝繼明正位追崇景福大象中初復佛象及天尊象廼於兩京各立一寺因孝思所置以陟岵為名其洛中陟岵即此寺也隋高祖受禪正朔既改徽號已殊惟此寺名特令仍舊開皇中有詔二教初興四方普洽山林學徒歸依者眾其栢谷屯地一百頃宜賜少林寺大業之末九服分崩群盜攻剽無限真俗此寺為山賊所刼僧徒拒之賊遂縱火焚院院中眾宇倐焉同滅瞻言靈歸然獨存天龍保持山祗福護神力所及昔未曾有寺西北五十里有栢谷墅群峰合沓㴱谷逶迤磴緣雲俯窺龍界高頂佛日傍臨鳥道居晉成塢在齊為郡王世充僭號署曰轅州乘其地險以立烽戍擁兵洛邑將圖梵宮皇唐應五運之休期受千齡之景命掃長虵薦食之患拯生人塗炭之災大宗文皇帝龍躍太原軍次廣武大開幕府躬踐戎行僧志操惠㻛曇宗等審靈睠之所往辨謳歌之有屬率眾以拒偽師抗表以明大順執充姪仁則以歸本朝太宗嘉其義烈頻降璽書宣慰既奉優教兼承寵錫賜地四十頃水碾一即栢谷莊是也迨海㝢既平憲章云始偽主寺觀盡令廢除僧善護洞曉二門遠該三行詣闕進表特蒙置立武德中寺有白雀見貞觀中明禪師造重之辰白雀復瑞見圖肇啟初欲呈祥寶殿纔興遽聞相賀高宗天皇大帝光紹鴻業欽明至理嘗因豫游每延聖敬咸亨中乘輿戾止御飛白書題金字波若碑留幡像及施物永淳中御札又飛白書一飛字題寺壁雲開顧鶴電轉遊龍神草竸秀於椒塗雲泉迥飛於錦石雕甍增耀若綴春葩金疊分輝似懸秋露天皇升遐則天大聖皇后為先聖造功德垂拱中有冬竹抽笋院後復有藤生證聖中中使送錢於藤生處修理階陛寺上方普光堂功德隨日修造自爾飛鳥莫敢翔集此寺跋陁疏置業造神微皇家尊崇事光幽秘珍符臻於動植靈應亟發於庭除累聖屬心每頒渥澤王言宸翰既疊暎於鷄峰寶像珠幡亦交馳於龍壑皇上𥈠圖廣運神用多能藉明臺之化清繹天池之墨妙以此寺有先聖締搆之跡御書碑額七字十一年冬爰降恩旨付一行師賜少林寺鐫勒梵天宮殿懸日月之光華佛地園林動煙雲之氣色漢元魏武徒衒奇於篆素鍾繇蔡邕虛致美於緗簡日者明勑令天下寺觀田莊一切括責皇上以此寺地及碾先聖光錫多歷年所襟𭘧明山延袤靈跡群仙是宅邁羅閱之金峰上德居之掩育王之石室特還寺眾不入官𠬧曾是國土崇絕天人歸仰固以名冠諸境禮殊恒剎矣高僧跋陁明三藏心禪諸門弟子惠光道房稠禪師等精勤梵行克傳勝業惠光弟子僧達曇隱法上法師等十大德亦號十英復有達磨禪師㴱入惠門津梁是寄弟子惠可禪師等玄悟法寶嘗託茲山周大象中寺初復選沙門中德業灼然者置菩薩僧一百二十人惠遠法師洪遵律師即其數也皇唐貞觀之後有明遵慈雲玄素智勤律師虛求一義洞真諦之源復有大師諱法如為定門之首傳燈妙理弟子惠超妙思奇拔遠契玄蹤文翰煥然宗塗易曉景龍中勑中嶽少林寺置大德十人數內有闕寺中抽補人不外假座無虛授澄什聮華林遠接武星霜殆周於二紀蘭菊每芳於十步上座寺主都維等牢籠法藏遊息禪林德鎣神珠戒成甘露海內靈嶽莫如嵩山山中道塲茲為勝殿二室𢌞合八谷潺湲地迊貝花門連石柱妙樓香閣俯暎喬林金剎寶鈴上清漢法界之幽賛如彼皇家之福應如此天長地久不傳忉利之宮刼盡塵微孰記鐵圍之會精求貞石愽訪良工將因墨客之詞或頌金仙之德聿宣了義遠喻真空其詞曰恒沙國土微塵品類妄見飛奔正心蘊櫃昏途莫曉淨根將墜樂於蓋纏若安夢寐烝哉大聖降跡𨶒浮潛𢌞寶軸廣運慈舟實無滅度示有降柔紺宮西闢白馬東流迷因慢生悟為信起玉剎斯建寶山載峙花臺竹林清泉妙水靜唯真相湛然攸止巖巖嵩嶺河洛巨鎮下屬九溪上干千仞天磴重阻仙都清峻式創招提是資誘進婉彼上德載誕耆闍傳業西土演教中華孝文申敬恩賜仍加經營宴室迥出雲霞中嶽北阯嵩高西麓斜界玉池洞開栢谷紆餘崗澗連延水木鬱起𣃼檀云誰卜築吾師苦行清修道塲勵精像宇專力經堂金界繩直椒塗水香散花有地栖禪得方解空應真默識開士乘盃遊集振錫戾止翻譯幽偈發揮妙理仙感靈神雀降祉運交土木代歷周隋刼火遞起魔風竸吹法身咸翳淨國同隳或聞興復詎振崩離神堯應期撥亂反正皇矣覺力大弘福慶式遏醜徒聿扶興聖累降恩旨兼敷錫命高宗時豫先后卜征亟迴雕輦屢倚虹旌巖題玉札地振金聲珍符薦至在物斯呈我皇龍興有典咸秩懿茲上界式儲神筆雲大圍鸞𢌞少室草垂仙露林昇佛日護持八正每候能仁跋陁降德稠公有鄰厥後真侶更傅了因辯才高行無替清塵倬焉梵眾代有明哲今我諸公蘊彼禪恱芳蘅杜淨踰冰雪遠締津梁無非苦節潁上靈嶽山間寶殿秀出梵天孤標神縣芥城可竭桑田有變貞石永刊靈花常遍嵩嶽寺碑李邕北海太守凡人以廟者敬田也執於有為禪𡨜者慧門也得於無物今之作者居然乎至若智不生妙用不動心滅法滅性空色空喻是化城竟非住處所以平等之觀一洗於有無自在之心大通於權實假其方便法雨潤其根莖流水盡納於海濡聚沙俱成於佛道大矣廣矣不可得而談也嵩嶽寺者後魏孝明帝之離宮也正光元年牓閒居寺廣大佛剎殫極國財濟濟僧徒彌七百眾落落堂宇踰一千間藩戚近臣將衣止碩德圓戒作為宗室及後周不祥正法無緒宣皇悔過道叶中興明詔兩京光復三所議以此寺為觀古為壇八部扶持一時靈變物將未可事故獲全隋開皇五年隸僧三百人仁壽一載改題嵩嶽寺又度僧一百五十人逮𧲣狼恣睢龍象凋落天宮墜搆刼火潛燒唯寺主明藏等八人莫敢為尸不暇補且王充西拒蟻聚洛師文武東遷鳳翔巖邑風承羽檄先應義旗輓粟供軍悉心事主及傅奕進計以元嵩為師凡曰僧房盡為除削獨茲寶地尤見褒崇賞典殊科明勑洊及不依廢省有錄勳庸特賜田碾四所代有都維那惠果等勤宣法要大壯經行追思前人髣髴舊貫十五層者後魏之所立也發地四鋪而聳陵空八相而圓方丈十二戶牗數百加之六代禪祖同示法身重寶妙莊就成偉麗豈徒帝力固以化開其東七佛殿者亦曩時之鳳陽殿也其西定光佛堂者瑞像之戾止昔有石像故現應身浮於河逹於洛離京轂也萬輩延請天柱不𢌞惟此寺也一僧香花日輪俄轉其南古者隋仁壽二年置舍利於群嶽以撫天下茲為極焉其始也亭亭孤興規制一絕今茲也巖巖對出形影雙美後有無量壽殿者諸師禮懺誦念之塲則天太后護送鎮國金銅像置焉今知福利所資演成其廣珠幡寶帳當陽之舖有三金絡花鬘備物之儀不一皆光滿秋月色陵渥丹窮海縣之國工得人天之神妙逍遙樓者魏主之所搆也引流插竹上登樓菱鏡漾於玉池金虬飛於水食堂前古鐵鐘者重千斤函二十石正光年中寺僧之所造也昔兵戎孔殷𭁵攘偕作私邑竊而為公府淪而作後有都維那惠登發夕通夢遲明獨往以一己之力抗分眾之徒轉戰而行踰晷而至雖神靈役鬼風雨移山莫之捷也西方禪院者魏八極殿之餘址也時有遠禪師座必居山行不出俗四國是仰百福攸歸明凖帝庸光啟象教南有輔山者古之靈臺也中宗孝和皇帝詔於其頂追為大通秀禪師造十三級浮圖及靈廟極地之峻因山之雄華夷聞傳時序瞻仰每至獻春仲月諱日齋辰鴈陣長空雲臨層嶺委鬱貞栢掩映天榆超進寶階騰乘星閣作禮者便登獅子圍遶者更攝蜂王其所內焉然矣若以逹磨菩薩傳法於可可付於璨璨受於信信咨於忍忍遺於秀秀鍾於今和尚𡨜皆宴坐林間福潤㝢內其枕倚也隂陽所啟居四嶽之宗其津梁也密意所傳稱十方之首莫不佛前受記法中出家湛然觀心了然見性學無學自有證明因非因本來清淨開頓漸者欲依其根設戒律者將攝乎亂然後微妙之義㴱入一如廣大之功遍滿三界則知和雅所訓皆荷法乘慈悲所加盡為佛子是以無言之教響之若山不舍之檀列之如市則有和尚姪寺主堅意者憑信之力統僧之綱崇現前之因鳩最後之施相與上座崇泰都維曇慶等至矣廣矣經之營之身田底平福河流注今昔紛擾雜事夥多是以功累四朝法崇七代感化可以函靈應緣起所以廣玄故得尊容赫曦光聮日月廈屋弘敞勢蹙山川向有足度四生鍾重有足安萬國豈伊一丘一壑之異一水一石之奇禪林玲瓏層㴱隱見祥河皎潔丹艧澄明而已哉咸以為表於代者業以成形藏於密者法亦無相非文曷以陳大略非石曷以示將來乃命道奐禪師千里求蒙一言書事專精每極臨紙屢空媿迷津之未悟期法王之可通其詞曰西域傳耆闍山世尊成道於其間南部洲嵩嶽寺逹磨傳法於茲地天之柱帝之宮赫奕奕兮飛九空禪之門覺之徑密微微兮通眾聖鎮四國定有力開十方惠有光立豐碑之隱隱表大福之穰穰李北海邕以書法名于唐若秦望山法華寺及東林寺岳麓寺諸碑俱傳于世而嵩岳寺舊志載碑文一篇為李邕作想亦其所自書也寺廢已久予屢覔無所得徘徊瞻眺惟見荒煙野草瀰漫山谷而已言之黯然永泰寺碑釋靖彰天寶間隆興寺僧觀夫聖應無方等曜靈之流萬象覺海玄曠若溟渤之含百川凝然居眾妙之先煥矣處有空之際於是慈光西燭慧液東飛廣開㩲實之門爰啟布金之義粵茲寶界創自後魏正光二載即孝明帝之賢妹也乃居寵若驚克修雅志礭乎出俗入道為尼以誠信有徵勑為置明練之寺兼度士庶女等百有人矣頃遇周武不敏正教陵夷至隋氏開皇重加修復又度尼廿一人以崇景福暨有唐貞觀三載議將尼寺居山慮恐非人侵擾勑令移額於偃師縣下置此因廢焉至神龍二載七月廿五日有嵩嶽寺都維僧道瑩奏聞此故寺依山𭘧水形勝幽棲不假多工便堪居住伏惟故永泰公主器韞冲和承䂓帝闕庶增瓊萼冀保枝何圖厭代辭榮遷神遂遠二聖痛金娥之殞兆人興玉碎之悲凡厥有情孰不傷悼至論潛祐必賴薰修伏望天恩為永泰公主於前件故伽藍置寺一所請以永泰為名特望度僧二七人庶使福資冥路竊惟聖不孤運會緣必興建寺立僧寔由於此自茲已降暨乎至今亦有別勑配居或牒兩京名德翼翼清眾五十餘人咸以軌範端融心澄海月鵝珠育物禮誦無虧常懷報國之恩庶願福增皇祚千佛二古者昔明練之所起亭亭四照嶷嶷空龕室朎朧重光𢌞暎其閒大窣堵波者隋仁壽二載之所置文帝應命感異稀奇忽得舍利一雪毫燦爛火焚益固擊之逾明乃詔天下梵場令起供養為蒼生之祈福也䂓制妙絕神工未方永鎮檀林以昭盛烈東有兩支提者昔寺主道瑩上座崇敬遺教門人之所造也二長老僧國寶振古超今息化歸真法俗追悼故起斯前門樓浴室食堂經藏者即大德曇陟律之所搆也律師㝛智圓明知微察物少編僧錄風骨天然精持大乘玄通數部不住無相兼崇有為沙門思晤者心燈獨知跡無住處諸佛遺旨必能竭其䈥力諸魔動念必不愛其死生乃跋涉江山樸斵杞梓食堂之力頗有助云九級浮圖者比丘真一敬為故兄寺主真藏之所建也禪師積德累仁果曾慈惠玉昆金友俱離塵籠弟子沙門志堅及陳留郡封禪寺都維僧希宴等敬為和尚樹茲景業藏寺主絢彩凝華心鏡虛朗再成寶殿重立尊儀但有闕遺盡加營葺并鑄大銅鐘一口重四千斤函廿石裝餙嚴麗備物維新金容將滿月齊暉玉相與日輪爭曜簷宇四繞𢌞廊復周蹬道淩虛懸階數帀風鈴夜警聲聲流解脫之音曉梵朝吟一一讚苦空之偈嘉木繁植祥花接異菓恒春膏柳垂幡喬松結蓋而雲際前寺主道演前上座智光前都維元順皆體道歸一異本同源逍遙林泉躧履雲壑復有沙門法意敬一等至樂大乘沈心不二一日必𦲭當賈勇而行諸六時精勤縱力極而不廢其寺也嵩巖右脅龍津左傍前眺案崗萬公居後地形澄垽幽磎對靈鎮之臺山勢巍峩峰頂與層巒俱峻昔跋陀三藏懸記此方人安眾和福利彌廣時上座明信寺主道俊都維敬一並操履霜潔動成紀綱德義相資同知寺任但恐三輪一轉海際塵驚若不刊勒貞璆何以表之靈跡靖彰內慚㴱定外謝多聞敢違㝛心昧揚休烈其詞曰佛性微遍含識隱顯自在兮無量力開秘藏耀無疆寶剎嚴凝兮仙路長韻慈鐘震懸極警眾沈昏兮清閫域光勝宅啟津梁淨彼地獄兮與天堂昔明練今永泰跋陁遠記兮斯為大刻珍石炳微言曠代昭宣兮萬祀傳書告柏谷塢少林寺上座書太宗太尉尚書令陝東道益州道行臺雍州牧左右武候大將軍使持節凉州總管上柱國秦王世民告柏谷塢少林寺上座寺主以下徒眾及軍民首領士庶等比者天下喪亂萬方乏主世界傾淪三乘道絕遂使𨶒浮蕩覆戎馬載馳神州糜沸群魔竸起我國家膺圖受籙護持正諦馭鴈飛輪光臨大寶故能德通黎首化闡林既沐來蘇之恩俱承彼岸之惠王世充叨竊非據敢逆天常窺覦法境肆行悖業今仁風遠扃慧炬照臨開八正之塗復九㝢之跡法師等並能㴱悟機變早識妙因克建嘉猷同歸福地擒彼兇孽廓茲淨土奉順輸忠之効方著闕庭證果循真之道更弘像觀聞以欣尚不可思議供養優賞理殊恒數今東都危急旦夕殄除並宜勉終茂功以垂令範各安舊業永保休祐故遣上柱國德廣郡開國公安遠往彼指宣所懷可令一二首領立功者來此相見不復多悉右書乃唐文皇圍洛陽時以少林寺僧建功遣使致書獎慰之今書鐫豐碑樹東廊鐘樓前額隸云太宗文皇帝御書額下橫書云已上七字開元神武皇帝書乃知書為太宗親筆而額為玄宗親筆二帝之字俱遒逸有法可寶也王司寇謂書為幕僚筆而以開元等七字疑後人所妄加失在未見碑額耳下層刻裴懿公漼自書碑文字秀勁多態足稱能品御製修少林寺書武后暑候將闌炎序彌溽山林靜𡨜梵宇清虛宴坐經行想當休悆弟子前隨鳳駕過謁鷲巖觀寶以徘徊覩先妃之淨業薰脩之所猶未畢功一見悲驚萬感兼集攀光寶樹載㴱風樹之哀弔影珠泉更積寒泉之思弟子自惟薄祜鎮切焭懷每秋期倍軫摧心之痛炎凉遞運逾添切骨之哀未極三旬頻鍾二忌恨乘時而更恨悲踐露而逾悲唯託福田少申荒思今欲續成先志重置莊嚴故遣三思齎金絹等物往彼就師平章幸識斯意即務修營望及諱辰終此功德所冀斯誠懇以奉津梁稍宣資助之懷微慰焭迷之緒略書示意指不多云銘少林寺靈運禪師功德碑銘并序崔琪大理評事虛空廣大乎其體智慧圓融乎其用凝而不生湛爾常寂離修離證非色非心歷微塵刼遞周沙界無量國土皆清淨無量昏暗皆光明誰其得之吾聞諸上人矣上人諱靈運蕭姓蘭陵人梁武帝後皇考翥州恒農縣尉初上人之生也戒珠孕於母胎定水徵於孩性內典㝛植外學生知白雲凝其高志明冰峻其苦節泛如也時不能知常以為幻境非實泡身是妄五色令人昏五音令人聾五味令人爽噫輪彼生迹移歲遷則物換况法興化永念從心積豈可使上人之高歿而不紀是斵片石以旌斯文銘曰上人伊何傳我法印其體也𡨜其行也順紛彼識浪汩夫夢情非照不曙非澄不清作大毉王為大禪伯嶽立松古蓮青月白一朝化滅六合悽愴世界颯空雲山忽曠色身謝兮法體存金界慘兮䥫圍昏噫我所留者唯心源嵩山之下銘甚多在唐為尤侈大抵皆僧輩勦詞臾鬼不足存也靈運禪師碑僅四尺許在少林寺首行題下刻宣德郎試大理評事崔琪撰次刻聖善寺沙門勤六字下碑角刓二字必此僧書耳筆法無一畫不類聖教序者足見古人心力精專雖方外之人臨池不苟若此予每至寺中輒坐臥其下撫玩良久不忍便去恐世久磨滅特為表出欲比韓陵一片石蓋以字不以文也少林寺戒壇銘并序釋義淨開元時僧粵以長安四年歲次甲辰四月七日此寺綱維寺主義獎上座智寶都維大舉法濟禪師及徒眾等是以少林山寺重結戒壇欲令受戒懺儀共遵其處遂乃遠之都下屈諸大德慇懃致禮延就山門是時我老苾芻義淨及護律師瑳禪師思禪師恂律師暉律師恪律師威律師等既至寺所解舊結新僉議此邊名滅無時息焉吾將歸根以復於正因遊嵩山至少林寺有始終之意焉會舅氏據於高平而上人遂緇於此郡玉立凡石不可喻其炯然日暎眾星無以方其明者竟移隸茲寺以副乎夙心無何習禪决於龐塢珪大師潛契密得以真貫理照十方於自空脫三界於彼著慧眼既淨色身亦如始知夫心外無法所得者皆夢幻耳然後觀大地土木無非佛剎焉空山蒼然窮歲默坐猿對茶椀鳥棲禪庵彼嶺雲無心即我心矣彼澗水無性即我性矣夫如是孰能以凡聖量之乎故吾在造化中如夢中也粵開元十有七祀夏五月廿二日不示以疾汩然而終苦霧晦黃於天地悲風哀咽於草木吁崩吾禪山涸吾法海空吾世界使凡百含識大千有情荼於是火於是可勝言哉故門人堅順獨建靈於茲山奉遺教也夫碩德丕發不有超世先覺而出夫等夷者則曷能傳我法印以一燈然千萬燈乎彼上人者嶷然倬立以定慧為藏以涅槃為山圓通於不住之境出沒於無涯之域適來時也適去順也今則絕矣瞻仰如之何夫事往則為小界標相永定冀無疑惑于時護鵝珍之嘉士無召自來存草結之英賢不期而會數逾一百行道三旬共繫頸珠俱修趺足誠五濁之希有慕四依之住持虛往實歸紹隆無替庶乎桑田屢改長存立石之基砂界時遷無爽布金之地恐地成碧海嶺變青山迷此結辰乃為銘曰羯磨法在聖教不淪式傳金口是敬是遵目觀西域杖錫東巡覩盛事而隨喜聊刊紀乎斯文碑嵩山會善寺碑王著翰林學士夫日月運行因太虛而顯象山河駢列自不宰以成形惟通幽以洞微乃依空而立實如來之道妙用歸真蓋憑有相之宗方悟無為之理何名有相度人煩惱之流孰曰無為捨筏涅槃之岸伽藍所設像教如然雒邑舊都嵩山勝槩蒸騰雲霧呈奇於三十六峰棲止聖賢垂化於百千萬刼會善寺者基搆資始本後魏孝文之離宮棟宇相循為澄覺禪師之精舍恭陵王乃一時哲士施作福田澄覺師則六祖名流淨其心地出於㝛種同植善根隋開皇年中賜名會善逮及唐室增餙梵宮窣堵波上戛彤霞琉璃壇下鎮金地賢才紀其靈跡宸翰降其標題歲成具戒者盈千日受潔供者數百靈山之內寺為首焉頃屬梁祚始興神京久圮徹㴱嚴之寶殿增壯麗於國門甲子再周壞而弗葺聿興盛事必有良時我國家化洽九圍道隆千古薄俗增厚澆風變淳印土僧來獻龍宮之貫綖梁園起剎比鷲嶺之開蓮茲寺住持僧奉言故壇長賜紫大德敬溫之門人也戒行珠圓律儀冰潔扣大雄之法鼓洞至妙之言筌後有憩鸖山崇慶禪院僧全審者樹下三衣虎隈衲冡間一飯鬼每分餐巡禮而來於焉至止覩遺基而浩歎與眾意以同符各勵丹誠誓修紺宇風塵於千里歷寒暑於九衢眾乃降心人皆聳善或捐重貨或捨奇珍數稔之間淨財告足乃於舊址特創新䂓蓋成大殿一座七間石柱森羅寶堦縈繞丹楹刻桷下捧上承繡棟雲楣外華內實鴛鴦逐瓦得侶還來螮蝀隨梁逢時復見熒煌熠煜臺山金燭之明崷崒巍峩閬苑瑤峰之勢列數筵之寶座儼三世之睟容眾訝奇功甲諸靈境矧况明神宅於茲嶽巨福異於他山中天王昔備信心珪禪師曾受淨戒移高峰之松檜用爾變通抑上界之雷霆聿明昭報所以王之享祀今弗食薰將榛栗以易牲牢陳茗荈而代酒醴諒惟玄貺別濟群生每至林壑秋凉煙花春煦車馬絡繹絲竹和鳴士人奔湊於靈祠蹊逕皆由於厥寺罔不開襟蘚石濯足珠泉月照松軒共起清虛之思雲歸乳洞皆生寂滅之心利樂有情不言而信至矣善逝化諸後來足躡解脫之門以方便故人自弗知身沈苦惱之津以暗故人終不覺惟會善之靈應如彼惟佛殿之興隆如此非言公等與審公精進化導猶涉海以無舟非白眾與黑眾等勇猛修行若冲虛而乏翼誓願已足功德再圓如是則結施名檀必恒沙之福因心闡法將為登地之流著也居含識中仰菩提道初聞創制願為裁文不敢妄言謹為銘曰興雲雨兮會神龍峙嵩嶽兮天之中惟會善之聖地繼天竺之真風有窣堵波兮栖靈骨有琉璃壇兮鎮梵宮寺由賢哲兮立䂓制殿遇昏狂兮為壞空今景化兮淳和浹洽有苾芻兮精進修崇寺載隆兮殿載建美哉享福德兮無窮雜文達磨頌黃庭堅吏部員外知太平州少林九年垂一則語直至如今諸方賺舉達磨面壁大師賛蘇軾團練副使贈太師諡文忠少林素壁不以為礙彌天同輩不以為泰稽首六師昔晦今明不去不來何損何增俯仰屈伸三十一年我雖日化其誰能遷嵩山祝文蘇轍大中大夫諡文定轍昔緣吏役自陳如洛道出嵩少秋雨方淫繁雲如絮纏覆山上究觀近麓莫矚諸嶺據鞍默禱庶幾一見俛仰未幾豁然雲移如卷重帷卻置山後連峰角立草木可數驚顧竊歎莫知其由昔韓愈南征有感於衡豈以無似克配前烈默然慙惕不以語眾至于今日十有八年永懷疇昔有不能已謹遣家兵以茶酒香燭及佛經疏伸導薄誠神鑒不昧景響昭答嵩山紀行邵伯溫司馬公居洛嘗同范景仁過韓城抵登封憩峻極下院登嵩頂入崇福宮會善寺由轘轅道至龍門遊奉仙諸寺上華嚴閣千佛巖尋高公堂渡潛溪入廣化寺觀唐郭汾陽鐵像渡伊水至香山皇龕憩石樓臨八節灘過白公影堂凡所經從多有詩路險策杖以行故嵩山題壁曰登山有道徐行則不困措足於平穩之地則不跌其旨遠矣金記重修面壁𤲅記李純甫京兆府判官屏山居士儒家子也始知讀書學賦以嗣家門學大義以業科舉又學詩以道意學議論以見志學古文以得虛名頗喜史學求經濟之術㴱愛經學窮理性之說偶於玄學似有所得遂於佛學亦有所入學至於佛則無可學者乃知佛即聖人聖人非佛西方有中國之書中國無西方之書也吾佛大慈皆如實語發精微之義於明白處索玄妙之理於委曲中學士大夫猶畏其高而疑其㴱誣為怪誕詬為邪惜哉龍宮海藏琅函貝葉無慮數千萬言頂之而不觀目之而不解且數百年老師㝛德又各執其所見裂於宗乘汩於義疏吾佛之意掃地矣悲夫梁普通中有菩提達磨大士自西方來孤唱教外別傳之旨豈吾佛教外復有所傳乎特不泥於名相耳真傳教者非別傳也如有雅樂非本色則不成宮商如有甲第非主人則不知庭戶自師之至其子孫徧天下多魁閎磊落之士碩大光明表表可紀劇談高論逕造佛心漸於義學沙門波及學士大夫潛符密契不可勝數其著而成書者清凉得之以疏華嚴圭峰得之以鈔圓覺無盡得之以解法華潁濱得之以釋老子吉甫得之以注莊子李翱得之以述中庸荊公父子得之以論周易伊川兄弟得之以訓詩書柬萊得之以議左氏無垢得之以說語孟使聖人之道不墮於寂滅不死於虛無不縛於形器相為表裏如符券然雖狂夫愚婦可以立悟於便旋顧盻之頃如分餘燈以燭冥室顧不快哉道冠儒履皆有大解脫門翰墨文章亦為游戲三昧此師之力也新學晚生愧無以報今因少林主人志隆命其侍者海淨問訊屏山曰照了居士王知非暨劉菩薩并其徒儲道人重修面壁𤲅既已落成請記其歲月時大金興定四年中元之前一日也隨喜之餘又洗手焚香而為之賛曰玄𨵿未啟玉鎖生苔靈臺未洗金鏡塵埋鐵牛穿鼻石女懷胎孰為具眼鼻祖西來舟行萬里禪心如灰壁觀九年梵音如雷不戒而戒不齋而齋一衣一鉢五葉花開或杖或拜或嗔或舞謦欬揚眉顰呻舉武或咄或咦或吽或普柏樹藥欄燈籠露柱彈指張弓吹毛擊鼓跌宕形容逕庭言語太漫汗中剔渾淪處有者箇在又恁麼去津然可口如甘露漿薰然入骨如薝蔔香如發管鑰如施印章金仙海藏同時放光竊吾糟粕貸吾粃糠粉澤孔孟刻畫老莊八萬四千清凉道塲屏山說破誰敢承當新修雪庭西舍記李純甫昔達磨大士面壁九年神光㝛業儒術且尚玄學遂見祖師於此地立雪斷臂方得西來意盡發孔老言外不傳之妙大顯於世士大夫有疑之者僕作面壁𤲅記已辨之矣此記既出諸儒有譁而攻僕者曰觀密二師固學佛者李翱王介甫呂惠卿蘇子由張天覺亦佛之徒耳如伊川東萊無垢諸先生其視佛老如仇讐然子以為得佛之道不亦誕乎僕笑應之曰諸先生之書尚在所謂陽擠而隂助者多矣真得祖師掃蕩之意學者疑其云云是對癡兒不得說夢也如致堂先生胡寅在伊川門下排佛之尤者著崇正辨七十餘篇詬罵靳笑無所不至雖然止罵像季以來破戒僧耳近得其所著讀史管見其言歷詆諸儒謂荀况正而失之駮董仲舒粹而失之泥楊雄潛而失之愞王通懿而失之陋韓愈達而失之淺由秦漢至五代千三百年無知道者至於斵輪操舟之工雕刻刺繡之巧累丸升竿之習及其精也疑於不可思度况人之所以為人有大於此者乎老氏知之故有真以治身土苴為人之說佛氏知之故有不立文字指心見性之傳又曰老莊之言奧窈宏達非荀楊諸子所能及又曰㴱讀佛書其庭戶未易知其奧窔未易窮其辨未易折其精極之地未易到豈老莊所得擬哉其說如此學者當熟思而詳考之吁陳無已謂儒者不得其傳固得罪於儒者僕謂儒者亦得其傳又得罪於儒者然則儒者果得其傳乎果不得其傳乎得與不得相去幾何嗚呼噫嘻孔老復生不廢吾言矣遂書此言以為雪庭西舍記嵩頂重修峻極禪院記釋道琇大定時戒壇院僧二曜當天逐千波而肆影一真澄湛應萬彙以分形悲則不住涅槃智則不隨有海緣會也嵐園示跡緣散也雙樹潛輝隱之則三界暝曚顯之則十方洞曉興之則福田茂盛建之則列剎交光非小智之所為誠大雄而可爾嵩峰絕頂者得中原之最勝也可謂三峰插漢五嶽居中瑞雲罩頂偏招賢聖潛居霧瑣青松時有高人隱迹法華嵓畔珪師開甘露之門屼峰前天后立聖神之銘雲生西嶺點破太虛日照東山曜開禪目由是一毛孔內千里仍觀萬象頭中百通一致梵剎靈祠開列二諦交參仙宮紫府雲排清虛一味風聲谷響談不二圓音碧綠青黃現色身三昧勿謂五峰嚴麗鷲嶺超奇顧此嵩峰斯為上矣峻極禪院者古昔周晉之間所建也時號天成有僧安禪師自金陵來駐足名峰潛神斯地禪師四儀庠序一志孤高禪月輝輝照破群生暗願心珠朗朗明開向上機𨵿當知覺樹華開乾坤洞曉優曇蘂綻遠邇聞香未逾數祀感文殊降迹遂修殿一所後至天福年中乃蒙賜額峻極禪院次第經久頗有隳壞又至宋末王貴妃自備俸錢重修大殿繼遭兵革廢蕩無迄至於今荒殘甚矣今有忠公禪師者乃𨵿中京兆人也雲門後裔五乳嫡孫師自從幼歲不濫俗流一志空門堅求出離改元大定落髮披緇負鉢携笻恭參知識禪林徧訪處處投機後至陸海因緣相會可謂赫日當天難藏瑩彩明珠出海詎掩光輝時遇州主刺史率眾官宰及諸僧首請住靈泉師既事不獲已不免依從自此鉗鎚密用與禪人拔楔抽釘法綱鋪舒於苦海撈龍打鳳次後三住大剎四眾依棲自覺緣會緣離古今常爾遂將衣盂捨獨步嵩峰晦跡韜光棲神數載為見聖基殘毀歎而可傷纔興一念之心四遠檀那悉委助功助手有若雲臻供利供材還同雨至門徒來往不憚崎嶇衲子參求曷辤𡽗阻未逾周歲院宇重新結制安居家風似舊莫不是孤峰頂上餬餅重香古剎頹基寒灰再焰將此大業欲示未來宜在刻石可傳永久囑余為記匪敢固辭不揆荒才聊申歲月耳少林禪師裕公碑程鉅夫翰林學士承旨皇慶元年春集賢大學士榮祿大夫臣陳顥奏請封贈少林開山住持光宗正法大禪師福裕制贈大司空開府儀同三司追封晉國公命詞臣文之碑臣鉅夫奉職惟謹佛法相傳有信具至達摩持以航海梁武帝問道不契去之魏隱於嵩山少林寺面壁九年為禪宗鼻祖六傳而至大鑒復派而為五師所居達摩處也其宗以湛然常寂為真空洞不虛為實廣大不蕩為際其教人亦惟曰性善其論曰推一而萬則事無非真混萬而歸一則真無非事故曰當仁又曰能仁隂有以格君心而賛皇猷未嘗以福田利益嘐嘐語人而慈雲法雨隂覆潛被歷代帝王意欲清心靜治使萬姓蒙福謂浮圖言可底行奉之㴱至此其大略也歲乙巳世祖潛邸命師少林大作資戒會俾建精舍於故里曰報恩給田若物以飯眾戊申定宗詔住和林興國未朞月憲宗召詣帳殿奏對稱旨俾總領釋教授都僧省之符優復僧尼得廢寺二百三十有七區庚申世祖即祚因論辨偽經馳驛以聞火其書仍襲爵賜光宗正法之號時萬壽祖席無可當之者眾請師主之計以堂鉢之費未免經葺得都南柳林閑田二百頃餘辟玉泉北墅觀音別院自餘藥室浴宇賈區拾其贏以卒歲尋分建和林燕薊長安太原洛陽為五少林始終萬壽十四夏主護之力居多既老倦於接納歸棲嵩陽未久示微疾書偈告終俗壽七十三僧臘五十二嗣法小師三十人度弟子千餘指奉戒者莫可紀嗚呼師去世已遠今上皇帝寵以贈典言行而道大也皇帝若曰洪惟世祖神武不殺本仁祖義以一天下朕欲昭我祖德持盈守成惟爾克紹乃初祖永孚於仁以弘濟我兆民顧先哲其逝朕弗克見於茲邈焉雖去來夢幻無得而名封諡哀榮豈不在我其尊爾官隆爾爵以寄予思以廸後人以永譽於萬世師之住世也三閱藏典而成誦誘掖後學無倦色通群書善翰墨吟詠提唱普說幾十萬言播在叢林而師未始以為能事幼遭世變㷀然無依道逢老比丘勸以學佛曰能誦法華足矣師曰佛法止是乎比丘異之與偕謁休林古佛於仙巖曰此龍象種也當為大器即為祝髮授與雙谿廣公同執事者七年遊方來燕親炙萬松師又十年道益隆名益著學者日益廣其住少林也萬松老師實為之主屬嵩少煨燼之餘蹔憩緱氏之永慶已而興仆起廢訓徒說法施者如丘山來者如歸市嵩陽諸剎金碧一新洛陽白馬經筵不輟皆師力也師瞑目宴坐彌寂默若無與焉至元八年春詔天下釋子大集於京師師之嗣法者居三之一其盛哉師剛果彊毅公勤廉明平居風神閒敞襟度夷曠復嵩山如祖師再出世倡道垂教於天壤間如鼓雷霆而揭日月所謂大善知識標準斯世沒而不朽者歟師字好問以雪庭自號太原文水張氏子九齡入學日了千言鄉閭曰聖小兒方娠母有異夢及生家有吉徵其說法也涸池出泉古殿有光瑞應非一端云門人慧慶以師平昔著述刻梓既壽其傳仍以道行碑輒請於上追念父師少不失報効之義是可銘銘曰佛以仁傳聖以仁治其仁伊何此心而已混未嘗混照徹大地推未嘗推淵澄止水梁皇有為不諧其旨誰直其宗曹溪東逝逮我裕公道還北矣師少不凡見稱州里休林古佛真源指示至老游參持戒律已萬松休林合辭招致參從渡河幾三百指緇俗趨走營施山委嵩陽諸剎金碧翬跂洛陽大講經歲不弛二百四區群廢盡起僧無役大眾歡喜曰一佛出世遇明天子其人已滅其道不死不空不住天地終始帝命曰咨章服是宜百世其承之四方其則之惟爾法是依惟爾言是師臣拜稽首聖敬不違播為聲詩永之茲碑重建少林寺達磨大師碑歐陽玄翰林學士承旨臣玄敘曰維昔達磨大師掩室龍門藏舟熊耳時君蕭梁武帝追述慧命親製穹碑世代推遷舊刻既泐遺文僅在皇元至元五年倉龍己卯少林長老息菴將鑿石洛汭樹表禪源遣徒了辯走京師命萬壽禪寺住持勑賜領曹洞宗惟賛奉福住持思𤩹暨釋教之都壇主普乘希旨今朝求證當世於是內侍貴臣同知延慶司事烈思八班具事以啟賛天開聖仁壽徽懿宣昭貞文慈祐儲善衍慶福元太皇太后有旨命翰林侍講學士歐陽玄為敘其事奎章閣學士院大學士康里為書其文同知徽政院事趙世安為篆碑首臣玄等奉命共恪載唯東土初祖達磨正宗粵自乾竺遠來震旦時則典午倡清虛之言幽沈至道蘭陵崇營繕之役凋弊𫩧生師發大慈躬拯斯弊露真常之體以偃疑憧破惑業之根以祛見障雄五衍之涂而不詭闡微八正之戶而不空故凡梁武薦況穹祗集勝廟雖或琅函山委緇眾林臻師輙指為人天小果有漏之因茲蓋衛法之金湯捄世之藥石也迨夫自牗之明弗售納履之去斯决古之聖賢以道事君不可則止進退之正復何加焉梁武雖乏鍼芥相投之分曾微枘鑿不侔之跡觀其臨文嗟悼篤意歸崇君臣之道交盡始終之義彌篤至於宋雲邂逅蔥嶺蹁躚悟生滅之本無信去留之莫測猶撢奧旨不替遐思四諦兼融三身同壽蓋有足徵者矣洪唯我元廣大無外恢弘不二用能燭曠刼猶一息囊法界猶一家龕金中土屋宋南社其名山大川前代偉蹟不加隳廢兼示幬持太皇太后克循祖訓密契佛乘推其公天下之心施諸出世表之法譬若雷行無妄萬物一機月照無私千江一影遂使大師之德因昭代以重宣前王之文假徽音而復著何其盛歟玄承乏北門職當論述闇於內典罔讚揚顧蕭氏所製舊文汲簡如新魯貫仍故靡資潤色重勒左方永錫鴻休貽諸來世云爾雜文請寶公長老住持嵩山會善寺疏無名氏竊以飲光得處契拈花微笑之機達磨傳來明立雪安心之印自後花芳五葉焰續千燈不有當人孰為宗匠伏惟寶公長老靈機迅發逸辯高超傳祖佛心驪珠獨耀於滄海開人天眼桂輪孤朗於碧霄法席既虛宗師遴選海濱岸上希𠬧舡子之綸嵩嶽山中願列曹溪之派遡流舉棹順水張帆願馳雲馭而來俯慰眾情之望會善寺茶牓釋溥光禪師官大學士竊以隨緣應物無非囘向菩提指事傳心總是行㴱般若欲破人間之大夢須憑刼外之先春伏惟佛覺普安慧湛弘教大宗師寶集正宗轉輪真子學冠於竺乾華夏顯密圓通神遊於教海義天理事無礙笑辟支獨醒於一己擬菩薩普寤於群生借水澄心即茶演法滌隨眠於九結破昏滯於十纏於是待蟄雷於鹿野中聲消北苑採靈芽於鷲山頂上氣靡蒙山依馬鳴龍樹製造之方得法藏清凉烹煎之旨焙之以三昧火輾之以無礙輪煑之以方便鐺貯之以甘露盌玉屑飛時香遍閻浮國土白雲生處光紫極樓臺非𨵿陸羽之家風壓倒趙州之手叚以致三朝共啜百辟爭嘗使業障惑障煩惱障即日消除資戒心定心智慧心一時灑落今者法筵大啟海眾齊臻法是茶茶是法盡十方世界是箇真心醒即夢夢即醒轉八識眾生即成正覺如斯煎點利樂何窮更欲稱揚聽末後句龍團施滿塵沙刼永祝龍圖億萬春門人高亮郭國器校字少林寺重建初祖殿記羅洪先翰林修撰達磨止少林面壁九年未嘗誦經𨚫時時顯釋迦以來教外別傳口口密義是常誦真經答梁武論功德不數造寺𨚫處處立妙淨莊嚴佛土是常造寶寺縱使具長廣舌盡十二部妙論徧三千大千界中殿臺亭閣旛蓋香花魚磬鼓鍾種種色色微細備足一切俱令滅度了無所在亦無餘剩方名究竟平等又况西來單傳直指有說法否有三十二相否雖然釋氏視少林猶吾黨洙泗洙泗所傳一貫當時實鮮與聞顧又謂能距楊墨即聖人徒灑掃應對精義無二由是而觀有能升孔氏堂群洙泗弟子數千人鳴弦歌習俎豆其間不厭不倦此其人難耶易耶有不與其進耶自達磨入震旦稱初祖五傳黃梅法門益盛雖頓漸分途總歸𫩧育持偈禮像隨資應機至於手挈衣鉢乃在初來嶺南獦獠必俟雪中斷臂始堪顧盻則堂前茂草誰誘眾生是知有言無言有為無為迷悟差殊不可執著蓋其設教彌近故易熾而不墜若此然超此二見亦必待人以是少林住持咸相讓避餘三十年而今有宗書宗書名大章本順德南和李氏子自幼受度歷叩名僧參詰省解京師貴人延供騰譽嘉靖三十六年丁巳河南府廉其名招致授牒曾未四載起廢約渙朝梵夕定玄風流遠時舉單傳直指衍奧撥疑千人心降并食聚仰間出餘力大葺故剎己未臘月八日重建初祖殿舊面壁處高三十二尺廣增二十有二而㴱視高強其三位爽勢尊楹棟壯堅瓴甋澤好儀序丹藻靡有損缺凡八月告成累千百金不動聲色左右兩翼各聯七室區息禪誦身依𦭞舍被露席蓐律戒謹嚴少林大眾歎未曾有故友天真往遇衡山假此因緣遣徒光護千里重趼乞言表信予笑謂曰吾當距楊墨寧爾貸辭光護哀請浹旬弗怠憐其專誠足以激發吾黨且資廣譬為記建殿歲月書貽以歸遊嵩記喬宇吏部尚書辛卯秋八月予歸自京口取道為嵩嶽之遊道出亳州州人薛君采來迓予往官吏部時君采嘗為郎屬因拉之同行九月七日丁巳抵登封縣八日戊午謁中嶽廟廟在黃蓋峰下去縣東八里許退觀歷代碑刻中一斷碑八分書也字畫勁美類唐徐浩疑為唐碑餘碑約五六十皆宋元金并我朝所樹立者閱之不能徧也出廟東北行四里為盧巖又三里為盧巖寺俗呼為上盧巖蓋唐盧鴻居地自下寺至此崖谷幽邃竹樹隂翳嵩少之佳處也寺後有瀑布泉尤為殊勝泉出巖頂下瀉石壁長踰數百尺闊止尺餘寺僧云泉舊闊二三尺今歲旱泉勢頓減然即如茲所見者亦甚奇麗正德庚午予奉命祭山東沂山其山亦有瀑布二泉形致相類並北方之名泉也九日已未出邑北門行五里遊崇福觀又二里次山下自此登山而行山路詰曲循峰而西路皆斗絕行十五六里經西流泉山氣凄烈冰已厚寸許又四五里至白鶴觀觀去絕頂尚二三里時日已將晏廼坐觀前飲酒數行飲畢予上造北極廟蓋嶽之絕頂廟側有玉井冬夏不竭始予入登封境遠望嵩嶽未知嶽之高也至於山麓所見猶然比登絕頂四顧群山拱列於下北眺大河迤邐而東然後知嶽之崇高也君采素我一籌矣其亦用老子之道辟盈而後人邪歸抵縣已二鼓十日庚申復出城西北行五里至嵩陽宮觀三將軍栢其最大者圍用六人相傳漢武帝所封在漢時已為鉅木則斯木之壽遠矣歷年既久狀特奇怪予往歲代祀平陽媧皇廟廟有古木與此木可伯仲意天下之木殆未有甲於二木者午後至少林寺是夜㝛寺中翌日辛酉遊初祖菴菴在寺後林壑之美倍於盧巖自𤲅後陟五乳峰即少室之別峰行十清臞至觀前已疲甚不能絕頂予歸顧而笑曰若輸餘里始至峰頂有達磨面壁洞下望諸山宏闊不逮嵩嶽而峰巒四合攢叢映𭘧亦少室諸峰之冠云十二日壬戌出少林過㟧嶺口渡伊洛水抵偃師世嘗謂遊五嶽為物外之福予素愛山水不減昔人而遊山之福似為過之恒泰華三嶽往歲皆嘗寓目自餘名山如句曲清凉之屬非五嶽列者尚不與焉今老矣復得歷覽嵩嶽之勝五嶽之中所未遊者獨衡嶽耳昔賢有缺陷世界之語謂人間之福不宜備享况物外之福可盡取乎由是言之予阿堵中雖欠祝融諸峰未為不可也山遊凡五日共得詩若干首具遊嵩集中嘉靖辛卯九月遊嵩陽記周敘翰林編修宣德丙午三月十五日予在鞏祀宋陵畢瞻望嵩少諸山慨然想其勝與廣文宜春吳公遜志約遊焉行李僕御已戒至期聞有達官至吳君不果行越二日予遂携邑庠生王庸劉清李暄同往行二十五里至黑石渡沿洛南上河水清駛水濱山石犖确下步行二里餘午食將軍趙仁家又行半舍許地曰漫流岡上有郭汾陽廟環廟古栢數百株蒼翠蔚然可愛有碑二通一金元光二年天黨越琢譔云汾陽嘗領兵清河上至是索芻粟不獲里人告以是邦西南崗嘗出毒霧為災故田穀不秋無以供餉汾陽乃旋軍登其上以壓之毒因以息里人遂立廟祀之相傳祠下有洞時有聲隆隆然蓋毒霧所出處予惟古人稱掃清氛祲汾陽之謂矣一則緱山東老人所題老人逸其名必宋元顯者夜㝛原良村王庸家自鞏至是七十餘里翌旦遵趙城陟轘轅道石徑崎嶇盤𢌞以上中有𨵿名㟧嶺老卒數人守之時天旱邑人祈禱甚久忽微雨從西北來予顧謂二生曰今日之遊固樂天復雨又樂之尤也轉南僅五里入少林寺竹木蔽翳仰不見日花草餘香郁郁襲人寺在五乳峰麓少室山當其南隱若屏列寺僧聞客至迎迓甚恭佛殿後為講堂堂後有立雪亭則佛徒惠可受法於達磨處惠可嘗侍達磨雪㴱至腰不去竟得其法予因歎曰昔游定夫楊中立立雪於程門卒傳其道惠可學佛法亦然使世之為弟子者皆若此其學詎有不成者邪因觀歷代所建碑刻其文最舊則有梁武帝御製達磨大師賛前刻歐陽圭齋序餘皆唐宋以下文字又向西北循山厓㴱入三里許攀援而上山勢岈然環抱視寺之臺殿山之林壑若在席下是為達磨面壁菴菴有石影云達磨面壁九年之遺跡也時雨止雲𠬧煙霧澄霽幽鳥玄蟬鳴聲上下倐然有塵外之想僧云西南八里巔有惠可菴有卓錫泉以榛莽蒙翳不果上寺主僧曰圓宗者甚能言相與論辯亹亹亦自可敬飯畢啟行逾十里則嵩山少室東西對屹山色掩暎蒼翠如滴路循㴱洞灘石礧磈按轡徐行髮毛森竪俄經一小土神祠南忽有赤衣童子疾趨道左令導途者索之稱久不見竊自念曰連月旱暵而赤色者南方朱火之象也是豈旱魃之流歟因相與名其地曰赤童子山又行十里憩郵亭中亭後一里有寺名會善刻元雪𤲅所書茶榜字徑三寸許遒偉可觀觀畢既出晚至登封假館學宮自原良至是又六十里明日同廣文劉仲武司訓吳永康謁中嶽神祠且默禱久旱祈賜雨澤禮畢而縣丞李政繼至祠在縣東八里嵩山之陽中原壤地平曠有山亦培嶁不崎嶇唯嵩山綿延磅礡騎奔雲矗長數十里屹然在天地之中諸山環列勢若星拱蓋乾坤秀粹所鍾宜神靈之宅也祠䂓制極宏壯峻極殿南為降神殿三面皆圖申甫像丹青頗剝落而筆意蒼古督李丞命畫工模之宋金以來石刻以百數惟王曾奉勑撰者碑最穹壯字體雖甚勁麗文漫滅不可讀并命諸生用紙墨摹搨以考其舊既出李具酒殽於道室相與宴飲甚歡室後有竹數百竿微風度之鏗然有聲如擊金石此又洛中之僅見也又明日與仲武永康循北門遊嵩陽觀觀久廢惟古栢三株存大者圍幾三丈高兩倍之相傳漢武帝封為大將軍有石刻識其下次者亦幾二丈圍云望之如張幃幄如擁車蓋風動如聞絲竹之音相對久之不能去前有天寶三載紀聖德感應碑高大異常制書法極妙又從東度涸澗尋崇福宮即太乙觀林㴱從者迷失道往返數四始達宮亦屢廢惟三清殿存亦至元間重修者旁屋近燬於野火道官依殿以居舊有奕棋樗蒲泛觴三亭今俱圮有泉名太乙歲久亦湮則泛觴亭之故址也二宮觀俱漢唐宋以來天子巡幸暨王公卿士宴遊之所方其盛時珠宮琳館金碧交暎鑾輿所至草木生輝及其廢也荒煙斷礎鞠為丘墟樵人牧竪得而辱焉噫方外之流恒自視其道與天地長久永存今既若此豈非物之興廢固自有時哉升高以望遠則箕潁諸山川隱然如畫追想巢由之高風西則少室三十六峰綺綰繡錯高插霄漢㴱悲李山人之陳迹目與景接心契神會超然若御灝氣游鴻濛而不知其所止也稍東有啟母石云塗山氏所化其說怪誕不經極西有法王寺亦名剎殿宇頹圮惟浮屠儼然南下則有周公測景觀星二臺廢址北顧嵩高二十四峰舒奇獻秀歷歷可指並山頂而東則又有所謂盧鴻巖投龍洞皆嵩陽勝處擬次日再約往遊是夕予冒風寒頗不懌且疲於登陟遂不果而顧予先後之所已賞者其所得亦可謂富矣因累書其事於簡以識予是遊之勤并各書一通一以遺鞏邑廣文吳公俾想見茲遊之勝一以留登封學宮以備他日好遊者之故實云遊嵩山記都穆工部主事癸酉十一月朔予至洛陽欲圖嵩山之遊二日丙寅至偃師縣三日丁卯離偃師沿洛河南行五里渡河十里登唐廬陵王墓上石人馬暨石表猶存中一碑高大字漫滅不可讀三十里至㟧嶺口兩山對峙石道崎嶇乃唐高宗幸少林寺時所鑿山行八里至少林寺在少室山北麓後魏主孝文為胡僧跋陀建一碑刻唐太宗為秦王時賜寺僧御劄有云王世充叨竊非據敢違天常法師等並能㴱悟機變早識妙因擒彼兇孽廓茲淨土聞以欣尚不可思議今東都危急旦夕殄除並宜勉終茂功以垂令範蓋當時寺僧之立功者十有三人惟曇宗授大將軍其餘不欲授官賜地四十頃此可補唐書之缺惜無有知之者少林僧至今以武勇聞則其所從來遠矣寺佛殿後為講堂後左右有立雪亭昔僧惠可嘗侍達磨雪㴱至腰不去卒嗣其法今僧中稱為二祖出西廊百步有甘露臺胡僧跋陀於此翻經天降甘露故名西北上山二里至達磨𤲅殿前有六祖手植栢又上一室門外石刻達磨面壁之菴六大字宋蔡卞書室中塑達磨像案置一石高僅二尺廣尺餘其上達磨之形宛然拭之益顯蓋菴之上四里有達磨洞茲石廼其九年所面古謂精誠可通金石諒哉回至方丈適登封令李性甫遠來相迓夜酌同㝛寺中四日戊辰性甫以事先去寺主僧文載言經閣後有古槐一株視之其高十丈圍三十尺文載誦文潞公遊寺詩有五品封槐今尚在之句則其壽可知第未知封自何時莫能考也出寺東行十五里折而東北三里至戒壇寺入門破屋三楹其中碑四刻元學士李溥光所書茶榜字徑三寸遒偉可愛後即戒壇傾圮已久旁有唐大曆二年勑戒壇寺碑寺左百步為會善寺法堂中有後魏嵩陽寺碑後刻云大唐麟德元年移植於此可謂古矣佛殿右偏有泉出自山中惟供寺中之汲通之俾資灌溉則伏而不流僧云唐有高僧晏公於此講法華經龍作人來聽晏知其龍也告以寺乏水遂送此泉蓋其相傳如此東南行時有飛雪十里至登封察院雪乃大作性甫張燕陪飲者學諭尹亨伯司訓梁文升皆予同郡人也五日己巳雪猶未止亨伯招飲學宮六日庚午雪霽登封東行嵩山近目雪蒙其顛而玉田璚樹復相𭘧暎其清逼人恨無驚人之筆如范寬輩者以圖之耳八里至嵩山神祠祠在黃蓋峰下蓋嵩山巍然中國之中其週圍二百里群山拱列有類兒曹宜其秀鍾靈聚為五嶽之尊而黃蓋一峰在山東南盡處其宅神靈尤宜祠之外有亭翼然過客憚於入謁多展拜於此入門三重咸有古栢或喬或偃或俯或伏或屈而蟠或怒而攫或奮而欲騰又或如帷幄之張車蓋之擁幾二百株三門之內四嶽神祠分列左右又入門有降神殿壁繪生甫及申像歲久惜多剝落謁嶽神殿其西為御香亭每朝廷降香悉貯於是祠多歷代碑刻不能盡讀午飲祠之公宇飲畢東行二里折而北二里山之北麓入盧巖寺蓋唐盧鴻隱處後遂為僧廬其上四里復有盧巖上寺聞石壁飛𤄗數丈視此殊勝路陡雪㴱竟莫能至七日辛未登封北三里至嵩陽廢觀其中所存惟唐李林甫聖德感應頌元五祖七真堂記二碑及三古栢栢之高皆不逾三丈大者六人圍之下舊有石刻云漢武帝封大將軍其次四人圍之不盡道士云此次將軍也皆形狀怪甚不可圖繪夫漢武迄今千五百年栢在當時則已受封其壽固不測以今視之殆殷周時物耶其又次亦三人圍之予平生見栢之古者多矣若二封栢豈惟予所未見盡天下之壽木或未有能過之者奇哉奇哉又東三里據山之陽者為崇福宮其後名為萬歲山昔漢武帝臨幸聞空中呼萬歲者三因即其地建萬歲觀唐更名太乙宋於此奉安真宗御容設提舉管勾以祝釐中故有奕棋樗蒲泛觴三亭今唯存泛觴之石予命道士引泉委曲流之立飲其上而寒風砭人數盃即罷下山東行一里觀啟母石石旁之祠及唐崔融碑今皆不存按啟母石事見淮南子其說不經後之人蓋嘗辨之四里還察院㝛㝛煖泉寺遊嵩山少林寺記王世懋太常少卿余以東還困於顧募之費乃謀買小舟自洛入長河既抵洛陽即以一僮先令至孫家灣覓舟孫家灣者負山面洛去偃師縣東二十里而近余未至偃師僮來言已得下賈舴艋日下舂抵灣欲入舟舟人告未備乃之煖泉寺㝛焉寺在洛北兩山夾泉下注於洛循澗入可一里許見石上流泉瀰漫居民就泉種稻稻香四發心殊樂之已入寺寺頗窄僧貧甚就中庭施坐憩焉已乃携姚生出寺觀所謂煖泉者僧指示泉出處縷縷潛布而已入溝始涓涓有聲已匯為一大池池底如碎珠上溢不可勝數其泉至冬時煖甚夏秋間溫於他水而已余步臨池岸目翫荑柳手弄珠泉忽舉頭見南山一𭘧蒼翠異常問之即嵩山二室也為程幾何曰七十里而近余東躋泰岱西登華山南上匡廬太和獨以中嶽未游為平生歉見此不覺神飛即謀以二日往返不至滯長年而姚生亦相從臾遂命僮募土人舁輿决策𮖐糧乃返方丈飯畢遲月且上顧謂姚生曰若知吾待月意乎出此百武水泉流大石上真佳境也不可當吾暇失之生曰吾固念此乃挾乙瓢酒削囊中脯出寺行久之至石間蓋其地三泉所會也煖泉之東泉自山北出者為大澗煖泉據高西南行至石間始欲下墜入澗而山之西忽一澗旁出水淙淙東注與煖泉爭流石𦉑間已乃併入窠臼下墜澗底其石坡陀可容數十人余乃選勝趺坐悠然命酒時月甫上復為隂雲所翳余謂毋遽坐可銷浮雲也久之果無纖雲朗耀如晝童子赤脚水中壅石激水而决其上流二渠轟然四注飛濤雨噴臥石盡如沐浴獨余所坐最高不能濡也月光皛皛射之珠迸玉碎其聲則砰訇錝錚大者如鳴百鼓細者如奏笙竽平生快意不數有也坐將夜分恐宓妃竊聽翠羽淩波姍若有人乃振策而返四顧閴然惟聞隔山犬吠而已賦得二詩質明而起就輿渡洛南望少室如屏若在衡前東瞰原隰土阜廩起前後相望舁夫云此趙宋太祖太宗陵也皆在鞏縣界偃師得分祭云上下山坂四十里而遙始抵招提寺一飯而行寺老僧出迓甚恭云去此二十里入山以十里上山入少林僧請為導而行出寺渡澗而南則登封官道也近山一大村市荷擔者絡繹於道始知登封縣在山南鑿山為道而過輿至山上二里許見一石門天險兩崖皆奇石陡立輿夫云舊有巡檢司今革去而峽以北為偃師界峽以南為登封界云下輿縱步回視洛南北百里如掌望少室峰皆重巒削成瓌偉特出意其下必有奧壤豈其為少林所卓錫耶行久之見路有二岐南上者登封大道也稍折而西果繇少室下趨少林蛇行三四里許漸入西徑山圍欲盡而少林殿角已掛林端矣山門前跨大澗泉淙淙自西而東不知所從始亦不知何所出山林木蔽虧藤垣蘿壁迤邐下上及門二綽楔徑窅如也殿庭老栢森列碑碣羅立大雄殿不甚宏而制度堅雅猶是宋時重建者入殿禮佛畢西參六祖殿東謁錦那羅錦那羅者元末神僧怖紅巾不入寺者也故即為寺伽藍云拜畢住持法師常潤號幻休者始出迎初猶以世禮見而微有傲色余與俱入方丈指所著衣謂曰昔現宰官身今成居士服願與法門遊毋為世禮局余拜師亦拜便欣然對坐而談訝其聲不似北僧叩之則江西進賢人也初余寓京師廣慧寺談少林廣慧僧云此非有德望者不能居昨以禮幣來聘得一名僧主之矣及是行也雅欲遇高僧與談問之輿夫云此山有一僧能不食數日不畏虎狼已成道矣欣然問招提僧冀一遇之僧云此僧已久去今住持亦高僧可談者也語次因問此僧師云誠有之此僧無名不知何處人亦不知夏臘幾何人以僧著大鞋呼之即應因即名大鞋生不識一字遇寺開講亦輒來聽居五乳峰上達磨洞中冬夏一衲每日下山三四里許乞食常以二更時獨行歸洞如遇大雨雪即四五日不出好事者訝而尋之見儼坐如常間有携之飯者固𨚫即留亦不食云本欲省事恐緣此遂煩人也心如墻壁真能離恐怖者諸人問道隨意答之語必簡而玄一縉紳固叩真詮答云君輩每患口有是言心不能然但能認真幹去便是何必它問此語尤切中今時士大夫病問其所以去曰為人尋覓漸多恐尚有損漏已入終南山矣因歎渠功行至此猶恐為世緣累吾輩火宅蓮花豈易生長師語次知余為太倉人因問與王荊石侍郎同宗否余答以至親相厚師已知曇陽大師事矣且問朝事作何處分余曰已寢因出大師傳贈之師且具齋為欵相與登方丈後高臺上瞻眺因謀與游曰近此惟初祖菴最勝可即日游餘勝處非竟二三日不可余謝舟人不待乃亟就方丈齋畢與師偕出寺西行時日已崦嵫矣上下山麓間望少室蒼翠轉來相逼使人應接不暇其東高山雲氣晻靄於上曰太室太室最東曰黃蓋峰峰下有中嶽神廟焉就山中視之太室為高師云出山則少室巋然矣且語且行先至一所曰講經臺乃高僧菩提流支講經處也有小菴僧居之臺亦具延覽之勝覽畢下臺因問流支何以毒初祖曰此亦示魔耳余因語調達事師亹亹能講更西則五乳峰盡出祖菴老僧出迎胡跪道左師笑曰此好道王先生毋用此法待之因與共登菴上謁祖師像畢出視庭前四栢樹皆合抱參天而三株為老藤所纏生理稍困圍殺無藤者十之三師曰此即所謂少室三花也殿後更一室前種二松偃蓋古色其藤亦三百年外物也即松栢可知矣殿西一室祖師面壁像塑焉傍立二祖雪中而前置一石即祖師面壁影也石不盈二尺師像眉目胡髯皆具袈裟紋如西域衣石理亦光潤可愛先是招提寺中亦有一石作祖師披巾像不能甚分明云亦自嵩山得之竟不知其所以師云五乳峰形如鳳張兩翅而祖菴正當鳳頭即少林寺形勝不能逮也須𤲅後視之乃盡勝槩因與步菴後平地將十餘畝松栢森列五峰了了可觀真如鳳舞師云祖取五乳後派果有五支達磨洞在峰半隱隱可望云亡它奇可毋登也余謂此山形勝如此世主得無有垂涎者乎師曰昔跋陀三藏開創時有讖云後五百年當有女主來欲葬此因叱水不令東流唐則天后果至此欲奪其地竟以無水而止云出𤲅再望少室西角峰巒尤異劃如有缺菴僧云此少室西天門也蓋其上有四天門中有三十六峰泉石天池之勝不可殫記特未易登耳然三門猶可攀掖至獨西天門缺處望之一鐵楞儼然𤫩瓏竟不可踐其處師云似群仙所往還也余素聞長老言少室勝於太室今見果爾恨不能一躡其巔又少室下一臺高百餘丈當菴之西南面其地似勝詢之為二祖菴其上乃有泉可汲一僧居之問可登否曰步而上上下可六七里顧日力足力俱不能佇視悢悢而別返入方丈已昏黃矣與師各歸房小憩余飯畢草四絕句贈師師亦篝燈覽曇陽大師傳略畢頃之月上命童子視師則已就寢呼之起三人坐庭中山月皎甚少室當前房櫳閴靜松蘿隱約命童出囊中天池茶供師師首問傳中僧乃隆魁耶渠昔從二三僧來受法老僧為人最誠實有學業是宜其獲遇因與縱談禪旨師言無生理山河大地俱為妄念所結余因發一難使當刼初不起一幻念即佛亦無如此則理何所寄今𨚫緣有此身然後得成是佛然則無生乃從生得乎師笑曰此論誠有之其解難亦不甚透余謂圓覺經中以幻修幻四字便了師偶未之及也坐將夜分別去次晨起師復設飯飯畢贈以詩慇懃不能別謂余路頭既正便須精進做上勿墮小果且託寄聲道印道印者即隆魁也步出庭中請余觀宗伯陸公穹碑文甚瓌偉而盛稱師解悟功行當主是山之義蓋其徒走華亭求得之者怪師拳拳道陸公不已蓋有以也人正是去此名根難耳下山復飯招提入舟促長年鼓舵行十餘里而少室猶在空際依依若相送者潤師言不誣矣初余意雅慕少林願與高僧談而嵩山之勝止一寓目不求甚竟且以不誤行色為快故紀游特稱少林寺云嵩游記王士性南京鴻臚卿蓋予少懷向子平之志足跡欲遍五嶽乃今始得自嵩始云時歲在辛巳六月余以朗陵令滿秩繇宛赴汴跂足可得望二室乃以日壬戌入登封界步騎上下山坂繇鳥道中出江北多土山童峙有河瀆而無澗溪獨此石棧宛轉草木離披縈溪水其下恍惚如行天姥嶺亦嵩山首途一勝也未至登封二十里遙望疊巘如蹲虎豹意奇之問牧者云此名御砦即少室是夜入縣㝛風雨驟翻盆下暝不見山質明稍霽起出戶視之則嵩山兀立縣城之北而少室從西峙二室皆白雲衣其半余乃策騎北門時細雨猶拂人面先繇崇福宮稍東為啟母石石正方三十尺而厚稱之余笑為塗山氏即示化當不至膨脝如是宮後奕棋樗蒲二亭俱廢止存泛觴遺石轉而西二里入嵩陽宮外立唐鉅碑碑後植漢封三栢其最大者南枝一節瘇甚從者指此木癭也空其中余遂割癭注酒滿引之畢入拜二程夫子像復西五里法王寺寺前石池丈許紫金蓮開中秋一月云神光說法時從地涌也土人往往移去即斃惜不及其開時見之日午寺僧以笙簫度法曲飯畢出山門復西二里會善寺乃嶽神受戒於珪禪師處右為戒壇今亦廢惟餘四天王石柱門外樹李學士溥光茶榜筆陳如列㦸復西二十里少林寺寺桓楹礙日龍象如山長夏無暑碑刻種種蘇子瞻趙孟頫輩其尤者殿前檜栢入霄漢問秦封槐則風摧二十年矣今寺東一槐亦可數百年黠僧往往謬指以誇遊人無辨者寺八百餘僧自唐太宗退王世充賜曇宗官僧各習武藝俱絕寺為跋陀所創後四十年而達磨來自西竺跋陀翻經處天降甘露西有甘露臺是夜㝛方丈聽律師大千為眾僧說法推極禪宗亹亹至愉快也明日詣初祖菴行里許入謁祖白晳脩眉鳳目僧言此太子東渡像也後居東土嘗六毒面雖稍赤然非今所傳巨眼胡僧云菴前三花樹蓋淩霄藤附檜而生者花正開㴱紅可愛自達磨未至時有之左一栢高與花樹並云盧能鉢盂中𭘧至也余為書六祖手植栢字菴後一小亭為達磨面壁影石頑高可三尺隱隱一僧坐石中比丘無言指石曰公知祖之苦心乎晉魏末世人脩齋誦經佛正法眼藏失故祖不立文字以九年寂坐見性遺影而示之教所謂金石可貫也余曰唯唯第此跡還當掃𨚫楞伽四卷何必非文彼其三周渡海暫以指迷不則頑寂枯僧墮落外道又此胡引之也為書偈曰活人做死事難向一切說打破這片石方許見如來無言首肯久之相携登五乳峰蓋山形為飛鳳又若五乳然者時白雲復靉靉起山腰咫尺不見人纍隨六里許雲過處則以袖藏之至洞揮袖片雲從掌畔飛出也洞在右乳入洞則寒冽粟起不可禁傍陷一隙無底僧云洞初為火龍居祖至從此中去也下山轉而南十里上二祖菴菴前巖壁繡綴井四為二祖卓錫而成者泉相去丈許味各異南上一里為祖煉魔臺登臺則見伊洛二河環遶其下河外邙山橫亘山外復為黃河一線西來河北又見中條諸山逶迤不絕二百里內皆一目盡之卓哉觀也此去少室絕頂不遠欲遂登之以時大雨後山澗流水急沒人脛且山陡無別道故不果也下山再㝛次日轉而東數十里至嶽廟廟亞少林壁畫申甫二像大樹林立從黃蓋峰下仰視東峰凹處是稱嵩門乃由黃蓋峰上挹盧巖瀑布不啻龍湫此去嶽頂不數里亦以雨不果行而嵩嶽之遊止是矣山亘數百里大都皆巖石蒼翠相間峭壁環崖而立如芙蓉城列抱於上太室其大者少室鉢盂子晉諸峰皆然而三十六峰則如吐蕊遠望之共成一山也其寺皆隋唐以前建而法王一剎則漢永平佛法初入時在逹磨四百年之先其碑刻穹窿數十百道多古今名賢手筆而唐碑皆刻佛像無數於上亦與今製異其樹多檜栢即秦五品漢三將軍外古木蘸天亦多與寺俱起經千百年此宜他寺所不得伯仲也然余獨怪宇內名山亡論岷峨王屋即余家八千丈下猶窮日乃陟其巔二室頂不三十里而遙而以為神州首嶽至詩稱峻極于天豈此山嶾嶙岝㟧突出於平原大陸內以自軒翥特標所勝為奇耶抑戴日至下為天中鍾顥蒼最清淑之氣以總領諸嶽而然乎或謂山高為崧詩稱嶽之崧高非崧嶽之高也蓋堯時止有四嶽余聞於楊用修之言云嵩少遊記周夢暘河南提學副使余生平有山水癖一移中州經年走平陸往聞天中山在汝陽索視無有祇虛得名耳南陽亦稱隆中山然菫菫據高地竊吾郡之似而實則非也庚寅冬十月始有汝洛之往於是西取中牟鄭州道不至鄭三十里榜列子故居於道傍亟喜立視無所見是周雅所稱圃草圃田處也以鄭圃當之誤矣由鄭州入密多行夾道中若澗底忽出平壤則西山一抹隱隱眉睫間將至密三四里有松數十仞一株出地而三岐自七尺許品分之膚白如雪柔澤如凝脂指掐之液輒津津出香氣可挹相傳黃帝時有三女俱得道一夕逝合葬其下明年松生焉即未必實然然亦奇矣出密縣而西上下岡阜嵩山青翠英英來逼人而迤南一孤峰巋然獨秀問其名曰御寨也余視御寨若嵩山首耳既至嵩乃知遠數十里為少室派不相蒙矣羽士以樂來迎至別室改服謁中嶽廟祀之廟當黃蓋峰東麓即漢武登禮時見有黃雲起如蓋故以名登封弟子員肅然在列余訝其遠來觸吾禁而有司者以觀禮告遂不復問禮成謝去諸生徒徧視碑碣唐僅二宋金元獨多東下稍偏為神庫守以四鐵人像亦奇醜然不免雜夷意蓋金元人所鑄也神安得有私藏即有之亦何煩此四介士為之一笑又出二㦸門為天中閣其制閎敞鉅麗眺覽無際閣下一偃松根迸起出地外榦去地不盈尺藉別木支撑之而枝葉蒼茂與植者無以異其為漢唐間物不問可知矣東南望有周公觀星測景臺許由棄瓢巖以多澗谷不欲往會日莫止登封㝛平旦北出城詣嵩陽宮宮當嵩山之陽翠屏如𭘧唐玄宗煉藥於此有李林甫穹碑頌之字為八分書頗足觀而世以其人故不甚傳碑之傍三鉅栢漢武帝所封三將軍也大者在中央七人圍次居南圍六人又次居北圍亦可四人紋理紐拗絕不類近代樹因念帝以求葡萄善馬不難貳師將軍封廣利何如此栢為不朽哉宮名數更易旋亦廢嘉靖初有知縣侯泰者𩛙為嵩陽書院肖二程像於其中不識何以竟澌滅今祇頹垣耳其東有啟母石方廣數丈謂為啟母所化啟從此中出也殊怪誕不足信事在淮南子孫尚書原貞著為文辨之循嵩陽西走少林道道傍浮屠以十數制特偉迫而視之有稱特進光祿大夫大司徒者歎元人重僧至若此乃知山之岰會善寺在焉披萊折而入其中唐碑一宋元遺跡獨多泉自山巔來灌寺中至山門匯為池絕不欲出門外即雨甚亦不溢也是殆不可解寺刻元人布袋和尚像並有賛俱雅馴惜其石斷而為三余命山僧砌合之又西為戒壇寺寺已廢其基址不甚闊而石人石礎石梁石級皆曲盡工巧與余所見大內中遼后梳粧臺基無以異門房不能蔽風雨下貯充學士李溥光茶榜文甚麗字畫亦古徤有晉人風讀罷而去下峻坂走夾澗十餘里蒼翠巃嵸應接不得暇顧見碧琉璃色象殊異高與山齊從者曰此毘盧閣也少林近矣縱轡而前林益密林之中忽出簫鼓則寺僧業已導余行入禪林列栢如㦸東偏僧舍間蔽隂數無異盛夏者秦時槐也葉不能不凋然獨後於諸樹氣王故耳登大雄殿禮佛佛像莊嚴其殿亦壯固堅質佛前供罏文古而細必宋以前器本朝無此殿後為堂殿方丈者四每登輒高數十尺最後為道間所見毘盧閣慈聖宣文皇太后建以貯藏經鑿山為基其制閎曠無與比董其事者一中貴人出而肅余禮甚備欲請從余遊許之於是周覽碑刻林林四出目不及瞬余命主僧指唐宋碑示我其所知僅則天詩與唐宋二三文賦耳余自偶辨五七通為唐刻主僧不能知也西出走五乳峰下求初祖菴曲澗盤旋步武多石磴而樹根參差出若虬龍然蓋三里許始至菴菴凡三重最後塑逹磨像其前一立石可二尺則面壁時所映影也菴前五栢樹其一六祖所手植端偉暢茂截然參天其三蒼藤緣之度春夏間盛長必有異山中人謂為少室三花者非是蓋不得其說而為之辭耳下菴至甘露臺樹亦異遙望鉢盂峰頭二祖菴如在天際矣余問道所從上中貴人色怖不能徃謝別去余獨欣然往登之崖磴絕險過一峭壁下勢如削成僧謂此子晉峰也而前僧樂忽作若子晉吹笙迓我者為之解頤是時峰頭多墜葉高下不可辨捫蘿拾級而上久之始至菴負陽抱隂臺上下有井四比比相向汲之為啜數口蓋少室苦無水盡為跋陀叱而西而是峰有之良足異已上菴門樓望煉魔臺道不甚隔遠然峭峻不可近僧謂遊人鮮至二祖菴及至煉魔臺者益少余笑而去須臾陟其上諸峰盡低太室當前亦似不敵也振衣四顧見西北平衍雲樹蓊翳有白如練者若滅若沒僧謂此黃河之流其西兩細線伊與洛耳往午霽時見之甚分明不似此余甚歎不得際此霽而又幸不為僧所愚觀亦奇矣既下菴曰已薄崦嵫𨚫望茲峰上廣下銳乃其中又特汙世以鉢盂名之者近似還少林返照在壁楓樹遠近相暎𭘧目光欲眩因憶沈佺期紺園澄夕霽之句有味也中貴人邀余余不能拒與談禪頗亦能解膚間語漏下而別不欲遂就寢坐待月挂殿角間乃入寐遲明啟行僧以余獨未觀轉輪藏也復止往觀之伏數人於下藏為一𢌞余指問僧此將法華轉抑將轉法華僧不能答是法華轉耳不告而去就肩輿復過御寨望所謂天門則一壁如削飛鳥不度是宜古今人不能至矣然時時回首顧不能釋也周子曰余既遊嵩山少林寺已愜夙願而尤以盧巖未至為憾盧巖者唐隱士盧鴻潛修處也景絕勝在登封東自密來道甚近至少林始訪求遠矣豈天不欲窮吾觀留待異日耶嵩遊第一袁宏道吏部郎中度緱嶺轘轅𨵿西南折入山則少林寺也少室截然橫其前諸山懷之天然回合如有尺度京洛之間古蹟廢盡獨此寺猶存典型日者過東都覔故宮遺址了不可識詢李文叔所記名園亦無有而伊闕兩崖廢像殘碣崩剝苔蕪間令人墮淚此中差強人意不復為此寂寂歎矣樗道人曰今好事家所貴者曰古曰完曰欵識山狩于虞古也霧窻雲寮飛布崖壑完也隋唐以來碑碣森列庭中欵識也堂頭僧曰道人欲置茲山于貫城市耶請以一轉語酬價矣道人曰有大力者負之而趨余大笑堂頭僧者曹洞下兒孫主斯院者也從院東西穿詰曲磴道中過甘露臺有古樹根如𢽽石虛處如梁已出寺西折行觀初祖影石石白地墨繪酷似應真像老僧曰澗中自有此石能為水樹雲影余曰然石以影重逹摩之重不以影不以石不以面壁此中不須蛇足也已從𤲅後出行三十餘盤得初祖洞洞中石如波卷不盡五乳峰者數丈已下山度南嶺十餘里得慧可覓心臺臺形如盂倚翠壁下臨伊洛黃河蒼莽行綠煙中已歸院遍歷軒除庖湢休于丈室顧樗道人語曰是中有余衣屨跡焉雲樹煙巒若舊識者余夢遊茲山久矣曉起出門童白分棚立乞觀手博主者曰山中故事也試之多絕技欲登少室無所得路乃止少室奇秀迫眎不可見遠乃得之行修武道者望若古鐘仰出諸山上從汝來者唯見千葉芙蓉與天俱翠搖曳雲表而已山四帀皆壁群山翳其外迫之乃不見巔而見翳遊人多不愜夫豪傑之偶于眾也凡才得肩而蔽之及時地既遠肩蔽者與腐草俱盡而天下始望之若飛仙獲其隻字以為至寶士患不特逹耳余數年前走南陽道見遠翠干霄土人曰九頂蓮花寨也了不知所謂及過㟧嶺忽有舉此名者始知所見在五百里外也少室之秀特可知矣嵩遊第二出東𨵿里許有皂巾而敝藍者請曰由西華道耶余不解及至嶽祠從垣之西竇入不覺一笑祠在黃蓋峰下偏峰之左東行數里得澗寂無人聲蘆風水響環繞山砦沿澗而北得山足澗與山曲折如月半弓漸高得寺寺盡而巖盧浩然舊居也至今猶襲其姓山至此忽兩分如人張左右臂當胸腹處削壁千仞根虛而𨚫如割大甕之半水從丫處出初猶粘壁霧雪紛飛忽然墜空千絲直下激石為屑散布一澗時方下舂日與煙相薄而瀑濺之風復生態其間正視不一色去瀑十許步巨石岌嶪遊人各踞一石望瀑而飲回風忽射稀點灑面起立欲避而雨已斜卷去朱非二曰少時讀天台賦知有瀑布不知其奇麗如此問余余曰三見之矣見于五泄者如奔雷其觀偉見于黃巖者如立玉其觀逸若夫蒼寒霏微簾披綃曳此為最幽矣登封令傅元鼎曰嘗夏月雨後經此飛濤挂壁激石倒立如柱響震一山余曰然古人謂夏山如滴冬山如睡瀑亦有之夏瀑如怒冬瀑如喜此正盧君喜時也壁石多奇或為霞或為紺或為嵐而根下有石數丈雲巒洗出其紋如刻畫澗中多白石墨浪界之與影石相似獨不能為人物耳澗西有小洞容數人其下流峽中石几石龕石版遒妍不一與碧潭相映為山中絕景嵩遊第三道陽城廢址入會善寺寺半圮有泉泠然及門而沒西去數十武為戒壇頹欄敗砌皆鏤隋唐佳句人物山水細入毫髮石柱上有唐宋題名字極精寺故魏孝文避暑宮也唐以來習毘尼者居之遂有壇古碑刻完好者菩薩戒經大曆十三年協律郎高堅書魏天平二年嵩陽寺碑不著撰書姓氏末云唐麟德元年九月庚申從嵩陽觀移來乃知嵩陽古梵剎也門之右有大曆二年中書門下牒其下勒代宗手勑二十四字無一筆蝕者碑隂勒戒壇記汝州刺史陸長源撰河南陸郢書𨽾法遒逸戒壇西南麥畦中有開元十五年道安禪師碑廣平宋儋撰兼書末云建僧破竈損一字蓋神僧破竈墮也已荒不可識而碑尚可搨今人但知戒壇寺茶榜可發一歎山僧云古碑甚多磨為時貴書且盡余自少林入嵩廟閱碑如林然耳目可及或無他厄數碑沈淪恐不免聊載之以竣永叔德甫耳東過嵩陽宮觀漢三粨大者七人圍皮如皴石望之若山榦不甚脩者土掩其本也今宮之石柱猶存其一掘三尺餘乃見礎古宮殿基高常踰仞栢之地視堦不當高于基三尺也栢之得封也必以偉在漢已為故物前此之積埃又不知幾許余意非去土數丈不能盡其脩偉也舊志謂石上有韓文公題名歐陽文忠公跋遍覓無有偶見石柱上有宋人書崇寧三年三月十日觀退之題其半沒土具臿求之左方得邢和叔題名右方有云余與子由攷試西洛進士畢同遊二室諸寺最後過天封精思觀道子畫遂行熙寧五年九月十日也其下不書欵又稱子由不以氏語氣酷似大蘇是時子由以忤安石出為河南府推官而子瞻送杭州進士詩序有云熙寧五年錢塘之士貢于禮部者九人十月乙酉宴于中和堂公是年監試杭州不應復至洛也其人定佳士當是西京教授王平甫輩耳韓歐書竟不見退之題最簡古今載集中郡邑志俱不收韓集非僻書也永叔跋見集古錄郡志有之永叔先後凡數至其一與梅聖俞俱即跋中所云登峰頂觀龍潭石記者也其一與謝希㴱諸人俱有見神清洞一事希㴱書云師魯語怪永叔子聰歌俚調幾道吹洞簫往往令人一笑絕倒至今數百載如見其眉目也野史載錢思公守西都歐謝同在幕下一日自嵩山歸暮抵龍門香山雪大集忽煙靄中車馬渡伊水則思公遣厨傳歌伎來到因傳語曰山行良佳少留龍門賞雪無遽歸也宋人風韻乃爾栢之右豐碑一與太室爭傑其文不足言書則徐浩八分體字字生動欲飛書家所云怒猊抉石渴驥奔泉不虛也東過崇福宮宮荒寂甚即有宋諸賢所嘗提舉者宮之左為啟母石石三丈餘旁裂小石事載淮南鴻烈甚誕而唐崔融啟母廟碑云漢臣之筆墨泉海陳其令名秦相之一字千金敘其嘉應又引郭璞李彤為證則謂真有其事矣石之前疊石為門其半已頹右方有字皆大篆風雨蝕且盡視元魏碑尤古年號上隱隱一光字而戶曹史某及辛癸之間數字尚可識嵩遊第四古云華山如立嵩山如臥二語勝畫非久歷煙雲者不解造是語也然余謂華山如峩冠道士振衣天末嵩則眠龍而癯者也登嵩之路凡數處從萬歲峰者為漢封故道迂回二十餘里至中峰巔下視諸峰危石削壁或懸或仄態貌奇古因憶謝絳與梅聖俞書所謂玉女窻搗衣石八仙壇者按圖索之去此當不遠然石上無片字從者百許人無一導引者可恨也山顛一頹室側有古井甚晶瑩旱歲不竭前復有小峰疑即古封禪壇䂓制亦敞余問道士此為峻極上院耶道士茫然余笑曰若得劉伯壽為導當無此苦矣稍東為白鶴觀故址背負三峰左右皆絕壁大熊諸山屏其前橫者如案擁者如髻列者如眉幽邃平遠寔太室之奧宅也一松亭亭立秀傑非常觀廢已久山中樹大于腕者動遭翦伐而此松獨存殆有物護之松下遺跡宛然募童子能得片碣者與百錢得故瓦礫者數錢一時𨽾卒散盡披荊求之得古瓦數片皆琉璃龍其首唯碣不可得欲過別峰而暝色已迫余謂元鼎曰松間得一亭旁搆小室遊者㝛其上五日始為不負此山也山之奧處不必論其指名者如韓公之龍潭歐公之天門泉范公之三醉石皆不能以一日窮今之遊者一㝛少林輿而過太室之前至嵩廟天中閣倚欄一觀歸而向人曰吾已盡嵩山矣是尚未觀其膚也東行里許天昏黑不可得舊道從者曰從野猪坡下稍近但嶮耳余笑曰嵩山無嶮乃杖策行崎崖中約十五里至山足是日曉出城未至門百步許見城外有白煙突起以為爆煙也頃之忽化為環大可數圍直入雲際不滅者久之嵩遊第五石淙非嵩也繫之嵩後者水從東澗注嵩之餘也曉起見簷外絲雨頗不快倚軒瞻太室翠色若滴知非雨候也馳而出東門纖塵不起翻以為樂過箕山望許由塜雲片鱗鱗如欲坼至測景臺乃見日折而東倚澗行山皆土阜甚舒緩將至石淙半里許漸聞水聲及至一澗皆石如稠林之笋四顧不得寸膚不知是石何時飛來轉盻之間向之土阜何處徙去也石錯立波中布置獧巧四帀之山宜高則為峰為巘為屏若約吾目使不外見其朴也中央之山宜平則為砥為嶼若以供吾布席置酒之用也石之大者可坐十許人小者可棚角飲飛籌走兕近可手攬遠可繩度也當澗之衝列三峰以拒水水漱其根如甕如齒斜飛正射交注潭中激以觀其怒也遶石皆㴱潭幽冷如黛渟以觀其色也至澗之下流石忽自夾兩崖青壁削立長可十餘丈水至此如匹練所以蓄其浩瀚逸其奔放也石之麗在壁水之麗在峽踞中央欣然以喜或黯然以悲因其細而思其大因其所僅存者而思其所久亡者油油然興好古之懷津津然行復古之事比閭族黨則而象之有不知其所以然而然者請始終以醫喻此則子前所云節宣調適和其榮衛暢其精神時矣作存古書院記序贈潤上人住持少林寺序李維楨陝西右布政使余自通籍以來抗塵容而走俗狀者六年矣意稍稍倦游若禽鹿苦羈紲必長林豐草然後為快也而釋氏者流性獨愛蓮華以謂是出汙泥而不滓故其宮室啟處食飲衣服非一無藉於世之人而徽纏有所不能糾垢氛有所不能染無論上乘即其下者亦得以宴然各適其志而無患私心蓋竊好之有浮屠法空者與余游余楚人法空亦楚人也聽其析義持論未嘗不跫然大喜如空谷之聞足音已復涊然汗下浹踵媿無能舍所學而從彼而日以其身行乎憂患之途莫之返也久之法空為余言其同學幻休常潤者知見精確道行清苦今且拜少林寺住持行矣而徵文於余以為贈余聞佛之道一也漢魏而下三藏諸師教人以防過絕非由身逹心以入於道謂之曰律其功在約身而先立戒齊梁而下天台諸宗教人以由經發解由解趨行以入於道謂之曰講其功在約心而先立慧逹磨而下教人以不立文字直下見性以入於道謂之曰禪其功在約性而先立定三者殊塗同歸大都以禪為至而少林者逹磨之所從入禪也遺蹟真詮往往而在今處其地踐其事其所為設教者將何塗之從乎少林為域內巨剎緇衲之倫聚處者以千數皆俛首聽命於住持而賓客之還往錢穀之出納公私旁午亦無異乎宦遊者之鹿鹿也幻休故傳小山心印果能視喧寂華素平等一相無親疎彼此乎其或六塵宰於外四蘊結於中與夫富貴利達之徒異名而同嗜乎脫有之其不為珠林寶地之羞者鮮矣余未登彼岸而與幻休素不相習幻休家在南昌進賢南昌有二太史張明成鄧汝德者㴱於幻休之學者也余與明成約旦晚謝病歸將為太和南嶽之游暇則登嵩山謁少林以求真際所詣幻休儻有得異日幸以語我贈無言道公慈惠道塲徹座還山序丘禾實翰林檢討西方之學初未嘗有宗教之分也自曹溪妙契掃却一切語言文字而宗始分宗非利根不契非密證不顯非時節因緣不至單傳直指兩人莫逆譬之紀昌飛衛相遇而射於道勢無並勝卒之矢鋒相觸墜於地而塵不揚故宗者徹則俱徹鋒相觸而不覺迷則總迷矢集身而不知夫宗何易言之也末法以來宗門漸寂即有所傳又皆即言語文字而衍之夫衍之紙上與了之胸中何翅千里舉前人口中珠似人在在皆寶然覓之非吾家物如童子塵飰塗𦎟非不快意不可言飽夫宗何易言之也少林為震旦初明之地宗風之盛千載一日嗣其傳者於今為無言禪師師之言曰言者疑之府也無者執之根也然與疑人無寧執我以此字曰無言夫師欲無言寧不謂利根不值棒喝無施乎正為棒喝無施庶幾藉大善知識金口而木舌故師之所不能言者師無以言為若人所為即師言者師不得辭言也余素聞師名無繇一至少林叩之頃以慈慧壇陳中貴昇之迎杖錫來京闡宗風於慈慧禪林凡六閱月嗟乎此師所為不得辭言者乎予觀林公慧遠之流造詣㴱至不可涯涘然機鋒所觸有不能忘師非其人乎師闡義不遺餘力然所契合常在不言之際如巧斵輪不在䂓矩如善命中不在率顧學者機緣未至率以耳食或者矢集身而不知耳余始憶師必豪舉者既而見之恂恂如也由此以觀師雖不能辭言亦何嘗有言乎但自了了寧忌紙上前人口中珠安在非大眾家常茶飰學者第驗往歸時實耶虛耶當知師之不以塵飰塗𦎟遇世也先是陳中貴既赴少林迎師上忽有所震怒逮者十人中貴與焉已而聞中貴行寔以師乃嘉歎併九人宥之嗟夫中貴之願力方䖍而師之慈航已度及十人矣何論法雲廣覆一月普現言下省悟者寧有量哉法願既畢師覓故錫還山至尊前後錫予漠然不與獨中貴等欲以余言為贈余告之曰爾師隨緣度世執心頓化然言與言不言與不言其意安在爾不能往受棒喝而欲以余言為師贅龐乎師聞之一笑碑銘嵩山少林寺禪師道公碑銘董其昌湖廣提學副使佛者凡夫之覺者也凡夫以不覺故身口意為三業佛以覺故在身為律在口為經在意為禪禪之於佛焉近矣而不足以傳佛之心若夫震旦之少林其西竺之靈山乎故海內之名藍淨剎曰律寺曰講寺曰禪寺而少林得稱祖庭其高僧尊㝛曰律師曰法師曰禪師而少林得稱宗師雖世諦流布乎亦非諸方所敢望矣其祖逹磨而宗曹洞何也蓋自藥山雲巖以寶鏡三昧羽翼別傳而价寂二公立為五位君臣正偏回互之旨開無門之門施出楔之楔所以提綱宗揀魔異者視諸家為獨密故五宗皆法王也而周過其曆時惟曹洞少林之於曹洞亦猶魯之秉周禮也宗則言路絕矣其舉揚頌古若雪竇圜悟天童投子之評唱又何也契經不云乎麤言及細語皆歸第一義良以情封則棒喝皆接響見瞥則回互無停機上士以之契同下士以之憤悱故頌古非洞宗也而洞宗寄也吁初祖懸絲之記亦可念也已自唐以來代推一人主持法席二十五代為幻休休公得法子以百數道公為最休公沒諸龍象眾欲以事休公者事之公固讓不敢應浮沈雲水者十有四年法堂草㴱宗徒雨散於是登封令請於宗伯循故事署公住持少林時則皇帝萬曆壬辰之十月也師自領眾以來十有七載戒行冰潔機辨泉流或升堂普說或入室小參莫不摧彼疑城登之覺岸明鏡屢照而不疲洪鐘待叩而輒應典刑卓爾清䂓肅然作賓王家名動京闕於是有貝葉之藏五銖之衣精鏐出於尚方綖功傳於中使瓔珞供養金湯護持固以續諸祖之慧命亦以廣聖主之福田者矣師雖心冥一乘而行崇六度諸所檀施斥脩漏因其居也有幻出之寶坊其遊也有隨身之香積頃者飛錫山海瞠目雲霄欲得人而傳衣乃處隂而息影曰吾將面壁老矣少林之開堂者必有記師之上足通慧等屬不昌記之憶師昔為休公謁文故宮保陸文定公時惟不昌與徵士陳繼儒皆締蓮社之交徵栢亭之義廿年心許今始酬因爾師名正道字無言洪都新建胡氏子父永泰母楊氏初祝髮於上藍寺璘和尚年二十從知休禪師受禪大旨居南嶽淨厓不甚契乃謁遜菴於樹屏聽法於東巖大方受戒於無盡徧參諸方至少林而得法於幻公幻公陞座問如何是洞上家風幻公曰月下三花樹峰前雙桂枝又問曰和尚還別有麼曰惟此一事實師於言下大悟即呈偈曰雲攢峰頂月鎖幽巖木人拊掌石女舒顏休公印可賛之以偈蓋許為人天師云系之銘曰嵩高少室天地之中大乘氣象鬱鬱蔥蔥破顏末會面壁真風祖佛非殊惟變乃通其一般若無知靈光不昧如清凉池如大火聚直下便是擬向即背奇哉眾生具如來慧其二五家宗旨如世畫師虛空可拈丹青不施泥牛月吼木馬風嘶不居空刦不落今時其三爰有道公僧中之傑傳涅槃心吐廣長舌雙桂開敷三花屹嵲一代時教永存珉碣達磨頌馮時可西方何來東土何往折蘆無著影壁有像而虛虛身而實實相小果不希漏因不獎廓然無聖寧有伎倆心境圓通神變惚恍以上乘機解下褪網誰折誰影而不能想又來自天竺去向蔥嶺何去何來是形是影不來不去無動無靜面壁行即心生境面誰誰即心除境三行理超六宗法屏大乘氣象茫茫孰省達磨賛陸樹聲禮部尚書竺土東來有何本據默望隈巖明中顯異撥草瞻風當機不契潦倒西歸失𨚫隻履饒他不涉程途惹起風波滿地少林寺戒壇銘跋王世貞南京刑部尚書少林戒壇銘開元三年為學生張傑書當是時傑應尚少且不以書名而筆法老成乃爾又時未盡習帝書故猶有瘦勁意唐文皇告少林寺書跋王世貞文皇圍洛城時以少林寺僧建功遣使致書存問且為護持之書法不甚工而亦不俗當是幕僚筆內世民二字行草是親押耳首有開元神武皇帝書後人所妄加也今少林寺僧猶以白棓高天下豈佛教所謂護法者其時已爾耶少林寺靈運禪師碑跋王世貞靈運碑者唐崔琪撰末云聖善寺沙門勒下殘缺二字當時僧書耳文淺陋不足道書法絕類聖教無一筆不似後世傾側偃臥以取恣態者其人材雖足稱要之有愧於此髠也裴漼少林寺碑跋王世貞裴懿公漼書少林寺碑開元十六年建又在嵩山而金石錄不載何也裴少時負文筆號霹靂手而雅不以八法名此碑辭至沓拖不可讀而書頗秀勁多媚態得非時代為之耶傳不載階封此書銀青光祿大夫正平縣子亦可補傳之闕雪菴茶榜跋王世貞元僧溥光書茶榜其辭紫方袍底語耳不得禪悅真味書法風骨頗遒勁略具顏柳及睂山豫章結法惜胸中無卍字骨令天趣流動筆端結習未忘超灑不足所書官學士後贈司徒唐不空三藏且爾胡俗無足怪也書雷轟道安禪師碑事傅梅戒壇院西南荒壟中有開元十五年碑隸書額唐嵩山故道安禪師碑九字有古法首行廣平宋儋撰兼書文尚可讀字行書遒勁多骨而風致超逸出李北海上末云建僧破竈下損一字袁中郎謂為神僧破竈墮予細辨損處下從木不似墮字豈嵩山有兩稱破竈者乎可疑也一日予命人搨得五本歸燈下展玩心口自語儋不以書名筆法精絕乃爾明發當多搨以傳久之甫就枕聞風雷聲大作平旦雨霽廵役來告云夜半前碑雷轟碎矣異哉萬曆庚戌七月六日也向疑李邕嵩嶽寺碑為寺僧所瘞予欲具三百人餱糧勒十日限大索土中歲儉未果今乃知此物鬼神所秘非人力可致也遂已之並記於此嵩書後序嵩書者宇宙間必不可無之書也周官天子有內史外史內史掌敘事之灋受納訪以詔王聽治外史掌四方之志及三皇五帝之書惟時列國無私史其國中之事志而藏於王室即史也故天子時廵以察之皇華使又比而奏之上以此同文下以此攷政於四方之掌故若無藉焉至杞宋無徵宣尼致嘆則三代而後文獻之𨵿大也况名山大川為天地陰陽之會帝王望秩之所神聖賢哲孕毓之區仙釋靈異之所託財用之所出禮樂名物之所興固可委諸草莽為古今來一大缺政哉文獻之謂何此吾邢傅元鼎先生嵩書所繇成也先生居嵩五載始至治盜二年救荒三年城城百廢修舉四民順化嵩人社而稷之而先生精神不與也語曰用志不分乃凝於神則嵩之有書也先生之精神為之也嵩於古為外方地亦曰泰室亦曰崈高書成而弁以嵩者尊嶽也王者法天而立極星野者以辨風雨災祥天氣與地氣通也先王體國經野所以重人事也故首書之也山自二室三臺五乳而外即一峰一巒一拳石一抔土必以大書經之而小書緯之也嵩之甲天下者山也故書不厭詳也惟水亦然故潁洧㶏休而外即谿澗陂堰之必疏其支而窮其委也建置有𨵿於嵩者頺垣圮蹟遺宮夜臺之無遺焉其無𨵿於嵩者雖麗弗書也故編戶履畞畞之不具舉也志嵩非志邑也書宸望者秩祀祭告以禮陰而禮陽也籩豆之事則有司存非守土責而誰責也其生於嵩而書之者其事嵩其人嵩也其仕於嵩隱於嵩而書之者其人非嵩其事嵩也其它有其人無其事與有其事逸其人者之寧退弗書傳信不傳疑也示不敢濫也有記載而無褒譏者褒譏史事也示不敢僭也仙籍禪宗之不外焉者騰光吐圖皆休禎也非以是為其異也而志之也金石丹砂草木鳥獸凡為嵩之所有即非書之所無者乃成其為嵩也陰陽之會鬼神所憑其間奇靈幽怪上林子虛所不載而亦載之也神道設教聖人所不廢也詩首大雅而文𫟍首宸翰也以正始也以化成天下也而自著附焉者書先生自書以明謙也考證必本之六經而叅以史者正經也君子反經而已經正則庶民興也為篇十有三為卷二十有二而或以為博焉而或以為文焉者非先生意也先生固慎於選言者也它日先生入為司寇郎默定大獄以靖非常讞晉獄牒為近代法家所無先生每語人曰吾得之為令者多也志不忘嵩也迨忌者中之先生不為白曰執嵩之人而問之可也然則嵩之有先生也猶地之有高也先生之有是書也猶嵩之有先生也地與獻與文則天下之三重也大以經天地遠以翼聖真上以贊帝業下以俟來學日月為昭陵谷爭久孔子曰天之未斯文也孟子曰予豈好辨哉予不得已也先生曰予亦囿於天道而不能自已也小子和退而志曰嵩書者宇宙間必不可無之書也里社後學王履和仲美識
