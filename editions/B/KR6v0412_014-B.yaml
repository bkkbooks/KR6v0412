body:
  text: 韻始篇三宋五言古詩河陽秋夕夢與永叔遊嵩避雨于峻極院賦詩及覺猶能憶記俄而僕夫自洛來云永叔諸君陪希㴱祠岳因足成短韻梅堯臣都官員外郎夕寢北下青山夢與尋相歡不異昔勝事𨚫疑今風雨幽林靜雲煙古寺㴱此二句夢中得攬衣方有感還喜問來音希㴱惠書言與師魯永叔子聰幾道遊嵩因誦而韻之梅堯臣聞君奉宸詔瑞祝趨靈岫山水聊得遊志願庶可就豈無朋從俱况此二三秀方辭建春陌十刻殘晝漏初經緱氏嶺古栢尚鬱茂𨚫過轘轅𨵿巨石相撑𨷖夕齋禮神祠法衮被藻繡畢事登山椒常服更短後從者十數人輕齎不為陋是時天清隂力氣勇奔驟雲巖香虧蔽花草藏澗竇傍林有珍禽驚聒若避磐石暫憩休泓泉助吞漱上窺玉女嶃絕非可構下玩搗衣碪焜燿金紋透尹子體雄矯攀緣逾習狃歐陽稱壯齡疲軟屢顛踣竸歡相扶持芒屩資踐蹂八仙存故壇三醉孰云謬鄙哉封祀碑數子昔鐫鏤偶誌一時事曷虞來者詬絕頂瞰諸峰隘然輕宇宙遙思謝塵煩欲知羣鳥獸韓公傳石室聞之固已舊當時興稍衰不暇苦尋究東崖亂壑中釋子持經咒于今二十年飲食同猿狖君子聆法音充爾溢膚腠嘗期躡屐過吾儕色先愀遂真諦言茲亦甘自咎中頂會幾望涼蟾皓如晝紛紛坐談謔草草具觴豆清露濕巾裳誰人苦羸瘦便即忘形骸胡為戀纓綬或疑桂宮近斯語豈在瞀歸來遊少室崷崪殊引脰石堂迢遞過探訪仍邂逅捫蘿上岑邃仙屋何廣衺乳水出其間涓涓自成溜凡骨此薰蒸靈真安可覯霞壁幾千尋四字侔篆籕咸意苔蘚文誠為造化授標之神清洞民俗未嘗遘忽覺風雨冥無能久瞻扣忽忽遂宵征勝事皆可復俚歌縱喧譁怪說多駮糅凌晨𨵿塞陽追賞顏匪厚窮極四百里寧憚疲左右昨朝書報予聞甚醉醇酹所嗟遊遠方心焉倍如疚天封觀梅堯臣車馬雲外來衣沾半山雨弭節扣真居捫蘿笑塵矩𢌞溪響石松靈茹抽巖塢玉檻刻年華應無媿前古啟母石梅堯臣曠哉嵩室陽神怪所棲宅蒼石不知年靈熊去無迹煙巖想桂宮苔壁疑椒掖不學舜娥悲瀟湘竹枝碧少姨廟梅堯臣雲祠古殿㴱少室群峰碧行雨欲隨車望巖非化石常聞蘭氣蒸誰奠椒香液寄謝洛川妃凌波定何益轘轅道梅堯臣險絕稱漢𨵿晨躋瞻二室盤紆石路回迤邐雲峰出古壁挂青蒼天風起蕭飋洛城西首時望望平煙密公路澗此下十二題范歐二公俱有作梅堯臣我來袁公溪斷岸猶殘壘僵柳遠臨灣新蒲初出水行行古臺近兩兩驚禽起雞犬何處聞人家㴱塢裏拜馬澗梅堯臣王子昔凌霓國人茲拜馬依稀月夜笙聲入寒泉瀉空傳七日期飛鶴何時下二室道梅堯臣度嶺失群山千峰出天際方欣左右看屢改縈𢌞勢勝事與誰同芬然有蘭蕙自峻極中院步登太室中峰梅堯臣稅駕綠巖前攀蘿不知倦人從樹杪來路向雲端轉忽覺在煙霞回看峰嶺變玉女梅堯臣玉洞倚雲壁大窻露微明鸞去不返啼鳥空相驚萬木自虧蔽捫蘿空復情玉女搗衣石梅堯臣有石稱搗衣搗衣人不見雲纓白飄颻巖樹長蔥蒨猶應寒夜中山月來鋪練天門梅堯臣古壁何蒼蒼穿雲玉梯出欻然起青冥𨚫立觀少室前嵓復後峰隂晴狀非一天門泉梅堯臣泠泠雲外泉的的巖光入靜若仙鑑開寒疑玉龍蟄時應下鹿群印跡青苔濕天池梅堯臣安知最高頂清淺水池開有時片雲出倏忽生風雷誰羨雙黃鵠刷羽來徘徊三醉石梅堯臣相期物外遊共醉仙臺石舉手薄高穹清風生羽翼都忘塵世煩笑傲聊為適登太室中峰梅堯臣日夕望蒼崖嶃嶃在天外及來步其巔下見河如𭘧半壁雲霧昏山根已滂沛峻極寺梅堯臣山高路已窮倏爾逢蘭若落日老僧閒支頤古松下緩步入禪庭蒼苔但瀟灑公路澗范仲淹參知政事諡文正嵩山發靈源北望洛陽注清流引河漢白氣橫雲霧英雄昔此地百萬曾相拒近代無戰爭常人自來去拜馬澗范仲淹傳聞王子仙澗邊遺逸驥當時青雲路雞犬亦可未必真龍媒悠然在平地二室道范仲淹太室何森聳少室欲飛動相對起雲霞恍如遊仙夢何以寵此行行歌降神頌自峻極中院步登太室中峰范仲淹白雲隨人來翩翩疾如馬洪崖與浮丘襟袂安足把不來峻極遊何能小天下玉女范仲淹窈窕玉女想像玉女粧皎皎月為鑑飄飄霓作裳莫學陽臺夢無端惑楚王玉女搗衣石范仲淹但見巖前砧誰聞月下杵金文與鐵色璨璨知千古試問搗衣仙何如補天女天門范仲淹天遊絕境遊熙然揖灝氣下顧莽蒼間雲雷走平地天威不遠人孰起欺天意天門泉范仲淹天門有靈泉塵埃未嘗至日月自高照雲霞亦輝媚惟抱夷齊心飲之可無媿天池范仲淹嶽頂見仙池神異安可度勿謂無波濤雲雷有時惡乘此澄清間吾纓亦可濯三醉石范仲淹巍巍八仙壇上有三醉石憐此高陽徒如樂華胥域憔悴澤邊人獨醒良可惜登太室中峰范仲淹嵩山最高處逸客徧登臨回看日月影正得天地心念此非常遊千載一披襟峻極寺范仲淹徘徊峻極寺清意滿煙霞好風從天來吹落桂樹花高高人物外猶屬梵王家公路澗歐陽修太子少保諡文忠驅馬渡寒流斷澗橫荒堡槎危欲𢽽岸花落多依草擊波翫游儵倒影看飛鳥留連愛芳杜漸下四峰照拜馬澗歐陽修昔聞王子晉把袂浮丘仙金駿于此墮吹笙不復還玉蹄無跡久澗草但荒煙二室道歐陽修二室對岧嶤群峰聳崷直雲隨高下起路轉參差碧春曉桂叢㴱日下山煙白芝英已可茹悠然想泉石自峻極中院步登太室中峰歐陽修繫馬青松隂躡屐蒼崖路驚鳥動林花空山荅人語雲霞不可攬直入冥冥霧玉女窻歐陽修玉女不可邀蒼崖鬱岧直石乳滴空竇仰見泬寥碧徙倚難久留桂樹含春色玉女搗衣石歐陽修玉女搗仙衣夜下青松嶺山㴱風露寒月杵遙相應靈蹤杳何尋片石秋光瑩天門歐陽修石徑方盤紆雙峰忽中斷呀豁青冥間畜泄煙雲亂杉蘿試舉手自可階天漢天門泉歐陽修煙霞天門㴱靈泉吐巖側雲濕顥氣寒石老林膄碧長松暫休坐一酌煩心滌天池歐陽修高步登天池靈源湛然吐俯窺不可見淵默神龍護靜夜天籟寒㝛客疑風雨三醉石歐陽修拂石登古壇曠懷聊共醉雲霞半酣樂忽在千峰外坐久還自醒日落松聲起登太室中峰歐陽修望望不可到行行何屈盤一逕林杪出千巖雲下看煙嵐半明滅落照在峰端峻極寺歐陽修路入石門見蒼蒼㴱靄間雲生石砌潤木老天風寒客來依晚照徙倚聽山蟬箕山歐陽修朝下黃蘆坂夕望箕山雲緬懷巢上客想彼巖中人弱歲慕高節壯年嬰世紛漱流羨潁水振衣嗟洛塵空祠亂驚鳥山木含餘曛聊茲謝芝桂歸月及新春潁大夫廟蘇軾團練副使贈太師諡文忠人情難強回天性可微感世人爭曲直苦語費搖撼大夫言何柔㬥主意自慙荒祠傍孤古隧有殘坎千年惟茅焦世亦貴其膽不解此微言脫衣徒勇敢登封縣宇觀少室邵雍處士諡康節先生天地始融結此山已高極群峰擁旌幢巨石羅劒㦸日出崖先紅雨餘嵐更碧安知無神仙其間久遯跡七言古詩贈許道人歐陽修洛城三月亂鶯飛潁陽山中花發時往來車馬遊山客貪看山花踏山石紫雲仙洞鎖雲㴱洞中有人人不識飄飄許子旌陽後道骨仙風本仙胄多年洗耳避世喧獨臥山巖聽山溜至人無心不算心無心自得無窮壽忽來顧我何殷勤笑我白髮老紅塵子歸為築碞前室待我明年乞得身送龍茶與許道人歐陽修潁陽道士青霞客來似浮雲去無蹟夜朝北斗太虛壇不道姓名人不識我有龍團古蒼壁九龍泉㴱一百尺憑君汲井試烹之不是人間香味色戲石堂山隱者歐陽修石堂仙室紫雲㴱潁陽真人此算心真人一去升寥廓歲歲巖花自開落我昔曾為洛陽客偶向巖前坐盤石四字丹書萬仞崖神清之洞鎖樓臺雲㴱路絕無人到鸞鶴今應待我來五言律詩石淙王賛三司副使知揚州磴道山巖下茅楹竹樹中㴱潭魚可見攢石路纔通坐聽潺湲碧縣思爛漫紅平生丘壑志覽此興何窮寄嵩嶽吉上人李若谷太子少傅諡康靖結菴嵩少㴱高道恐難倫苦海好求寶天花莫著身一心俱已了五字更應新誰謂孤雲跡名曾達紫宸天后三陽故宮石淙懷古張仲武西京轉運使二室盤遊日三陽宴喜心分流來萬壑巨石擬千岑玉殿煙蕪在金碑雨蘚侵翠華何處問山水自清音緱氏縣二首歐陽修亭後徹郊畿人家嶺坂西青山臨古縣綠竹遶寒溪道上行𭣣穗桑間晚溉畦東皋有㴱趣便擬卜幽棲其二秋色滿郊原人行禾黍間雉飛橫斷澗燒響入空山野水蒼煙起平林夕鳥還嵩嵐久不見寒碧更孱顏過少林輒書四韻兼貽慶長老王彥輔承議郎夫入千嵒碧林𭣣萬古春靜中㴱有境嶮外絕無鄰宦牒嬰行色禪𨵿脫世塵安心無覓處斷背為何人七言律詩呈大德禪師有序尹輔大理司直守登封令大德偃臥林泉罔求聞達蓋以道行久著聲華自高故得丹詔遠臨紫衣就降信有光于法侶足以榮彼僧門輔方捐道風備嘗真味喜觀殊命形諸詠言謹錄咨呈幸希采覽支遁行藏惠遠才幾年嵩少避浮埃八行丹詔雲間落一對紫衣天上來誦律夜窻寒月皎閉門秋渚白蓮開名高自達君王聽就降殊恩不假媒㝛少林寺文彥太師潞國公諡忠烈六六仙峰繞佛居俗塵至此暫銷除西來未悟禪師意北去還馳使者車予方受命移守北都五品封槐今尚在九年面壁昔何如心知一㝛猶難覺花藏重尋貝葉書登嵩頂邵雍九州環遶若棋枰萬歲峰高看太平四海有人能統御中原何復有交爭長憂眼見姦雄輩但願身為堯舜氓五十三年蕪沒事如今方許看春耕和登封裴寺丞翰見寄邵雍陋巷簞瓢世所傳予何人斯恥蕭然既知富貴須由命難把升沈更問天靜默有功成野性騫驤無路學時賢紛華出入金門者應笑溪翁治石田依韻謝登封劉李裴三君見約遊山邵雍諸公見約往嵩前重走新詩各一篇擺落塵埃非敢後訪尋雲水奈輸先三陽宮近叢幽石萬歲峰高幕紫煙多少勝遊俱未到願陪仙躅共攀緣五言絕句閒適吟邵雍春看洛城花秋翫天津月夏披嵩岑風冬賞龍山雪七言絕句遊嵩山程頤崇政殿說書諡正公鞭羸百里遠來遊數日隂雲暝不𭣣遮斷好山教不去如何天意異人謀山中寄登封令邵雍初離縣日謀經㝛既到山中未忍𢌞公宇若無民事决願攜茶器上山來和人留題張相公菴邵雍做了三公更引年人間福德合居先結茅未盡君處正在嵩高萬歲前和任司封見寄邵雍辤麾來此住雲霄聞健登臨肻憚勞紫陌事多都不見家山圍遶是嵩高嵩山二十四詠并序樓异登封令僕性嗜山水幾成癖所至雖假館僦舍莫不聚拳石環斗池終日玩觀殆寢食一旦來令嵩陽正在清泉白石窟中始至以邑事未果後數月稍稍偷息令則訟庭囹戶幾可羅雀乃芟廢圃鑿芙蓉菡萏二池取餘土築臺高可丈許名之揖仙北面嵩嶽西顧少室南望許由自餘諸峰環擁軒檻於是居高遠眺盡山川之形勢暇日既作三十六峰賦以自廣然僕舊聞嵩山二十四峰圖經傳記所不載求之土人亦莫知也一日觀明太師李得柔勝之自京師來訪乃得其名出道藏吳天師靈跡記歷東而西一一可指遂命畫史圖諸峰于仰嵩堂以證其名以永其名僕謂勝之曰二十四峰之名堙沒久矣今自吾二人者發之不可無述也乃作嵩山二十四詠並命勝之作焉青童峰斬新高髻掠雲開翠色羅衣一樣裁知有真仙此中住故令天女捧書來黃蓋峰一片黃雲駐不飛中天帝子欲何知不須更問玉人事自有嵩高峻極詩浮丘峰誰知方丈與瀛洲塵世紛紛漫白頭不到嵩山最高處世人容易揖浮丘三鶴峰昔有仙翁住此間煉成青髮與朱顏一朝跨鶴參天去澗草嵒花豈復攀遇聖峰漢家天子學神仙曾遇真人耳過肩不待菖蒲長黑髮須知逸樂自延年萬歲峰仙仗西來感百神泥金檢玉尚清新山靈知是真天子萬歲聲中第一人玉鏡峰皎皎冰盤瑩百圍廣寒宮殿見依稀春山萬疊渾如洗浮翠光中一鏡飛獅子峰蒼苔藤蔓飾鬚眉獅子標形是與非果解嚬呻作哮吼窟中狐兔定魂飛虎頭峰萬里封侯相不如道人曾此獲隂符軒牙露舌驚樵采猛士還當捋爾鬚起雲峰觸石孤飛一葉蓬雷公電母晝鞭龍但知四海為霖雨不道中天第幾峰鳳凰峰當年翔鳳此徘徊曾為真人覽德來今日飛鳴天外過紛紛燕雀不須猜金壺峰相見金壺冩墨河皂林餘潤鬱嵯峨伯陽當日傳經後肻向山隂與換鵝華蓋峰華蓋峰高未易窮捫參歷井到天中回頭𨚫顧人間世但見群青似小童玄龜峰玄武名峰古所傳晨昏吐氣作雲煙雖無鑽灼刳腸患歲晚風霜亦可憐臥龍峰頭角低回蘚蔓封蜿蜒端似臥真龍旱乾歲禱多靈應時見油雲出此峰會仙峰鶴乘雲軿下九天玉盤星子竟誰先想應漢武題花品留作人間聚八仙子晉峰當年曾悟鏡中形道骨仙風擬紫冥二十四峰明月夜玉笙須向揖仙聽玉柱峰丹楹未羨人間侈玉柱一峰天外高自古大材須大用扶持廣廈豈辤勞老翁峰翳霧埋雲皓首翁難將書傳考前蹤商山羽翼朝家後化作中天一石峰玉人峰漢武求仙未得仙玉人何事落巖前故知帝主乘雲下神蓋峰頭啟洞天玉女峰玉仙曾此駐雲車日薄紗映雪膚七字天書人不辨定知玄女手中符獨秀峰或云金匱峯孕玉懷金不待媒蓊然佳氣崔嵬天教秀拔諸峰上未信狂飇解折摧積翠峰翠幄籠雲自一家蘿梯夜碾七香車舉頭雨過餘霞散綠芰池開菡萏花太白峰仰攀日月風雲近俯瞰岡巒培塿低絕頂光𦬆長不斷人言太白此中棲宋四明樓异建中靖國初令登封志稱其有惠政而不詳其狀今觀其詩若賦固非俗吏輩也惟是按籍求所謂芙蓉菡萏二池及揖仙臺仰嵩堂盡皆化為烏有矣至序引李得柔勝之想亦韻人而其詩復久逸不可見五百餘年予為樓君之新令尹神交精合若將寤寐遇之所可彷彿遺躅百一者僅此殘碑斷簡耳千古風流不絕如綫後之視今亦猶今之視昔也可勝歎哉可勝歎哉潁考叔王十朋太子詹事諡文忠衣冠肉食謾紛紛誰解杯羹感悟君潁谷封人雖賤士𨚫能純孝至今聞外方長曰宋都汴以洛為西京嵩介乎其間崇福宮祠在此山下計當時搢紳軒車至止者接踵矣而題詠不少概見何哉予披舊簡尋遺碣稍汰其不雅馴者得若干篇止耳中有不能盡汰者詩以人重故也噫安得盡𢯱一代之全集而進退之哉金四言古詩李道人嵩陽歸隱圖麻九疇應奉翰林文字城郭維崇井里維通冠蓋維錯紈綺維藂云誰之子招子歸嵩舍我箏𥬑樂彼潺淙食彼瓦𦈢遺我𪔂鐘云誰之子繪子歸嵩離人友鹿避俗朋松石嚙我足泉癭我嚨吾恐時人笑子歸嵩有山有恠有水有龍盜出𡨥沒嘯兕咻能吾恐狂人誰子歸嵩子謂我言决意歸嵩歸嵩何如如鴻避弋如鶴脫籠與幻俱化與化俱融是以歸嵩南山重重翠如植葱北山隆隆紺如堆銅仰嵩俛嵩雨濯雲烘嵩之為我我之為嵩我聞子言衣如張風心先去鳥層雲盪胸靜言思之富為目蒿貴為心蓬飾說于令詎知任公歸嵩良是生脫筒子不歸嵩送子歸嵩五言古詩㝛少林寺趙元武勝軍節度使雙輪走雞棲下嶺分間道行行得精舍翠崦作𢌞抱諸峰知客來故故顏色好征衫滿塵土慙媿方丈老殷勤一瓣香為我除熱惱世緣如落花籬裀跡俱掃箇中有佳處行恨不早一菴祖師傍異日親結草會善寺恠松馮𤩹同知集慶軍節度使嵩高地氣靈花木竸妍秀玉峰西南趾有松獨恠陋偃蹇如蟠螭奮迅如攫獸葉勁鬚髯張皮古鱗甲皺菌蠢藤癭怒支離笻節瘦月上虬影搖風度雨聲驟子落慰枯禪枝樛礙飛鼬盤根萬乘器平蓋千歲壽樵斤幸免尋廈匠矧肻構龍化會有時天旱期汝救雨後看竝玉所控諸峰馮𤩹竝玉如高人壁立九千仞一日不見之令人生鄙吝春㴱木葉敷秀色益濡潤結茅寄僧藍晴碧時相趂老㝛詫孫峰隅侍到齠齓連延青一色枚數須諦認溟濛空翠間我亦疑未信朝來雲氣昏埋沒瑜匿瑾如蒼梧政愁湘妃鬱思舜重隂俄解駮霮濧夕暉襯娟娟忽層出歷歷分遠近雲峰互吞吐千狀纔一瞬出奇如孫吳相䧏如廉藺如眾星拱辰如侯伯入覲接武如朋簪承迎如价𭀀負固如吳楚爭長如齊晉恠詭如夷蠻駢羅貢琛贐窘蹙如擒獲係纍將就釁如應龍神靈蟄臥時奮迅如天駟超軼坰牧稅羈靷如雄對改容失筯駭疾震如猛士無譁攢槊俟嚴陣獨兩峰巍然魁傑儼崇峻光輔岳柱天鬱為中興鎮降生申與甫周室僨復振詩傳配崧高百世磨不磷玉華山同元好問裕之雷淵翰林修撰洗耳潁川水療饑西山薇山川得佳客草木生光輝末路風教薄此道日已微相期千載事非君誰與歸九日登少室絕頂同裕之雷淵閒居愛重九佳人重相過登高酬節物少室鬱嵯峨迤邐謝塵土夷猶出煙蘿欻如據鰲頭萬壑俯蜂窩浩浩跨積風濔濔渺長河日車昃紅輪天宇凝蒼波指點數齊州如覺氛埃多我無倚天劒有淚空滂沱驚鱗盻奧渚倦翼占危柯悔不與家來結茅老巖阿歸途睠老阮廣武意如何會善寺恠松雷淵物生自有常恠特物之病嗟嗟此老蒼恠恠生魁柄侏儒蹙髀股㝛瘤擁腮頸蜿蜒蛟龍戲騰擲貙虎競鬚髯喜張磔意氣怒狂迸匠石求棟楹節目足譏評芻蕘急薪槱堅悍空盻瞪靜言觀倚伏未易相弔慶雖違時世用顧免斤斧橫陽秋莫榮悴歲月何究竟盤盤曲則全挺挺獨也正小草悞掃迹伏神還守性儻隨天中景廣宇共庥映箕山元好問左司員外郎幽林轉隂崖鳥道人跡絕許君棲隱地唯有太古雪人間黃屋貴物外袛自潔尚厭一瓢喧重負寧所屑降衷均義稟泊利忘智决得隴又望蜀有齊安用薛干戈幾蠻觸宇宙日流血魯連蹈東海夷齊采薇蕨至今陽城山衡華兩丘垤古人不可作百念肝肺熱浩歌北風前悠悠送孤月同雷淵希顏再登箕山元好問千年箕山祠蘿徑㴱以悄桂樹不復見禿䔩餘秋篠盤盤盡絕頂石冡平木杪長風萬里來筋骸覺輕矯側身望巖竇解衣憩林表是時夏春交野色亂青縹川光乍明滅地脉互縈繞岡巒蟻垤出井邑蜂衙擾紅塵洛陽昏白雲太行曉玄功信冥漠一覽疑可了悟彼東山人胸中魯宜小少林元好問雲林入清㴱禪房坐蕭澄泉潔餘習高鳥喚長往我無玄豹姿漫有紫霞想𢌞首山中雲靈芝日應長純孝伯廟元好問洩洩潁谷雲瀜瀜潁川水封君去我久水雲自清美人言君善諫微意得鄭子特于悔悟時一語發天理大孝勒金石土苴及頑鄙反身而未誠善諫且敗矣如何千載下乃與茅焦比我行潁水邊永念負甘旨願作鯉與魴因之日千里緱山置酒元好問靈宮肅清曉細柏含古春人言王子喬鶴馭此日賓白雲山蒼蒼平田木欣欣登高覽二化浩蕩融心神西望洛陽城大路通平津行人細如蟻擾擾爭紅塵蓬萊風島㴱鬢毛日夜新殷勤一杯酒媿爾雲間人七言古詩題元裕之家山圖趙元繫舟盤盤連石嶺牧馬澄澄倒山影山光水氣相混涵中有元家舊盧井鴈門一開豺虎塲駕言投迹嵩之陽青山偃蹇不可將十年竟墮兵塵黃東巖風物知猶在說與寄菴神已會一揮淡墨能似之清輝遠寄形骸外元家故山吾與鄰夢見不如圖畫真舊曾行處聊經眼未得歸時亦可人愛詩李道人若愚嵩陽歸隱圖雷淵我家崧前凡再期詩僧騷客相追隨春葩繽紛香澗谷夏泉噴薄清心脾霜林置酒曳錦障雪嶺探梅登玉螭重陽夜㝛太平頂天雞夜半鳴喔咿整冠東望見日出金輪湧海光陸離神州赤縣入指顧風埃未靖空歔欷窮探極覽不知老泉石佳處多留題簡書驅出踏朝市期會迫窄愁鞭笞襟懷塵土少清夢齒頰棘荊真白癡叩門剝啄者誰道人面有熊豹姿披圖二室忽當眼貫咏編貝多文辭我離山久詩筆退摹冩豈復能清奇再三要索不忍拒依依但記經行時道人愛山復愛詩嗜好成癖未易醫山中詩友莫相厭遠勝薰酣聲利兒嵩山恠松謠李純甫京兆府判官阿誰栽汝來幾時輪囷擁腫蒼虬姿鱗皴百恠雄牙髭拏空夭矯蟠枯枝疑是祕魔巖中老慵物旱火燒天鞭不出睡中失𨚫照海珠羞入黃泉蛻其骨石鉗沙錮汗且僵埋頭臥角政摧藏試與摩娑定何似怒我棖觸鬚髯張壯士囚縛不得住神物世間無著處隄防夜半雷破山尾血淋漓飛𨚫去送郝講師住崇福宮元好問大方之家幾知津郝君七十老斲輪書文五車喙三尺劇談混沌今猶神太玄士為絕倒君言誇矣天公嗔長安冠蓋羅青雲洛陽車馬爭紅塵恠君掉頭不肻住寂寞來作由東鄰崧高維嶽古所秩三十六帝有外臣玄都石壇待飇馭宮殿突兀松輪囷上界僊人鄧雲山洞天治所名司真蓬萊方丈去不遠明星玉女時相親瑤華可擷蘭可紉煙霞永隔塵中人黃鵠一去不復還長驅萬里誰能馴為我殷勤謝鄧君玉華歲晚當平分雪中自洛陽還嵩山元好問道人薄有塵外緣迫入塵埃私自憐三十六峰一茅屋夢入西家掠社錢津津喜色見眉宇峩峩青城當眼前蹇驢逕入風煙去恰是梅花欲雪天嵩山玉鏡元好問玉鏡見何許今旦東山陲積雨洗昏霾旭日發光輝光輝奪人目灔灔如動移初如秋月圓漸如曙星微曙星不能久併與晨露晞此鏡從何來造化祕莫窺山精或寶氣恍惚令人疑誰為問岳祇山川英秀會有歸不能生申與甫瑞王國萬丈光芒徒爾為五言律詩留題崇福宮趙秉文上護軍天水郡侯山面削瓜碧宮墻鋪粉光晴嵐天自雨夏竇冷噴霜勝地松杉古仙家芝术香東鄰與西舍欠我一茅堂太室同希顏賦元好問壯矣崧維嶽盤盤上窈冥中天瞻巨鎮元氣有遺形雨入秦川黑雲開楚岫青鰲掀一柱在萬古壓坤靈少室南原元好問地僻人煙斷山㴱鳥語譁清溪鳴石齒暖日長藤芽緣映高低樹紅迷遠近花林間見雞犬直擬是仙家少林雨中元好問西堂三日雨氣節變蕭森偃臥復𢽽臥長吟時短吟鐘魚四山靜松竹一燈㴱重羨禪棲客都無塵慮侵送母受益自潞府歸嵩山元好問薄俗科名賤孤生志願違正須謀獨往何暇計群飛泌水真堪樂荊州况可依青山無舊隱此日羨君歸贈汴禪師元好問道重疑高蹇禪枯耐寂寥蓋頭茅一把遶腹篾三條趙子曾相問馮公每見招風波門外客無事且相饒七言律詩遊少林寺許安仁汾陽節度使巖壑㴱嚴入翠微少林金碧霧煙霏五峰屏簇禪菴小萬劫天開佛日輝聞說九年空面壁得逢二祖便傳衣千秋少室山靈在曾見先師隻履歸追述嵩少之遊有序馮壁元光間予在上龍潭每春秋二仲月往往與元雷遊歷崧少諸藍禪師汴公方事參訪每相遇輒揮毫賦詩以道閒適之樂今猶夢寐見之兒子渭近以公故抵任城禪師附寄詩以敘疇昔未幾駐錫東菴因造謁間出示裕之數詩醉筆縱橫亦略道崧遊舊事感歎之餘漫賦二首性理諸方已徧叅歸來一錫駐東菴山中蓮社舊招隱旅舍阿戎新對談詩筆如君僧有幾文章媿我老無堪綾書大字拈香䟽須趂微之酒半酣其二少林脩竹欲天參竹外幽閒草結菴顧我雖存惟白髮與君曾此共玄談干戈橫絕境猶夢草樹荒殘人豈堪臘瓮松醪髯莫預商歌悲壯不能酣會善寺元好問白沈沈插翠微魏家宮闕此餘基人生富貴有遺恨世事廢興無了期勝槩只今歸鷲嶺煙花從昔繞龍墀長松想是前朝物及見諸孫賦黍離望崧少二首元好問嵩少飛來崐閬山山家茅屋翠微間雞豚鄉社相勞苦花木禪房時徃還結習尚餘三㝛戀殘年多負半生閒長河一葦人千里望斷西城碧玉環其二飲鶴池邊萬木稠養龍崖上五峰秋藤垂絕壁雲添潤澗落哀湍雪共流田父占年驚玉斾詩仙留迹歎崐丘西風落日山陽道空對紅塵憶舊遊懷州子城晚望少室元好問河外青山展臥屏并州孤客倚高城十年舊隱拋何處一片傷心畫不成谷口暮雲知鄭重林梢殘照故分明洛陽見說兵猶滿半夜悲歌意不平嵩山承天谷趙秉文煙霞直上逍遙谷路轉山腰咫尺迷已覺洞天分聖境更疑石蹬是仙梯霜添紅葉黃花好天與金壺玉柱齊兩峯名醉倚西風正南望暮雲煙草一時低送裕之還嵩山王偓右司郎中高懷不受簿書侵清潁鷗盟欲重尋老去宦情知我薄閒來道念見君㴱對牀夜雨他年夢滿馬西風此日心嵩頂勝遊誰得共仙門仙馭待知音次韻呈戒壇惠公堂頭路公宣武將軍行芝田縣令官如馬足在泥塵喜見高吟日日新已竊謝公三載祿難甘原憲一生貧徒勞碌碌當年學且樂陶陶此日春幸對清風與明月不知誰是箇中人復繼仲寧堂頭韻釋承燮門外曹溪路不賖炷香煙縷裊風斜玄談磊落鑑冰雪花翰清新燦綺霞祖剎金燈風續熖少林鐵樹雨開花庭前大石圓如斗一點難侵意轉嘉七言絕句望少室許安仁名山終不見真形萬仞巖巖上杳冥安得雲間跨白鶴下看三十六峰青少室道中許安仁少室峰頭曉月沈千家城郭淡隂隂五更雞唱殘星滅馬上看山過少林少林寺呈堂頭和尚盧庸定海軍節度使㟧嶺穿雲路屈盤少林古寺傍巖巒此行本為安心法今日吾師與我安登嵩山絕頂抵㝛盧巖盧庸飛梁倒挂虹霓落列障遙連翡翠鮮巖樹溪禽盡相識一春踏遍萬峰巔石淙張安撫使潁水洗餘高士耳是非猶恐污人牛區區武媚何為者水上磨崖紀宴遊過嵩山辛愿處士催老年光滾滾來好懷知欲向誰開箕山潁水春風裏呼起巢由共一杯玉華谷同希顏裕之李獻能鎮南軍節度副使玉龍落峽噴飛流空翠霏霏晚不收軟山堂一壺酒暮凉閒對兩峰秋酬子京禪師見贈之什二首元好問南風穩送北歸船留得虛明一指禪嵩少詩僧幾人在因君𢌞望一悽然其二舊遊重憶故人詩一點青燈兩鬢絲不似戒壇明月夜杏花香裏唱歌時自註云往在嵩山時陪馮內翰雷御史遊戒壇詩中所道蓋當時事也元五言古詩中嶽投龍簡并序吳全節真人皇慶二年歲在癸丑四月甲子詔玄教太宗師張留孫醮大長春宮弭星𦬆禱雨澤也聖天子敬天愛民一誠之發其荅如響禮成命玄教嗣師真人吳全節正議大夫太常卿李允中奉金龍玉節投諸嵩洞入山之初一雨遄霽蕆祀之際輕隂護凉咸謂使命必當有紀謹賦五言詩一章以彰聖治云陽城天地中坤靈奠神嶽積翠千層霄元氣遠盤礡䧏神生申甫形勢控伊洛谽谺虎豹蹲偃蹇蛟龍躍猛士橫戈矛奇陣出幃幄簇簇羅旌旗巍巍聳臺閣玉鏡為誰開金櫃為誰鑰遠近列畫圖週遭峙郛郭萬狀不可名起伏互連絡皇皇聖帝居歷代重封爵老栢浮蒼煙古殿蝕丹臒天朝混華夏秩禮特優渥皇慶二載春宵旰軫民瘼有旨醮長春玉簡命新琢詔臣走登封香幣虔恪邃洞藏寶符瓊音䧏笙鶴三呼今復聞祥風度天樂小臣奉明祀三使陟雲㟧箕山勝可家潁水清可濯遐想飲牛人高風動寥廓賜玦知何時分我雲半壑歌詩勒嵩珉用賛聖人作七言古詩題王子晉童南谷集賢院侍講學士屣棄萬乘追浮丘仙成駕鶴緱山頭碧桃千樹鎖金洞玉笙嘹喨天風秋回眸下笑蜉蝣輩蝸角爭戰污濁世何當高氣凌霄霞願隨環珮聯雲騎緱山謠張廓進士一作張仝緱雲輕緱月明緱山仙人弄雲月徘徊鸞鶴吹玉笙仙人忽輕舉山頭雲月悠悠薄太清浮丘真人學道成丹砂九轉飛零星羽衣芝蓋遙相迎游軿駕鴻相與朝玉京海日岧嶤射青闕閬霞崆峒烘赤城下瞰塵寰滄海桑田平紛紛萬乘兮如癡蠅菌晷促兮不暫停大道兮其自靈故山柏桂兮煙冥冥邦人思舊兮未情香火燁燁兮祝清明青天寥寥兮望霓旌飲鶴池邊幾番兮春草生七言律詩遊法王寺呈學公長老梁宜河南府路總管坡巘寬圍箕掌圓峰巒高倚翠屏鮮偶迷樵跡愁無入忽得禪𨵿喜有緣漱石溪泉戞環珮隨崖蹬路纏蜿蜒最憐崇如迎客雲外亭亭出碧巔奉祀嵩嶽夜㝛少林寺李允中太常卿蔥嶺當時遇宋雲手提隻履果何因入山便得安心法立雪能來斷臂人錫卓一泓雲浸影花開五葉地生春無勞照石瞻遺像滿目青山是法身面壁石影像李允中長江折葦渡如神梁武何曾識異人一日棺中忘隻履萬年石上現全身功成面壁禪心苦法後傳衣佛眼真非我有緣遊五乳誰能廓達悟微塵遊嵩嶽二首蒲理翰雲南僉事嵩嶽巖前鉄作橋重樓朱宇隱層霄道人步月拾瑤草童子倚雲吹玉簫春滿石壇遲晝景龍藏金鼎長丹苗苔封少室山前路何許高人索價饒其二名山到處駐征騑來訪幽棲杜德機雲蓋浮丘千歲井煙籠玉女五銖衣唐碑猶有丹砂頌漢室全無青鳥飛風捲長松清嘯發珮環聲響九天微中嶽投龍簡蒲理翰自喜華巔預此行遠綸旨告功成典謨會與唐虞竝文武更祈申甫生人意達時天意合金龍投處蟄龍驚歸途巖壑清風響疑是當年萬歲聲嵩山鄭棐偃師縣主簿一重山隔一重雲一澗花藏一澗春泉石任渠輕俗客煙霞元自重高人指開松影杖頭濕踏破苔痕屐齒新笑我青山未歸老蕭蕭鞭馬軟紅塵㝛少林史公賢河南僉事巡行偶向山中㝛嵩嶽西南少室前靜愛嶺雲輕世味暫隨僧飯絕葷羶松風蕭颯來疎雨翠障空濛起暮煙面壁巖頭千古月寒光寂寂解逃禪代祀嵩嶽夜㝛少林童南谷西來碧眼一胡僧曾渡寒蘆隱少林半夜傳衣逢斷臂當年面壁悟安心一庭雪積山猶在五葉花開月未沈奉命頒香瞻隻履菩提樹底得幽尋遊少林寺程相參政杖屨徒登禮少林亂山佳氣鬱森隂松杉色露真如相禽鳥聲傳梵國音可笑九年閒面壁𨚫憐二祖與安心西來一曲調青舌白雪陽春和到今題王子晉李好文廉訪使黃屋非心敝屣然玉笙吹斷鶴昇天載瞻今日叢祠地詎數當時定鼎年琬琰真書文半剝塵埃舊壁畫猶鮮當途𨚫顧荒山上萬柏森森鎖暮煙送月上人謁少林隆老釋寥一隻臂伽𥠖不作難將心到處遣人安瓶離汴水秋風冷錫入嵩峰夜月寒篋裏贈詩經雨曬囊中施鉢對風餐心知擬就東林㝛已向林稍薦剎竿五言排律嵩高山三十韻孟同員外郎維嶽橫空闊靈根自古長孤高臨上國厚重壓中央雨過龍潭黑風生虎口狂崇高封自漢丹鼎就因唐樹號將軍柏山呼聖主昌真珠晴洒露瀑布冷歕霜幾郡遊中頂諸峰仰上方道宮濃靄覆書院白雲藏九節菖蒲翠三花貝葉芳許由墳自拱啟母石非常更淺逢鸞鶴雖㴱絕虎狼泉流成五渡嵒祕護三章亂眼山禽碧供厨野蕨香御題千尺笋儒構十三堂遊客終無倦居民自不𢗅城周三面等屏翠四時張夕照分羅漢脩篁擁法王夜閒聞遠籟天靜見扶桑正列星辰位高承日月光明霞千樹現垂乳幾人嘗上去樵迷路飛穿鳥失行賣松人下嶺采藥叟歸莊橫企來方息時機住可忘影資全庇廕勢遠不低昂字古書蝌蚪石奇立鳳凰發威雷忽震䧏福雨時霶萬壑寒枝直千崖古蘚蒼穴㴱留羽客洞遠得瓊漿繪事圖難定詩家狀莫量中封應未晚父老望吾皇題故盧諫議書堂裴處權河南少尹倚杖溪亭曙𢌞環勝畫圖峰巒摩碧落雲水誤清都潭冷知龍臥巢低惜鶴孤石苔摛瑞錦松露綴真珠小隱前朝盛幽棲近日無他年婚嫁畢絕頂老樵五言絕句轘轅坂楊奐京兆宣撫司參議盤盤十三曲石嶺瘦崢嶸底有平地何人險處行太室楊奐茂陵骨已朽萬歲空虛傳莫上中峰頂秦城隔暮煙少室楊奐方若植巍冠森若削寒玉明夜月中遊誰家借黃鵠啟母廟楊奐頑石立在世啟母人亦知可憐宋太后死罵寧馨兒少姨廟楊奐路傍雙闕老蔓草入荒祠時見山家女燒香乞繭絲盧巖楊奐避名名自至身瘠道還腴未到千年後空巖已姓盧龍潭楊奐壯哉昌𥠖筆談笑排佛禍不言動鬼神疑觸雷火五渡水楊奐幾時落東溪曲折臥天漢語似登山人可飲不可盥測景臺楊奐一片開元石愈知天地中今宵北夢或可見周公箕山楊奐土堦墮渺茫多少曹與馬底事住青山近代無讓者潁水楊奐邂逅洗耳翁去飲上流水此日儻相逢黃犢應渴死巢父塜楊奐既知田間樂焉知田間苦惟是唐虞朝所以有巢父七言絕句遊法王寺偶觀殿壁馮內翰叔獻雷御史希顏張伯英伯玉昆仲及諸名勝留題和韻輒不自揆勉賡前押梁宜堂廊分級趂崖高棟接楹聯互轕膠若就岑樓觀寸木連雲廈劣蓋頭茅其二積山曾藉細塵高可道澄河小寸膠自媿穠華久昏昧今朝賴拔塞心茅少林寺五首今錄二首崔伯淵肅政廉訪司副使初祖東向來心中已覺五花開要知面壁九年意立雪齊腰心不𢌞其二禪宗一派自西來五葉花枝從此開僧伴白雲無箇事香煙朝暮鎖青苔㝛少林史鐧御史過客東來㝛少林山僧禪榻冷雲㴱天風驚覺三生夢松杪秋聲響玉琴門人傅性良崔冲奎校字
